{id:'m5_16',mod:'m5',drug:false,type:'mc',q:'A nurse observes a patient having a tonic-clonic seizure. The PRIORITY intervention is:',opts:['Firmly restrain the patient to prevent injury from thrashing','Insert a padded tongue depressor to prevent tongue biting','Protect the patient from injury by clearing the area and time the seizure duration','Immediately administer a benzodiazepine without waiting for an order'],ans:[2],rationale:"During a seizure: PROTECT (clear area, pad rails), POSITION (side-lying after convulsions to prevent aspiration), TIME the seizure (>5 minutes = status epilepticus = emergency). NEVER restrain (fracture risk), NEVER put anything in the mouth.",pearl:"Seizure DO: Time it, Protect from injury, Turn side-lying, Suction if needed, Stay with patient. Seizure DON'T: Don't restrain, Don't insert anything in mouth, Don't leave patient alone. Post-ictal phase = confusion/fatigue (normal). Seizure >5 min = status epilepticus = BZD + call for help."},
{id:'m5_17',mod:'m5',drug:false,type:'mc',q:'Opioid-induced respiratory depression results from:',opts:['Direct structural damage to respiratory muscles from opioid binding','Suppression of brainstem chemoreceptor sensitivity to rising CO2 slowing the drive to breathe','Bronchoconstriction from opioid receptor activation in bronchial smooth muscle','Pulmonary edema from histamine release causing alveolar fluid accumulation'],ans:[1],rationale:'Opioids bind mu receptors in brainstem respiratory centers → decrease sensitivity to rising CO2 → breathing slows → CO2 accumulates → respiratory acidosis → respiratory arrest if untreated. Highest risk with IV administration and rapid dose escalation.',pearl:'Opioid respiratory depression: RR <12/min, shallow breathing, cyanosis, altered LOC. Treatment: Naloxone (Narcan) IV/IM/intranasal. Naloxone half-life (~30-60 min) is SHORTER than most opioids — watch for re-narcotization after naloxone wears off. May need repeated doses or continuous infusion.'},
{id:'m5_18',mod:'m5',drug:true,type:'mc',q:'Levetiracetam (Keppra) is distinguished from older antiepileptics by:',opts:['Being highly teratogenic — must be avoided in all women of childbearing potential','Having no significant CYP450 drug interactions — not metabolized by hepatic CYP enzymes','Requiring monthly liver function monitoring due to severe hepatotoxicity risk','Having the highest risk of Stevens-Johnson syndrome of all antiepileptics'],ans:[1],rationale:"Levetiracetam is unique among antiepileptics for having NO significant CYP450 drug interactions — not metabolized by the liver's CYP system. Much safer to combine with other drugs. Available IV and PO. Notable behavioral/psychiatric side effects.",pearl:'Levetiracetam (Keppra): No drug interactions (CYP450-free), available IV and PO, no routine drug level monitoring. Main side effect: MOOD changes — irritability, depression, behavioral changes (Keppra rage). Monitor mood carefully and counsel patients and families about this.'},
{id:'m5_19',mod:'m5',drug:false,type:'mc',q:"Late-stage Alzheimer's disease is characterized by:",opts:['Mild memory lapses and occasional word-finding difficulties','Loss of speech, inability to perform any ADLs, loss of bowel/bladder control, total dependence for all care','Moderate memory loss with retained ability to walk and perform basic self-care','Disorientation to time and place but ability to recognize close family members'],ans:[1],rationale:"Late-stage AD: loss of speech (aphasia), inability to perform ANY ADLs, loss of bowel and bladder control, total dependence, dysphagia (aspiration risk), often bed-bound. Death typically 4-8 years after diagnosis, usually from aspiration pneumonia.",pearl:"AD progression: Early = memory lapses, word-finding. Moderate = disorientation, personality changes, wandering. Late = loss of speech/continence/ADLs, total dependence. Cholinesterase inhibitors help mild-moderate; memantine added for moderate-severe. Neither reverses disease — only modest symptom slowing."},
{id:'m5_20',mod:'m5',drug:false,type:'mc',q:'Which pain assessment tool is MOST appropriate for a non-verbal critically ill adult patient?',opts:['Numeric Pain Rating Scale (0-10) — asks patient to rate pain verbally','Wong-Baker FACES scale — patient points to the face showing pain level','CPOT (Critical-Care Pain Observation Tool) — behavioral observation validated for ICU adults','FLACC scale — validated for young children based on observable behaviors'],ans:[2],rationale:'CPOT is validated for non-verbal, intubated, critically ill ADULTS. It assesses four behavioral indicators: facial expression, body movements, muscle tension, and ventilator compliance/vocalization. It is not a self-report tool.',pearl:'Pain assessment by population: Verbal adults = Numeric 0-10 or PQRSTU. Non-verbal/ICU adults = CPOT or BPS (Behavioral Pain Scale). Children 3+ years = FACES scale. Children/infants <3 years = FLACC (Face, Legs, Activity, Cry, Consolability).'},
{id:'m5_21',mod:'m5',drug:true,type:'mc',q:'COX-1 inhibition by NSAIDs specifically contributes to which adverse effect?',opts:['Reduced fever and inflammation — the desired therapeutic effect','GI bleeding and ulceration — COX-1 produces prostaglandins that protect the gastric mucosa','Bronchodilation benefiting asthma patients through leukotriene inhibition','Increased platelet aggregation causing thrombosis risk'],ans:[1],rationale:'COX-1 is constitutive (always present) and produces PROTECTIVE prostaglandins: gastric mucosal protection (mucus and bicarbonate secretion), renal perfusion maintenance, and platelet aggregation via thromboxane A2. COX-1 inhibition = gastric ulcers/bleeding and renal impairment.',pearl:'COX-1 = protective (stomach, kidneys, platelets). COX-2 = inflammatory (induced at inflammation sites). Non-selective NSAIDs block both → GI risk. COX-2 selective NSAIDs (celecoxib) = less GI risk but more cardiovascular risk. NSAIDs taken WITH food reduces GI side effects.'},
{id:'m5_22',mod:'m5',drug:false,type:'mc',q:'Neuropathic pain has a burning, shooting, or electric shock quality because:',opts:['Nociceptors in the skin are overstimulated by continuous thermal damage','Abnormal nervous system processing generates pain signals without ongoing tissue injury','The pain is psychosomatic with no physiological basis','Myelin sheath destruction causes direct pain generation at each demyelinated segment'],ans:[1],rationale:'Neuropathic pain arises from abnormal nerve function — the damaged or sensitized nervous system generates pain signals without ongoing tissue injury. Examples: diabetic neuropathy, post-herpetic neuralgia, phantom limb pain, trigeminal neuralgia.',pearl:'Neuropathic pain treatment: NSAIDs/opioids often less effective. First-line: gabapentin/pregabalin, SNRIs (duloxetine — FDA approved for diabetic peripheral neuropathy), TCAs (amitriptyline), topical lidocaine or capsaicin.'},
{id:'m5_23',mod:'m5',drug:false,type:'mc',q:'After a right hemisphere stroke a patient exhibits left-sided neglect. This means the patient:',opts:['Is paralyzed on the left side and physically cannot move the left limbs','Fails to perceive and respond to stimuli on the left side despite intact sensory pathways','Has permanent loss of left peripheral vision from optic tract damage','Has difficulty understanding spoken language from the left side'],ans:[1],rationale:'Neglect = failure to perceive and respond to stimuli on the affected side despite structurally intact sensory pathways. The patient may not dress the left side, eat food on the left of the plate, or acknowledge left-sided injuries. Common after right hemisphere strokes.',pearl:"Neglect nursing: approach from the UNAFFECTED side initially. Place call light on unaffected side. Position affected limb carefully — the patient cannot feel injury. Left neglect is more common and typically more severe than right neglect due to right hemisphere's spatial dominance."},
{id:'m5_24',mod:'m5',drug:true,type:'mc',q:'Phenobarbital (Luminal) Schedule IV — the PRIMARY concern with long-term use is:',opts:['Hepatotoxicity requiring monthly LFT monitoring','Tolerance and physical dependence — abrupt discontinuation can precipitate life-threatening withdrawal seizures','Nephrotoxicity requiring dose reduction in renal impairment','Thyroid suppression requiring hormone replacement therapy'],ans:[1],rationale:'Barbiturates cause physical dependence. Abrupt discontinuation after prolonged use can cause severe withdrawal including rebound seizures, tremors, hallucinations, and potentially fatal status epilepticus. Always taper gradually over weeks to months.',pearl:'Barbiturate withdrawal is MORE dangerous than opioid withdrawal — it can be fatal. NEVER abruptly discontinue barbiturates or benzodiazepines in dependent patients. Phenobarbital is also a potent CYP inducer — reduces levels of many co-administered drugs including warfarin and oral contraceptives.'},
{id:'m5_25',mod:'m5',drug:false,type:'sata',q:'Which are CORRECT pairings of stroke type and appropriate treatment? Select all that apply.',opts:['Ischemic stroke — tPA/alteplase within 4.5 hours of symptom onset','Hemorrhagic stroke — tPA/alteplase to dissolve the intracerebral clot','Ischemic stroke — anticoagulation and blood pressure management','Hemorrhagic stroke — stop bleeding reduce ICP supportive care with NO tPA','Ischemic stroke — aspirin and antiplatelet therapy for secondary prevention'],ans:[0,2,3,4],rationale:'Ischemic stroke: tPA (within 4.5 hours), anticoagulation, antiplatelet therapy for secondary prevention. Hemorrhagic stroke: stop bleeding, reduce ICP, blood pressure control — NO tPA or anticoagulants (would worsen bleeding). Giving tPA for hemorrhagic stroke = potentially fatal.',pearl:'CT scan BEFORE treatment is mandatory — MUST distinguish ischemic from hemorrhagic. Ischemic: give tPA if eligible then aspirin. Hemorrhagic: reverse anticoagulation control BP reduce ICP. Wrong treatment kills. Time is brain — fast CT fast decision.'},
// M6 additions: m6_11 to m6_23
{id:'m6_11',mod:'m6',drug:false,type:'mc',q:'A patient with heart failure has BNP of 890 pg/mL (normal <100). This indicates:',opts:['Severe dehydration — BNP rises with fluid volume deficit','Significant ventricular wall stress from volume overload — BNP is released by stretched ventricles','Active myocardial infarction — BNP is a cardiac damage marker like troponin','Normal variation — BNP values are not clinically significant'],ans:[1],rationale:'BNP is secreted by ventricular myocytes in response to increased wall stress from volume/pressure overload. Elevated BNP (>100-400 pg/mL) indicates heart failure with high sensitivity. Levels fall with effective diuresis — useful for monitoring treatment response.',pearl:'BNP >100 = heart failure likely. BNP >400 = heart failure very likely. BNP <100 = heart failure unlikely (helps RULE OUT HF in dyspneic patients). NT-proBNP is another marker with different cutoffs. BNP falls with successful diuresis — use it to monitor treatment response.'},
{id:'m6_12',mod:'m6',drug:true,type:'mc',q:'The rationale for using carvedilol (beta-blocker) in systolic heart failure is:',opts:['To increase heart rate and improve cardiac output acutely','To block chronic sympathetic nervous system activation preventing harmful cardiac remodeling','To increase preload by retaining sodium and water','To directly increase myocardial contractility via positive inotropic effect'],ans:[1],rationale:'Beta-blockers in HF: chronic SNS activation initially compensates but ultimately causes harmful remodeling (hypertrophy, fibrosis, apoptosis). Beta-blockers block neurohormonal activation → prevent remodeling → improve EF over time despite counterintuitive initial reduction in HR.',pearl:'Beta-blocker in HF paradox: they initially slow the heart (bad acutely) but long-term block harmful SNS effects → reverse remodeling → improve EF reduce hospitalization and mortality. Only three beta-blockers are approved for HF: carvedilol (Coreg), metoprolol succinate (Toprol-XL), bisoprolol. START LOW GO SLOW.'},
{id:'m6_13',mod:'m6',drug:true,type:'mc',q:'Which antihypertensive class is FIRST choice for a diabetic patient with HTN and proteinuria?',opts:['Thiazide diuretics (hydrochlorothiazide)','Calcium channel blockers (amlodipine)','ACE inhibitors or ARBs','Beta-blockers (metoprolol)'],ans:[2],rationale:'ACE inhibitors (or ARBs if ACE-I not tolerated) are first-line for HTN in diabetics with proteinuria — they reduce intraglomerular pressure and slow progression of diabetic nephropathy beyond just blood pressure lowering (renoprotective effect).',pearl:'ACE inhibitors/ARBs = renoprotective in diabetes. Reduce proteinuria and slow CKD progression. Contraindicated: pregnancy (teratogenic), bilateral renal artery stenosis, hyperkalemia. Monitor: K+ and creatinine after starting. A rise in creatinine up to 30% is acceptable and expected — do not stop the drug for this.'},
{id:'m6_14',mod:'m6',drug:false,type:'mc',q:'A patient develops JVD, hepatomegaly, and bilateral pitting edema of the legs. These findings are MOST consistent with:',opts:['Left-sided heart failure with pulmonary congestion','Right-sided heart failure with systemic venous congestion','Cardiac tamponade with pericardial effusion','Hypertensive urgency'],ans:[1],rationale:'Right-sided HF = systemic venous congestion → JVD (blood backs up into jugular veins), hepatomegaly (hepatic vein congestion), bilateral peripheral edema (extremity venous congestion). The SWELLING mnemonic covers right-sided HF signs.',pearl:'Right HF = SWELLING: Swelling of legs/hands, Weight gain, Edema (pitting), Large neck veins (JVD), Lethargy, Irregular HR, Nocturia, Girth (ascites). Left HF = DROWNING: Dyspnea, Rales, Orthopnea, Weakness, Nocturnal dyspnea, Increased HR, Nagging cough, Gaining weight.'},
{id:'m6_15',mod:'m6',drug:false,type:'mc',q:'Ventricular fibrillation (V-fib) on the cardiac monitor shows:',opts:['Regular wide QRS complexes at 180 bpm with no P waves','Chaotic irregular waveforms with no identifiable P waves QRS or T waves','Regular narrow QRS at 250 bpm with sawtooth flutter waves','Occasional premature wide QRS beats interrupting a normal sinus rhythm'],ans:[1],rationale:'V-fib: ventricles quiver chaotically — no coordinated contraction, no cardiac output. ECG shows chaotic, irregular waveforms with no discernible P waves, QRS complexes, or T waves. This is a lethal arrhythmia — patient is unresponsive and pulseless.',pearl:'V-fib = chaotic = NO cardiac output = cardiac arrest. Treatment: IMMEDIATE unsynchronized defibrillation + CPR. Do NOT delay defibrillation for anything. V-tach with pulse = synchronized cardioversion. V-tach without pulse or V-fib = unsynchronized defibrillation.'},
{id:'m6_16',mod:'m6',drug:true,type:'mc',q:'Loop diuretics (furosemide/Lasix) work to reduce preload in heart failure by:',opts:['Blocking aldosterone receptors in the collecting duct retaining potassium','Inhibiting the Na+/K+/2Cl- cotransporter in the loop of Henle causing significant sodium and water excretion','Blocking Na+/Cl- cotransporter in the distal convoluted tubule','Osmotically pulling fluid into the tubule in the proximal tubule'],ans:[1],rationale:'Loop diuretics inhibit the Na+/K+/2Cl- cotransporter in the thick ascending limb of the loop of Henle → blocks reabsorption of Na+, K+, and Cl- → large water loss. Most potent diuretic class.',pearl:'Loop diuretics = most potent. Furosemide (Lasix) side effects: hypokalemia (watch ECG), hypocalcemia, hypomagnesemia, ototoxicity (high doses or rapid IV). Give in morning to avoid nocturia. Check K+ before and after administration.'},
{id:'m6_17',mod:'m6',drug:false,type:'mc',q:'Which is a MAJOR Framingham criterion for diagnosing heart failure?',opts:['Ankle edema bilaterally','Nocturnal cough waking patient from sleep','Paroxysmal nocturnal dyspnea (PND) or orthopnea','Mild tachycardia (HR 100-120 bpm)'],ans:[2],rationale:'Framingham major criteria include: PND or orthopnea, neck vein distension, crackles, cardiomegaly on CXR, acute pulmonary edema, S3 gallop, elevated CVP, hepatojugular reflux. Minor criteria include ankle edema, nocturnal cough, dyspnea on exertion, tachycardia.',pearl:'Diagnosis requires two major OR one major + two minor criteria. PND (paroxysmal nocturnal dyspnea) = waking at night gasping for air — classic left HF. Orthopnea = dyspnea when lying flat (needs multiple pillows to breathe) — also classic left HF. Both are major criteria.'},
{id:'m6_18',mod:'m6',drug:false,type:'mc',q:'The ankle-brachial index (ABI) is used to assess which condition?',opts:['Heart failure severity and fluid status','Peripheral artery disease (PAD) — reduced arterial blood flow to lower extremities','Deep vein thrombosis in the lower extremities','Aortic valve stenosis severity'],ans:[1],rationale:'ABI = ankle systolic BP divided by arm systolic BP. Normal ABI 1.0+. ABI 0.41-0.90 = mild-moderate PAD. ABI 0.40 or below = severe PAD (critical limb ischemia). PAD causes intermittent claudication (calf pain with walking, relieved by rest), decreased pulses, cool extremities, hair loss.',pearl:'ABI: Normal 1.0+. Mild PAD 0.70-0.90. Moderate 0.41-0.69. Severe 0.40 or below. ABI >1.3 = non-compressible calcified vessels (diabetes, CKD) — falsely elevated. Use toe-brachial index (TBI) instead for diabetics.'},
{id:'m6_19',mod:'m6',drug:true,type:'mc',q:'Beyond its diuretic effect, spironolactone provides which additional benefit in heart failure?',opts:['Directly increases myocardial contractility as a positive inotrope','Blocks aldosterone preventing cardiac fibrosis and adverse remodeling in addition to promoting potassium-sparing diuresis','Reduces heart rate through beta-1 receptor blockade','Dilates coronary arteries improving myocardial oxygen delivery'],ans:[1],rationale:'Spironolactone is an aldosterone antagonist. In HF, chronic aldosterone elevation causes cardiac fibrosis and adverse remodeling. Spironolactone blocks aldosterone → reduces cardiac remodeling + K+-sparing diuresis. Reduces mortality in moderate-severe HF (RALES trial).',pearl:'Spironolactone in HF: mortality benefit beyond just diuresis. Side effects: hyperkalemia (monitor K+ closely especially with ACE inhibitors/ARBs), gynecomastia in men (anti-androgen effect — switch to eplerenone if problematic). Triple neurohormonal blockade in HF = ACE-I + beta-blocker + aldosterone antagonist.'},
{id:'m6_20',mod:'m6',drug:false,type:'mc',q:'Prinzmetal (vasospastic) angina is BEST treated with:',opts:['Beta-blockers to reduce heart rate and myocardial oxygen demand','Calcium channel blockers to prevent coronary artery vasospasm','Aspirin alone for antiplatelet effect','Thiazide diuretics to reduce preload and cardiac work'],ans:[1],rationale:'Prinzmetal angina is caused by coronary artery vasospasm (not plaque obstruction). Calcium channel blockers relax vascular smooth muscle → prevent vasospasm. Beta-blockers may worsen vasospasm in some patients (unmasked alpha-mediated vasoconstriction).',pearl:"Prinzmetal angina: vasospasm at rest, often at night or early morning, ST elevation DURING episode (returns to normal after), associated with cocaine use and smoking. Treatment: calcium channel blockers + nitrates. Avoid beta-blockers. Cocaine is a classic trigger — always ask about cocaine use in young patients with chest pain."},
{id:'m6_21',mod:'m6',drug:false,type:'mc',q:'Which parameter BEST represents afterload on the left ventricle?',opts:['Central venous pressure (CVP) — reflects right ventricular filling pressure','Pulmonary artery wedge pressure (PAWP) — reflects left ventricular filling pressure','Systemic vascular resistance (SVR) / mean arterial pressure','Left ventricular end-diastolic volume (LVEDV) — reflects preload'],ans:[2],rationale:'Afterload = the resistance the ventricle must overcome to eject blood. For the left ventricle, this is primarily systemic vascular resistance (SVR) and aortic pressure. High afterload (HTN, aortic stenosis, vasoconstriction) = harder for the ventricle to eject = reduced stroke volume.',pearl:'Preload vs Afterload: Preload = ventricular filling volume before contraction (CVP for RV, PAWP for LV). Afterload = resistance against ejection (SVR for LV, PVR for RV). Improve cardiac output: reduce preload (diuretics) and/or reduce afterload (ACE inhibitors, vasodilators).'},
{id:'m6_22',mod:'m6',drug:false,type:'sata',q:'Which are MODIFIABLE cardiovascular risk factors for CAD? Select all that apply.',opts:['Hypertension','Age over 65 years','Smoking','Family history of premature CAD','Hyperlipidemia (high LDL low HDL)','Diabetes mellitus','Male sex'],ans:[0,2,4,5],rationale:'Modifiable CAD risk factors: HTN, smoking, hyperlipidemia (high LDL/low HDL), diabetes mellitus, obesity, physical inactivity, unhealthy diet. Non-modifiable: age, male sex, family history of premature CAD (<55 in male first-degree relative, <65 in female).',pearl:'Framingham Risk Score estimates 10-year cardiovascular risk. Managing modifiable factors is the focus of primary prevention. Statins, antihypertensives, smoking cessation, and lifestyle changes form the cornerstone of CAD prevention.'},
{id:'m6_23',mod:'m6',drug:true,type:'mc',q:'The correct nursing instruction for sublingual nitroglycerin is:',opts:['Swallow the tablet for the fastest absorption into systemic circulation','Take up to 5 tablets every 5 minutes if chest pain persists','Take 1 tablet SL every 5 minutes x3; if pain unrelieved after 3 tablets call 911 immediately','Take only at bedtime to prevent daytime hypotension'],ans:[2],rationale:'NTG SL protocol: 1 tablet every 5 minutes x3 doses. If pain NOT relieved after 3 doses (15 minutes total) = call 911 immediately — likely unstable angina or MI. Must be placed UNDER the tongue (sublingual) NOT swallowed.',pearl:"NTG SL: sublingual placement, sit or lie down (causes hypotension — prevent falls), burning/tingling means it is active, store in dark glass bottle away from heat, replace every 6 months (loses potency). Headache = vasodilation is working. 3 doses with no relief → 911."},
// M7 additions: m7_11 to m7_23
{id:'m7_11',mod:'m7',drug:false,type:'mc',q:'Surfactant is produced by which lung cells and what is its primary function?',opts:['Goblet cells — produce mucus to trap inhaled pathogens and particles','Type II alveolar (pneumocyte) cells — reduces surface tension preventing alveolar collapse on exhalation','Mast cells — trigger immune response to inhaled allergens','Clara cells — produce antioxidants to protect against oxygen toxicity'],ans:[1],rationale:'Surfactant is produced by Type II pneumocytes. It reduces surface tension in alveoli, preventing collapse on exhalation (atelectasis). Premature infants lack surfactant → Neonatal Respiratory Distress Syndrome (NRDS). Exogenous surfactant (beractant) is given to premature infants.',pearl:'Surfactant deficiency in premature infants → NRDS: grunting, nasal flaring, intercostal retractions, hypoxia. Prevention: antenatal corticosteroids (betamethasone) to accelerate fetal lung maturity. Treatment: exogenous surfactant replacement + CPAP/mechanical ventilation.'},
{id:'m7_12',mod:'m7',drug:false,type:'mc',q:'The MOST common trigger for COPD exacerbations is:',opts:['Air pollution and high ozone days','Respiratory infections (viral most common; bacterial include H. influenzae and S. pneumoniae)','Emotional stress and anxiety','Dietary changes and poor oral hydration'],ans:[1],rationale:'The most common COPD exacerbation triggers are respiratory infections — viral (rhinovirus, influenza, RSV) are more common than bacterial. Annual flu vaccine and pneumococcal vaccine are essential COPD preventive care.',pearl:'COPD exacerbation management: SABA + ipratropium (bronchodilators), systemic corticosteroids (short course 5-7 days), antibiotics if bacterial signs (purulent sputum + fever), supplemental O2 (target SpO2 88-92%), consider NIPPV/BiPAP for acute respiratory failure.'},
{id:'m7_13',mod:'m7',drug:true,type:'mc',q:'Ipratropium (Atrovent) is an anticholinergic bronchodilator. Its side effects are BEST described as:',opts:['Bronchospasm, tachycardia, and hypertension from sympathomimetic stimulation','Dry mouth, urinary retention, constipation, and blurred vision (anticholinergic effects)','Bone marrow suppression and oral candidiasis from immune suppression','Hypokalemia and hyperglycemia from systemic adrenergic absorption'],ans:[1],rationale:'Ipratropium blocks muscarinic ACh receptors → bronchodilation + drying secretions. Anticholinergic side effects: dry mouth (most common), urinary retention (caution in BPH), constipation, blurred vision (caution in narrow-angle glaucoma), tachycardia.',pearl:"Anticholinergic effects: Can't see (blurred vision), Can't spit (dry mouth), Can't pee (urinary retention), Can't poop (constipation), Flush and Fast (flushing and tachycardia). Same for all anticholinergics: ipratropium, tiotropium, benztropine, oxybutynin, diphenhydramine."},
{id:'m7_14',mod:'m7',drug:false,type:'mc',q:"Aspirin-exacerbated respiratory disease (AERD/Samter's triad) is an example of:",opts:['IgE-mediated allergy to aspirin causing typical anaphylaxis','Intrinsic asthma where NSAIDs shift arachidonic acid to the leukotriene pathway causing severe bronchospasm','A predictable pharmacological side effect of all NSAIDs unrelated to the immune system','Cholinergic bronchospasm from aspirin effects on the vagus nerve'],ans:[1],rationale:"AERD (Samter's triad): chronic rhinosinusitis + nasal polyps + aspirin/NSAID-triggered asthma. NSAID inhibition of COX-1 shifts arachidonic acid to leukotriene pathway → excess leukotrienes → severe bronchospasm. NOT IgE-mediated.",pearl:"AERD = Samter's Triad: Asthma + Aspirin/NSAID sensitivity + Nasal polyps. Avoid ALL NSAIDs (ibuprofen, naproxen, aspirin including low dose). Treatment: leukotriene receptor antagonists (montelukast), nasal steroids. Acetaminophen is generally safe in AERD patients for pain relief."},
{id:'m7_15',mod:'m7',drug:false,type:'mc',q:'Hypoxemia (PaO2 <60 mmHg) triggers which physiologic respiratory response?',opts:['Decreased respiratory rate to conserve energy and reduce metabolic demand','Stimulation of peripheral chemoreceptors (carotid and aortic bodies) increasing respiratory drive and rate','Bronchodilation via the Hering-Breuer reflex to improve gas exchange','Decreased heart rate to reduce overall oxygen consumption'],ans:[1],rationale:'When PaO2 drops below 60 mmHg, peripheral chemoreceptors (carotid bodies) are stimulated → signal brainstem respiratory centers → increased respiratory rate and depth → more oxygen intake. CO2 is the PRIMARY respiratory driver; hypoxia is the secondary backup.',pearl:"Normal breathing: CO2 drives it (central chemoreceptors in medulla). COPD patients: chronically high CO2 → desensitized to CO2 → O2 becomes the driver (hypoxic drive). At SpO2 90%, PaO2 is approximately 60 mmHg — the steep part of the oxyhemoglobin dissociation curve where small PaO2 drops cause large SpO2 decreases."},
{id:'m7_16',mod:'m7',drug:true,type:'mc',q:'Montelukast (Singulair) for asthma has an FDA black box warning for:',opts:['Hepatotoxicity — monthly LFT monitoring required','Bone marrow suppression — monthly CBC monitoring required','Neuropsychiatric effects including mood changes, depression, and suicidal ideation','QT prolongation requiring baseline and periodic ECG monitoring'],ans:[2],rationale:'Montelukast has an FDA black box warning for neuropsychiatric effects: agitation, aggression, depression, insomnia, nightmares, suicidal ideation and behavior. The risk must be weighed against benefits, especially for mild asthma where other options are available.',pearl:'Montelukast (Singulair) black box = neuropsychiatric effects. Teach families: monitor for mood/behavior changes, depression, unusual dreams, suicidal thoughts — report immediately. Not first-line for mild asthma anymore due to this risk. Reserve for patients inadequately controlled on ICS alone or for comorbid allergic rhinitis.'},
{id:'m7_17',mod:'m7',drug:false,type:'mc',q:'Which spirometry pattern indicates RESTRICTIVE lung disease?',opts:['Decreased FEV1/FVC ratio (<70%) with normal total lung capacity','Normal or elevated FEV1/FVC ratio with decreased FVC and decreased TLC','Increased total lung capacity with air trapping and prolonged exhalation','Markedly decreased FEV1 with normal FVC and elevated TLC'],ans:[1],rationale:'Restrictive lung disease (pulmonary fibrosis, obesity, pleural effusion, neuromuscular weakness): lungs cannot fully expand → decreased FVC and TLC. FEV1 also reduced proportionally → FEV1/FVC ratio is NORMAL or slightly elevated. Problem is INHALATION not exhalation.',pearl:'Obstructive: FEV1/FVC <70%, increased TLC (air trapping). Restrictive: FEV1/FVC normal, decreased FVC and TLC. Obstructive examples: COPD, asthma. Restrictive: pulmonary fibrosis, obesity, kyphoscoliosis, ALS, neuromuscular disease, pleural effusion.'},
{id:'m7_18',mod:'m7',drug:true,type:'mc',q:'When both a bronchodilator and inhaled corticosteroid (ICS) are prescribed, which order is correct?',opts:['ICS first (opens airways allowing deeper bronchodilator penetration)','Use simultaneously only via a combination inhaler','Bronchodilator first (dilates airways for better ICS delivery), wait 5 minutes, then ICS','The order does not matter — both achieve therapeutic effect regardless'],ans:[2],rationale:'Bronchodilator FIRST to dilate the airways → better airflow → ICS inhaled afterward can penetrate deeper into the lungs for greater anti-inflammatory effect. Then rinse mouth after ICS to prevent oral candidiasis.',pearl:"Inhaler order: B before C = Bronchodilator before Corticosteroid. After ICS = rinse mouth (prevent thrush). Metered-dose inhaler technique: shake, exhale fully, slow deep inhalation coordinated with actuation, hold breath 10 seconds. Spacer/valved holding chamber improves delivery for children and poor coordinators."},
{id:'m7_19',mod:'m7',drug:false,type:'mc',q:'A patient has pleural effusion (fluid in the pleural space). Percussion of the affected side would reveal:',opts:['Hyperresonance (tympanic quality) due to trapped air','Dullness over the area of fluid accumulation','Normal resonance throughout the chest wall','Hyperresonance at the base and dullness at the apex'],ans:[1],rationale:'Pleural effusion = fluid between visceral and parietal pleura. Fluid is denser than air-filled lung tissue → dullness on percussion over the fluid. Auscultation: absent or decreased breath sounds over the effusion. CXR: opacification with meniscus sign.',pearl:'Percussion findings: Dullness = fluid/consolidation (pleural effusion, pneumonia, hemothorax). Hyperresonance = excess air (pneumothorax, emphysema). Normal = resonance. Always percuss the chest systematically to identify these sounds and correlate with auscultation findings.'},
{id:'m7_20',mod:'m7',drug:false,type:'mc',q:'Healthcare-associated pneumonia (HCAP) differs from community-acquired pneumonia primarily because:',opts:['HCAP is always caused by viral organisms; CAP is always bacterial','HCAP commonly involves multidrug-resistant organisms (MDROs) requiring broader antibiotic coverage','HCAP never occurs in immunocompetent patients','HCAP has a better prognosis due to earlier diagnosis in the hospital setting'],ans:[1],rationale:'HCAP occurs 48+ hours after hospitalization (or in patients from nursing homes, dialysis centers). It involves MDROs (MRSA, Pseudomonas, Acinetobacter, drug-resistant Enterobacteriaceae) unlike CAP. Broader empirical antibiotic coverage is required.',pearl:'HCAP pathogens: MRSA, Pseudomonas aeruginosa, Acinetobacter, drug-resistant gram-negatives. Treatment: vancomycin/linezolid (for MRSA) + antipseudomonal beta-lactam. Risk factors: hospitalization >5 days, recent antibiotics, immunosuppression, structural lung disease, ventilator use.'},
{id:'m7_21',mod:'m7',drug:false,type:'mc',q:'Carbon monoxide (CO) poisoning causes hypoxia despite a NORMAL PaO2 because:',opts:['CO destroys alveolar tissue preventing gas exchange from occurring','CO binds hemoglobin with 200+ times greater affinity than oxygen forming carboxyhemoglobin that cannot carry O2','CO inhibits mitochondrial cytochrome c oxidase only at the cellular level','CO causes severe bronchoconstriction preventing adequate oxygen inhalation'],ans:[1],rationale:'CO binds hemoglobin with ~240x greater affinity than O2 → forms carboxyhemoglobin (COHgb) which cannot carry oxygen → functional anemia despite normal PaO2. Pulse oximetry is FALSELY NORMAL in CO poisoning (cannot distinguish COHgb from OxyHgb).',pearl:'CO poisoning: normal SpO2 on pulse oximeter (falsely reassuring), headache, confusion, syncope. Treatment: 100% O2 (displaces CO from Hgb), hyperbaric O2 for severe cases. Standard pulse ox is unreliable — co-oximetry or ABG needed for accurate COHgb measurement.'},
{id:'m7_22',mod:'m7',drug:true,type:'mc',q:'N-acetylcysteine (Mucomyst) used as a mucolytic works by:',opts:['Inhibiting the cough center in the medulla to suppress unproductive cough','Breaking disulfide bonds in mucus glycoproteins reducing their viscosity and making them easier to expectorate','Stimulating goblet cells to switch from thick to thin watery mucus secretion','Directly killing bacteria colonizing the airways through antimicrobial properties'],ans:[1],rationale:'Acetylcysteine (Mucomyst) cleaves disulfide bonds in mucoproteins → reduces viscosity → easier to expectorate. Used for COPD, cystic fibrosis, chronic bronchitis. Also used IV as the antidote for acetaminophen overdose (replenishes glutathione).',pearl:'Acetylcysteine dual role: (1) Mucolytic — breaks disulfide bonds, thins mucus. (2) Acetaminophen overdose antidote — replenishes glutathione preventing hepatotoxicity. Side effect when inhaled: may trigger bronchospasm — always pretreat with bronchodilator in asthma patients.'},
{id:'m7_23',mod:'m7',drug:false,type:'sata',q:'Which are classic signs of tension pneumothorax requiring immediate needle decompression? Select all that apply.',opts:['Tracheal deviation AWAY from the affected side','Absent breath sounds on the affected side','Jugular venous distension (JVD) from impaired venous return','Hypotension and obstructive shock from mediastinal compression','Bilateral expiratory wheezing'],ans:[0,1,2,3],rationale:'Tension pneumothorax: air enters pleural space and cannot escape → builds pressure → pushes mediastinum to opposite side (tracheal deviation AWAY from affected side) → compresses great vessels (JVD, hypotension/shock) + absent breath sounds on affected side. Medical emergency.',pearl:"Tension pneumo: Tracheal deviation AWAY (contralateral) + Hyperresonance on affected side + Absent breath sounds + JVD + Hypotension. Treatment: DON'T wait for CXR — immediate needle decompression (2nd intercostal space, midclavicular line), then chest tube. This is a clinical diagnosis."},
// M8 additions: m8_11 to m8_22
{id:'m8_11',mod:'m8',drug:false,type:'mc',q:'A patient has serum creatinine of 3.8 mg/dL. Which medication should the nurse flag for the provider?',opts:['Acetaminophen 500mg PO PRN pain','Metformin 1000mg PO BID','Aspirin 81mg PO daily','Atorvastatin 40mg PO daily'],ans:[1],rationale:'Metformin is contraindicated with significant renal impairment. Creatinine 3.8 mg/dL indicates severely reduced GFR. Metformin accumulates in renal failure → impaired clearance → lactic acidosis (elevated blood lactate, metabolic acidosis) which can be fatal.',pearl:'Metformin contraindications: GFR <30 = contraindicated. GFR 30-45 = use with caution. Hold before IV contrast and for 48 hours after. Hold during acute illness (dehydration can acutely impair kidneys). Lactic acidosis signs: hyperventilation, myalgias, GI symptoms, altered consciousness.'},
{id:'m8_12',mod:'m8',drug:false,type:'mc',q:'Hydronephrosis develops when:',opts:['The kidney produces too much urine from excess ADH stimulation','Obstruction of urine outflow causes urine to back up distending the renal pelvis and calyces','The kidney undergoes bilateral inflammatory glomerulonephritis','Insufficient ADH causes excessive dilute urine production overwhelming renal capacity'],ans:[1],rationale:'Hydronephrosis = abnormal dilation of the renal pelvis and calyces due to obstruction of urine outflow. Causes: BPH (most common in men), kidney stones, tumors, urethral stricture, pregnancy. Chronic hydronephrosis → CKD → ESRD if untreated.',pearl:'Hydronephrosis management: treat the obstruction. BPH → alpha-blockers/5-alpha reductase inhibitors or TURP. Kidney stones → lithotripsy or ureteroscopy. Tumors → oncologic management. Temporary ureteral stent or nephrostomy tube to decompress the kidney.'},
{id:'m8_13',mod:'m8',drug:true,type:'mc',q:'Oxybutynin (Ditropan) for overactive bladder — its mechanism and PRIMARY side effect are:',opts:['Alpha-blocker — relaxes prostate and bladder neck causing hypotension and dizziness','Anticholinergic — blocks bladder smooth muscle spasm; causes dry mouth, urinary retention, constipation, and confusion','5-alpha reductase inhibitor — shrinks prostate reducing urinary obstruction over months','Beta-3 agonist — relaxes detrusor without systemic anticholinergic effects'],ans:[1],rationale:'Oxybutynin blocks muscarinic receptors in the bladder wall → reduces uninhibited detrusor contractions → decreases urgency, frequency, and incontinence. Anticholinergic side effects: dry mouth (most common), constipation, blurred vision, urinary retention, confusion (especially in elderly — BBB penetration).',pearl:"Anticholinergic drugs in elderly = Beers Criteria concern (confusion, falls, urinary retention). Oxybutynin crosses BBB more than newer agents. Alternatives with less CNS effects: solifenacin (VESIcare), trospium (does not cross BBB well). Beta-3 agonist mirabegron = newer, fewer anticholinergic side effects, watch for hypertension."},
{id:'m8_14',mod:'m8',drug:false,type:'mc',q:'UTIs are more common in women primarily because:',opts:['Women have a weaker immune response to gram-negative bacteria','Women have a shorter urethra and closer proximity of the urethral meatus to the anus','Women have lower urine acidity allowing bacterial overgrowth','Women have a larger bladder with longer urine retention promoting bacterial growth'],ans:[1],rationale:'Anatomically: women have a shorter urethra (4 cm vs 20 cm in men) allowing bacteria easier access to the bladder, and the urethral opening is near the vagina and anus (colonized with E. coli and other bacteria). Women are 4x more likely than men to develop UTIs.',pearl:'UTI risk factors: female anatomy, sexual activity (honeymoon cystitis), urinary catheters (CAUTI = #1 healthcare-associated infection), diabetes (glucosuria feeds bacteria, reduced immunity), pregnancy (uterine compression causing urinary stasis), menopause (reduced estrogen alters vaginal flora).'},
{id:'m8_15',mod:'m8',drug:false,type:'mc',q:'Which acid-base disturbance is MOST common in chronic kidney disease?',opts:['Respiratory acidosis from decreased pulmonary perfusion','Metabolic alkalosis from bicarbonate retention by diseased tubules','Metabolic acidosis from impaired acid excretion and decreased bicarbonate generation','Respiratory alkalosis from compensatory hyperventilation being the primary disorder'],ans:[2],rationale:'CKD impairs renal acid excretion (H+ ions accumulate) AND reduces bicarbonate generation (kidneys are the source of new HCO3-) → metabolic acidosis (low pH, low HCO3-). The respiratory system compensates by hyperventilating (Kussmaul in severe cases).',pearl:'CKD = metabolic acidosis. Acidosis worsens hyperkalemia (H+ moves into cells, K+ moves out) and bone disease (bones buffer acid by releasing calcium/phosphate). Treatment: oral sodium bicarbonate supplementation, dietary acid reduction.'},
{id:'m8_16',mod:'m8',drug:false,type:'mc',q:'A 24-hour urine shows proteinuria of 3.8 grams (normal <150 mg). This level of proteinuria indicates:',opts:['Normal variation after vigorous exercise — common in athletes','Nephrotic syndrome — massive proteinuria leading to hypoalbuminemia, edema, and hyperlipidemia','Mild UTI with proteinaceous bacterial debris in the urine','Early CKD stage 1 with no other clinical significance'],ans:[1],rationale:'Nephrotic syndrome = massive proteinuria (>3.5 g/day) → hypoalbuminemia (low oncotic pressure) → generalized edema/anasarca → hyperlipidemia (liver compensates by making more lipoproteins). Causes: diabetic nephropathy (most common in adults), minimal change disease (most common in children).',pearl:'Nephrotic syndrome: massive proteinuria + hypoalbuminemia + generalized edema + hyperlipidemia + lipiduria (oval fat bodies in urine). Compare nephritic syndrome: hematuria + hypertension + oliguria + mild proteinuria (post-strep GN, IgA nephropathy). Nephrotic = protein loss. Nephritic = inflammation/bleeding.'},
{id:'m8_17',mod:'m8',drug:false,type:'mc',q:'A patient in AKI has K+ of 6.5 mEq/L with peaked T waves on ECG. The MOST urgent intervention is:',opts:['Administer furosemide to increase urinary potassium excretion','Administer IV calcium gluconate to stabilize the cardiac membrane immediately','Administer sodium bicarbonate to shift potassium into cells','Restrict dietary potassium and recheck in 4 hours'],ans:[1],rationale:'Hyperkalemia with ECG changes = cardiac emergency. Calcium gluconate IV is given FIRST to stabilize the cardiac membrane and prevent arrhythmias (it does NOT lower K+ — it only protects the heart while other treatments lower K+ more slowly).',pearl:'Hyperkalemia treatment sequence CB-DIRT: Calcium gluconate (cardiac membrane stabilization — works in minutes), Bicarbonate (shifts K+ intracellularly), Dextrose + Insulin (shifts K+ into cells), Resin (removes K+ from GI tract), Dialysis (definitive). Calcium protects the heart but does not lower K+ — this distinction is critical.'},
{id:'m8_18',mod:'m8',drug:true,type:'mc',q:'Nitrofurantoin (Macrobid) for UTI is CONTRAINDICATED in:',opts:['Young women aged 18-40 with uncomplicated UTI','Patients with penicillin allergy','Patients with GFR <30 mL/min (significant renal impairment)','Patients who have previously taken fluoroquinolones for UTI'],ans:[2],rationale:'Nitrofurantoin requires adequate renal function to concentrate in the urine — it achieves therapeutic concentrations ONLY in the urine. In renal failure (GFR <30), drug does not concentrate adequately in urine (ineffective) AND accumulates systemically causing toxicity (peripheral neuropathy, pulmonary toxicity).',pearl:'Nitrofurantoin (Macrobid): treats lower UTI only (bladder/urethra — does NOT treat pyelonephritis/upper UTI). Contraindicated: GFR <30. Side effects: GI upset (take with food), peripheral neuropathy (long-term use), pulmonary hypersensitivity (rare). Useful when resistance to other antibiotics is a concern.'},
{id:'m8_19',mod:'m8',drug:false,type:'mc',q:'Pyelonephritis differs from cystitis in that pyelonephritis:',opts:['Affects only the bladder mucosa without systemic inflammatory symptoms','Involves the kidney parenchyma and causes systemic symptoms including flank pain, fever, and CVA tenderness','Is always caused by Candida organisms unlike cystitis which is typically bacterial','Requires only 3 days of antibiotic therapy unlike cystitis'],ans:[1],rationale:'Pyelonephritis = upper UTI involving the kidney. Systemic symptoms: high fever, chills, flank pain, CVA tenderness (costovertebral angle tenderness on palpation/percussion), nausea/vomiting, possible bacteremia/sepsis. Cystitis = lower UTI (bladder): frequency, dysuria, suprapubic pain, no systemic symptoms.',pearl:'UTI classification: Lower (cystitis, urethritis) = dysuria, frequency, urgency — treat 3-7 days. Upper (pyelonephritis) = systemic symptoms, CVA tenderness — treat 10-14 days, may need IV antibiotics. Always assess CVA tenderness in UTI patients to distinguish lower from upper UTI.'},
{id:'m8_20',mod:'m8',drug:false,type:'mc',q:'Hemodialysis three times weekly for ESRD works by:',opts:['Producing urine by stimulating residual kidney function with ultrafiltration','Filtering blood through an artificial membrane removing uremic toxins, excess fluid, and correcting electrolyte imbalances','Replacing the need for all medications by correcting all metabolic abnormalities','Permanently restoring kidney function through repeated stimulation of nephron regeneration'],ans:[1],rationale:'Hemodialysis uses a dialyzer (artificial kidney) with a semipermeable membrane. Blood circulates through the dialyzer — toxins and excess fluid move across the membrane via diffusion, osmosis, and ultrafiltration into dialysate → cleansed blood returned to patient. It does NOT restore kidney function.',pearl:'HD three times per week: strict fluid restriction (1-1.5L/day between sessions), dietary restrictions (low K+, low phosphorus, low sodium). Weight gain limit: no more than 1-2 kg between sessions. Assess AV fistula every shift: palpate thrill (should feel buzzing), auscultate bruit (should hear rushing sound).'},
{id:'m8_21',mod:'m8',drug:false,type:'mc',q:'A pregnant patient at 30 weeks develops oliguria, elevated creatinine, and hypertension. The nurse suspects:',opts:['Normal physiological changes of late pregnancy','Pre-eclampsia with renal involvement — requires urgent evaluation and possible delivery','Physiological third-trimester fluid redistribution to the uteroplacental circulation','A simple UTI-associated acute cystitis without systemic significance'],ans:[1],rationale:'Pre-eclampsia: hypertension (BP 140/90+) + proteinuria +/- end-organ damage (renal, hepatic, neurological, hematologic) after 20 weeks gestation. Renal involvement causes oliguria and rising creatinine. Oliguria in pregnancy = serious — can rapidly progress to eclampsia or HELLP syndrome.',pearl:'Pre-eclampsia warning signs: severe headache, visual changes (scotoma/flashing lights), RUQ/epigastric pain (liver capsule distension), rapid weight gain. HELLP = Hemolysis + Elevated Liver enzymes + Low Platelets — obstetric emergency. Treatment: magnesium sulfate (seizure prevention), antihypertensives, delivery (definitive).'},
{id:'m8_22',mod:'m8',drug:false,type:'sata',q:'Which are appropriate dietary recommendations for a patient with CKD? Select all that apply.',opts:['Restrict potassium intake (limit bananas, oranges, potatoes)','Restrict phosphorus intake (limit dairy, nuts, seeds, dark colas)','Restrict protein to reduce nitrogen waste products and BUN','Increase sodium intake to prevent hyponatremia','Restrict fluid intake to prevent volume overload'],ans:[0,1,2,4],rationale:'CKD dietary restrictions: Potassium (hyperkalemia risk), Phosphorus (hyperphosphatemia causes bone disease and vascular calcification), Protein in advanced CKD (reduces uremic burden), Fluid (prevent volume overload). Sodium should be RESTRICTED to control HTN and prevent fluid retention — NOT increased.',pearl:'CKD diet = PPFS restriction: Potassium, Phosphorus, Fluid, Sodium (and Protein in advanced CKD). Phosphorus binders (calcium carbonate, sevelamer) taken WITH meals to block GI absorption. Hyperkalemia and hyperphosphatemia are the most dangerous electrolyte abnormalities in CKD.'},
// M9 additions: m9_13 to m9_23
{id:'m9_13',mod:'m9',drug:false,type:'mc',q:'Thyroid storm is a life-threatening emergency. Which cluster of findings is MOST characteristic?',opts:['Hypothermia, bradycardia, constipation, and myxedematous changes','High fever, severe tachycardia, hypertension, agitation, and altered mental status','Moon face, buffalo hump, hyperglycemia, and hypertension','Muscle cramps, tetany, and positive Chvostek sign'],ans:[1],rationale:'Thyroid storm = extreme hyperthyroidism from sudden surge or decompensation. Triggers: acute illness, surgery, trauma. Manifestations: fever (often >40 degrees C), severe tachycardia/dysrhythmias, hypertension, agitation, confusion → seizures/coma. High mortality without immediate treatment.',pearl:'Thyroid storm treatment: PTU or methimazole (block new hormone synthesis) then iodine (blocks release of preformed hormone — Wolff-Chaikoff effect — give AFTER antithyroid drugs), beta-blockers (control HR), steroids (reduce T4 to T3 conversion), cooling measures, treat precipitating cause.'},
{id:'m9_14',mod:'m9',drug:false,type:'mc',q:'A patient with diabetes insipidus (DI) would present with which clinical pattern?',opts:['Low urine output with concentrated urine and hyponatremia from water retention','Massive polyuria with dilute urine (low specific gravity) and hypernatremia from massive water loss','Concentrated urine with peripheral edema and dilutional hyponatremia','Polyuria with glucosuria and ketones in the urine'],ans:[1],rationale:'DI: insufficient ADH (central DI) or kidneys unresponsive to ADH (nephrogenic DI) → cannot concentrate urine → massive polyuria (up to 3-20 L/day) → dilute urine (specific gravity <1.005) → dehydration → hypernatremia. Patient is intensely thirsty.',pearl:'DI = Dry Inside: polyuria + polydipsia + dilute urine + hypernatremia. Central DI treatment: desmopressin (DDAVP — synthetic ADH). Nephrogenic DI treatment: thiazide diuretics (paradoxically decrease urine output by creating mild volume depletion) + low-sodium diet + treat underlying cause.'},
{id:'m9_15',mod:'m9',drug:false,type:'mc',q:"Graves' disease causes hyperthyroidism through which autoimmune mechanism?",opts:["Type II cytotoxic — antibodies destroy thyroid follicular cells reducing hormone production","Type III immune complex — antibodies deposit in thyroid causing inflammation","Stimulatory autoantibodies (TSI) that mimic TSH and continuously activate thyroid hormone production without normal negative feedback","Type IV cell-mediated — T cells destroy thyroid follicular cells over time"],ans:[2],rationale:"Graves' disease: TSI (thyroid-stimulating immunoglobulin) antibodies mimic TSH → bind TSH receptors on thyroid → continuous hormone production without normal negative feedback → persistent hyperthyroidism. This is a stimulatory (not destructive) autoimmune mechanism.",pearl:"Graves' disease triad: hyperthyroidism + exophthalmos (bulging eyes from retroorbital inflammation — unique to Graves') + pretibial myxedema. More common in women under 40. Treatment options: antithyroid drugs (methimazole first-line, PTU in 1st trimester), radioactive iodine (RAI), or thyroidectomy."},
{id:'m9_16',mod:'m9',drug:true,type:'mc',q:'Methimazole (Tapazole) for hyperthyroidism — which serious adverse effect requires immediate reporting?',opts:['Mild rash and pruritus — common, continue medication with antihistamine','Agranulocytosis — severe WBC decrease dramatically increasing infection risk','Hair thinning — expected and reversible side effect of antithyroid therapy','Weight gain of 2 pounds — expected as hyperthyroidism resolves'],ans:[1],rationale:'Agranulocytosis (severe granulocyte depletion, <1% of patients) is life-threatening. Patient develops sudden fever and sore throat — must STOP the drug immediately and seek emergency medical care. CBC shows severely reduced WBCs. Methimazole and PTU both carry this risk.',pearl:'Antithyroid drug warning: sudden fever + sore throat = STOP the drug immediately + call provider. This is agranulocytosis until proven otherwise. Do NOT wait to see if symptoms resolve. Also monitor for drug-induced hepatitis (methimazole) and ANCA-positive vasculitis (PTU). PTU used in first trimester pregnancy; methimazole preferred thereafter.'},
{id:'m9_17',mod:'m9',drug:false,type:'mc',q:'A patient with Type 2 diabetes has HbA1c of 8.9%. The nurse understands:',opts:['Blood glucose has been well-controlled — HbA1c is at target','Average blood glucose has been elevated over the past 2-3 months indicating poor control and increased complications risk','This represents only an acute hyperglycemic episode not reflecting chronic control','HbA1c of 8.9% is within the normal range for Type 2 diabetes'],ans:[1],rationale:'HbA1c reflects average blood glucose over 2-3 months. Normal <5.7%. Prediabetes 5.7-6.4%. Diabetic target <7% (for most patients). HbA1c 8.9% = poorly controlled DM → increased risk of microvascular complications (retinopathy, nephropathy, neuropathy) and macrovascular disease.',pearl:'HbA1c to estimated average glucose (eAG): 7% = ~154 mg/dL. 8% = ~183 mg/dL. 9% = ~212 mg/dL. 10% = ~240 mg/dL. Each 1% rise = approximately +30 mg/dL. HbA1c is NOT useful in hemolytic anemia (RBCs destroyed faster = falsely low) or after recent blood transfusion.'},
{id:'m9_18',mod:'m9',drug:true,type:'mc',q:'A patient prescribed glipizide (a sulfonylurea). The MOST important teaching point is:',opts:['The drug works only if taken with a large meal of complex carbohydrates','Glipizide stimulates insulin secretion regardless of blood glucose — take with food and monitor closely for hypoglycemia','The drug is safe during pregnancy and can be continued without modification','Alcohol has no clinically relevant interaction with this medication class'],ans:[1],rationale:'Sulfonylureas (glipizide, glyburide, glimepiride) stimulate pancreatic beta cells to secrete insulin regardless of blood glucose level → significant hypoglycemia risk, especially if meals are skipped, with excessive exercise, or with alcohol use.',pearl:'Sulfonylureas = HIGHEST hypoglycemia risk of all oral diabetic drugs. Teach: eat regularly, monitor blood glucose, know hypoglycemia symptoms and the Rule of 15s treatment. Avoid alcohol (masks hypoglycemia symptoms and potentiates drug effect). Use with extreme caution in elderly — prolonged hypoglycemia from long-acting agents like glyburide.'},
{id:'m9_19',mod:'m9',drug:false,type:'mc',q:'Which insulin has NO peak and provides flat 24-hour basal coverage with the lowest hypoglycemia risk?',opts:['Regular insulin (Humulin R) — short-acting clear solution','NPH insulin (Humulin N) — intermediate-acting cloudy','Insulin lispro (Humalog) — rapid-acting with 30-90 minute peak','Insulin glargine (Lantus) — long-acting with no pronounced peak'],ans:[3],rationale:'Glargine (Lantus) and detemir (Levemir) are long-acting insulins with flat profiles and no pronounced peak. They provide steady basal insulin over 24+ hours. No peak = lowest hypoglycemia risk = often given at bedtime. NEVER mix with other insulins.',pearl:'Lantus (glargine) pearls: clear solution (do not confuse with Regular), no peak, once daily, NEVER mix with other insulins (forms precipitate), rotate injection sites, do not dilute. Insulin mixing order: clear before cloudy (Regular first then NPH). Memory: Not Retired you are an RN.'},
{id:'m9_20',mod:'m9',drug:false,type:'mc',q:'PTH raises serum calcium through which THREE mechanisms?',opts:['Directly stimulates intestinal calcium absorption, inhibits osteoclast activity, and increases renal sodium excretion','Stimulates osteoclastic bone resorption, increases renal calcium reabsorption, and activates vitamin D to increase intestinal absorption','Stimulates calcitonin release, inhibits vitamin D activation, and causes urinary calcium retention','Directly deposits calcium from the ECF into bone matrix where it is stored and mobilized as needed'],ans:[1],rationale:'PTH three mechanisms to raise Ca2+: (1) Stimulates osteoclasts to resorb bone releasing Ca2+ and phosphate, (2) Increases kidney reabsorption of Ca2+ (and excretion of phosphate), (3) Activates vitamin D (1-alpha hydroxylase in kidney) increasing intestinal Ca2+ absorption.',pearl:'PTH Pulls calcium up three ways: Bone (osteoclast activation), Kidneys (Ca2+ reabsorption), and activates vitamin D (gut absorption). Result: blood Ca2+ rises, blood phosphate falls. This is why CKD (cannot activate vitamin D) leads to hypocalcemia and secondary hyperparathyroidism.'},
{id:'m9_21',mod:'m9',drug:false,type:'mc',q:'Which lab pattern CONFIRMS SIADH and distinguishes it from other causes of hyponatremia?',opts:['Low serum Na+ + high serum osmolality + low urine sodium and urine osmolality','Low serum Na+ + low serum osmolality + high urine sodium + high urine osmolality','High serum Na+ + low serum osmolality + low urine specific gravity','Normal serum Na+ + high urine osmolality + undetectable serum ADH levels'],ans:[1],rationale:'SIADH lab fingerprint: Low serum Na+ (hyponatremia) + Low serum osmolality (diluted blood) + High urine osmolality (>100 mOsm/kg — kidneys still concentrating despite dilute blood) + High urine Na+ (>40 mEq/L — kidneys excreting Na+ despite low serum Na+). Confirms inappropriate ADH secretion.',pearl:'SIADH treatment: Fluid restriction (mild-moderate), hypertonic saline (severe with neurological symptoms — correct SLOWLY), loop diuretics, vaptans (tolvaptan, conivaptan — ADH receptor antagonists) for refractory cases. Target Na+ correction: no more than 10-12 mEq/L per 24 hours to prevent osmotic demyelination syndrome.'},
{id:'m9_22',mod:'m9',drug:true,type:'mc',q:'SGLT-2 inhibitors (dapagliflozin, empagliflozin) lower blood glucose by which unique mechanism?',opts:['Stimulating pancreatic beta cells to release more insulin in response to meals','Blocking glucose reabsorption in the proximal renal tubule causing glucose excretion in urine','Increasing insulin sensitivity in peripheral tissues including liver and skeletal muscle','Inhibiting glucagon secretion from pancreatic alpha cells'],ans:[1],rationale:'SGLT-2 inhibitors block the sodium-glucose cotransporter-2 in the proximal renal tubule → glucose is excreted in the urine (glucosuria) → lowers blood glucose independently of insulin. Bonus: osmotic diuresis → reduced BP and weight, plus cardiorenal protective effects.',pearl:"SGLT-2 inhibitor pearls: glucosuria (UTI + genital yeast infection risk — educate on hygiene), osmotic diuresis (mild weight loss and BP reduction), cardiorenal protection (especially empagliflozin in HF and CKD). Side effects: UTI, genital infections, DKA with near-normal glucose (euglycemic DKA — rare), Fournier's gangrene (rare but serious)."},
{id:'m9_23',mod:'m9',drug:false,type:'mc',q:'A patient with longstanding Type 1 diabetes develops bilateral numbness and burning pain in both feet with loss of protective sensation. The nurse identifies this as:',opts:['Peripheral arterial disease (PAD) from atherosclerosis causing ischemic pain','Diabetic peripheral neuropathy from chronic hyperglycemia damaging small nerve fibers','Lower extremity cellulitis from frequent minor foot trauma and poor circulation','Venous insufficiency from chronic venous hypertension in the lower extremities'],ans:[1],rationale:'Diabetic peripheral neuropathy: chronic hyperglycemia damages Schwann cells and axons of peripheral nerves → loss of protective sensation (cannot feel pain, heat, or pressure) → unnoticed injuries → ulceration → osteomyelitis → amputation if untreated.',pearl:'Diabetic neuropathy + loss of protective sensation = high amputation risk. Annual comprehensive foot exam is mandatory for ALL diabetics. Prevention: tight glycemic control, daily foot self-inspection, proper footwear (no bare feet), regular podiatry care. Monofilament testing assesses protective sensation.'},
// M10 additions: m10_10 to m10_20
{id:'m10_10',mod:'m10',drug:false,type:'mc',q:'H. pylori eradication therapy (triple therapy) includes:',opts:['PPI + two antibiotics (clarithromycin + amoxicillin) for 10-14 days','A single antibiotic for 7 days combined with antacids only','H2 blocker alone for 4 weeks to heal the ulcer','PPI + metronidazole for 3 days then reassess'],ans:[0],rationale:'H. pylori triple therapy: PPI (acid suppression) + two antibiotics (clarithromycin + amoxicillin first-line; or metronidazole + tetracycline for penicillin allergy) for 10-14 days. Quadruple therapy used for treatment failure or penicillin allergy.',pearl:'H. pylori is present in 2/3 of the world population. After eradication therapy, confirm with urea breath test or stool antigen test (4 weeks after completing antibiotics). H. pylori increases gastric cancer and MALT lymphoma risk significantly.'},
{id:'m10_11',mod:'m10',drug:true,type:'mc',q:'Sucralfate (Carafate) requires which important administration consideration?',opts:['Take with antacids for enhanced acid neutralization effect','Separate by 2 hours before or after other medications — sucralfate binds and reduces absorption of many drugs','Take with high-fat meals for best absorption into systemic circulation','Can be safely crushed and given through NG tube without affecting efficacy'],ans:[1],rationale:'Sucralfate forms a sticky complex that coats the ulcer base providing a physical protective barrier. It also binds to MANY other drugs (fluoroquinolones, phenytoin, digoxin, warfarin, thyroid medications, antibiotics) reducing their absorption. Administer sucralfate at least 2 hours apart from other medications.',pearl:'Sucralfate nursing tip: schedule it AWAY from other drugs (2 hours before or after). Works locally in GI tract — not systemically absorbed (safe in renal failure and pregnancy). Main side effect: constipation. Best given on empty stomach 1 hour before meals.'},
{id:'m10_12',mod:'m10',drug:false,type:'mc',q:'Irritable bowel syndrome (IBS) differs from inflammatory bowel disease (IBD) in that IBS:',opts:['Causes transmural bowel wall inflammation detectable on colonoscopy and biopsy','Is a functional GI disorder with normal bowel histology — abnormal motility and visceral sensation without structural changes','Always presents with bloody diarrhea requiring immunosuppressive therapy','Significantly increases risk of colorectal cancer requiring early colonoscopy screening'],ans:[1],rationale:'IBS is a FUNCTIONAL disorder — bowel structure is completely normal on endoscopy and biopsy. Symptoms result from altered gut motility and visceral hypersensitivity. No inflammation, no structural changes, no increased colorectal cancer risk. IBD = inflammation detectable on endoscopy/biopsy.',pearl:'IBS vs IBD: IBS = functional (normal biopsy), managed with diet, fiber, antispasmodics, antidepressants (TCAs, SNRIs), stress management. IBD = structural inflammation (abnormal biopsy), treated with aminosalicylates, steroids, immunosuppressants, biologics. IBS does NOT increase colon cancer risk; long-standing UC does.'},
{id:'m10_13',mod:'m10',drug:true,type:'mc',q:'Metoclopramide (Reglan) for gastroparesis has a black box warning for:',opts:['Hepatotoxicity — monthly LFT monitoring required','Tardive dyskinesia — irreversible involuntary movements from prolonged dopamine receptor blockade','Nephrotoxicity — dose reduction required for GFR <30','QT prolongation — baseline ECG required before starting'],ans:[1],rationale:'Metoclopramide blocks central dopamine receptors as well as peripheral GI receptors. Long-term use (>12 weeks) risks tardive dyskinesia — involuntary repetitive facial and limb movements that can be permanent even after discontinuation. FDA black box warning.',pearl:"Metoclopramide black box = tardive dyskinesia. Use lowest effective dose for shortest possible time (<12 weeks). Also causes extrapyramidal effects (acute: dystonia, akathisia, drug-induced Parkinsonism). Contraindicated in GI obstruction, perforation, or Parkinson's disease (blocks dopamine = worsens PD)."},
{id:'m10_14',mod:'m10',drug:false,type:'mc',q:'In acute pancreatitis, which assessment finding suggests severe necrotizing pancreatitis?',opts:['Mild epigastric discomfort that is relieved by oral fluids and position changes','Grey Turner sign (flank ecchymosis) and Cullen sign (periumbilical ecchymosis) indicating retroperitoneal hemorrhage',"Positive Murphy's sign with fever and right upper quadrant pain",'Crampy left lower quadrant pain worsening after eating with change in bowel habits'],ans:[1],rationale:'Grey Turner sign (retroperitoneal hemorrhage tracking to flanks = bruising on flanks) and Cullen sign (tracking to umbilicus = periumbilical bruising) indicate hemorrhagic/necrotizing pancreatitis. Both signs reflect blood dissecting along tissue planes from pancreatic hemorrhage — indicating severe disease.',pearl:'Pancreatitis Ranson criteria assess severity. Severe complications: necrotizing pancreatitis (Grey Turner + Cullen signs), ARDS, systemic inflammatory response, multi-organ failure. Serum lipase is more specific than amylase for pancreatitis. Treatment: aggressive IV fluids, NPO, pain control.'},
{id:'m10_15',mod:'m10',drug:false,type:'mc',q:'Diverticulitis most commonly causes pain in which abdominal quadrant?',opts:['Right upper quadrant (RUQ) — same as cholecystitis','Right lower quadrant (RLQ) — same as appendicitis','Left lower quadrant (LLQ) — sigmoid colon is the most common site','Periumbilical region that radiates to the RLQ over hours'],ans:[2],rationale:'Diverticulitis most commonly affects the sigmoid colon (LLQ). Inflamed diverticula cause LLQ pain (sometimes called left-sided appendicitis), nausea, fever, and altered bowel habits. Complications: perforation, abscess, peritonitis, obstruction, fistula formation.',pearl:'Diverticulosis: multiple non-inflamed outpouchings = asymptomatic (high-fiber diet helps prevent complications). Diverticulitis = inflamed/infected = LLQ pain + fever. Treatment: antibiotics (metronidazole + ciprofloxacin), NPO/clear liquids, pain management. Surgery for complications.'},
{id:'m10_16',mod:'m10',drug:true,type:'mc',q:'Loperamide (Imodium) should be WITHHELD if the patient develops:',opts:["Three episodes of diarrhea in 24 hours from mild traveler's diarrhea",'Bloody diarrhea with fever suggesting infectious etiology or C. diff','Simple diarrhea in a patient with a known IBS diagnosis','Watery stools that are non-bloody and non-febrile from dietary indiscretion'],ans:[1],rationale:'Loperamide inhibits peristalsis and should NOT be used for infectious/inflammatory diarrhea (bloody diarrhea, fever, suspected C. diff). It can trap bacteria/toxins in the colon, worsen infection, and cause toxic megacolon. Use only for non-infectious diarrhea.',pearl:"Loperamide: safe for non-infectious diarrhea (IBS, travelers' diarrhea without bloody stool, ileostomy). NEVER give for C. diff colitis, bloody diarrhea, or unknown infectious cause. If in doubt — culture first. Toxic megacolon risk: severe dilation of the colon that can rupture → sepsis → death."},
{id:'m10_17',mod:'m10',drug:false,type:'mc',q:'Which finding would suggest hepatic encephalopathy in a patient with cirrhosis?',opts:['Jaundice and pruritus from elevated conjugated bilirubin','Asterixis (liver flap), confusion, and altered consciousness from ammonia accumulation','Bilateral pitting edema and proteinuria from hepatorenal syndrome progression','Elevated AST and ALT indicating active hepatocellular necrosis'],ans:[1],rationale:'Hepatic encephalopathy: damaged liver cannot convert ammonia (from protein metabolism and gut bacteria) to urea → ammonia accumulates → cerebral toxicity → asterixis (flapping tremor with wrists extended), confusion, agitation, somnolence, coma.',pearl:'Hepatic encephalopathy grading: 1 = mild confusion/sleep disturbance. 2 = drowsiness, asterixis. 3 = marked confusion, stupor. 4 = coma. Treatment: lactulose (traps ammonia in gut), rifaximin (reduces gut ammonia-producing bacteria), dietary protein adjustment, treat precipitants (GI bleed, infection, constipation, dehydration).'},
{id:'m10_18',mod:'m10',drug:false,type:'mc',q:'Hepatitis B transmission occurs through which routes?',opts:['Fecal-oral route via contaminated food and water — same as hepatitis A','Bloodborne and sexual transmission — needlestick, IV drug use, unprotected sex, and mother to newborn (perinatal)','Airborne respiratory droplets like influenza','Insect vector transmission via mosquito bites like malaria'],ans:[1],rationale:'Hepatitis B: bloodborne + sexually transmitted. Routes: IV drug use (shared needles), sexual contact, mother to newborn perinatal transmission (highest risk if mother is HBsAg+), needlestick injuries, blood transfusion (rare in US due to screening).',pearl:'Hepatitis A = fecal-oral (vaccine preventable). Hepatitis B = blood/sexual (vaccine preventable — given at birth). Hepatitis C = primarily blood (no vaccine — direct-acting antivirals can cure it in >95% of patients). Healthcare workers: HBV vaccine is mandatory. Check anti-HBs titer after vaccination series to confirm immunity.'},
{id:'m10_19',mod:'m10',drug:false,type:'mc',q:'A patient with liver cirrhosis develops spontaneous bacterial peritonitis (SBP). The MOST common causative organisms are:',opts:['Staphylococcus aureus from skin flora translocation','E. coli and other gram-negative intestinal bacteria from gut bacterial translocation','Candida albicans from intestinal yeast overgrowth','Pseudomonas aeruginosa from nosocomial infection'],ans:[1],rationale:'SBP occurs when gut bacteria translocate across the weakened intestinal barrier into ascitic fluid. Most common organisms: E. coli, Klebsiella pneumoniae, Streptococcus pneumoniae (gram-negative enteric bacteria). Diagnosis: ascitic fluid WBC >250 PMNs. Treatment: third-generation cephalosporins (cefotaxime).',pearl:'SBP in cirrhosis: presentation = fever + abdominal pain/tenderness + worsening encephalopathy + unexplained deterioration. Diagnose with diagnostic paracentesis (send ascites for cell count and culture). Prophylaxis with norfloxacin or TMP-SMX for high-risk patients (prior SBP, low-protein ascites, GI bleeding).'},
{id:'m10_20',mod:'m10',drug:true,type:'sata',q:'Long-term PPI use increases the risk of which serious complications? Select all that apply.',opts:['Decreased calcium absorption leading to osteoporosis and fractures','Hypomagnesemia from impaired magnesium absorption','Increased risk of Clostridium difficile infection','Hepatotoxicity requiring liver function test monitoring','Increased risk of community-acquired pneumonia'],ans:[0,1,2,4],rationale:'Long-term PPI risks: decreased calcium absorption (fracture risk), hypomagnesemia (impaired Mg2+ absorption), C. diff infection (altered gut microbiome), possible pneumonia risk (reduced gastric acid = less protection against aspirated bacteria). Hepatotoxicity is not a significant PPI concern.',pearl:'PPI long-term risks: Fractures (Ca2+ malabsorption), Hypomagnesemia, C. diff, Pneumonia, B12 deficiency (gastric acid needed to release B12 from food). Use PPIs at the lowest effective dose for the shortest necessary duration. Annual reassessment of whether continued therapy is still needed.'},
// M11 additions: m11_9 to m11_20
{id:'m11_9',mod:'m11',drug:false,type:'mc',q:'Compartment syndrome is a serious fracture complication. Which is the EARLIEST and most reliable indicator?',opts:['Pallor and pulselessness (late findings indicating tissue death)','Pain disproportionate to the injury that worsens with passive stretch of the compartment muscles','Paralysis and paresthesia (late findings indicating nerve and muscle ischemia)','Pressure elevation visible as a tense hard compartment on inspection alone'],ans:[1],rationale:'The 6 Ps of compartment syndrome: Pain (severe, disproportionate — earliest and most reliable indicator, especially increased with passive muscle stretch), Pressure (tense compartment on palpation), Paresthesia (nerve ischemia), Pallor, Pulselessness, Paralysis (late signs). Early recognition is critical.',pearl:'Compartment syndrome = surgical emergency. Classic scenario: fracture + cast → swelling → compartment pressure rises → ischemia. Remove tight casts/dressings FIRST while awaiting surgical consult. Fasciotomy (surgical release of the fascia) is definitive treatment. Do NOT elevate above heart level — reduces arterial flow.'},
{id:'m11_10',mod:'m11',drug:false,type:'mc',q:"A patient with Heberden's nodes on the distal interphalangeal (DIP) joints of their fingers has:",opts:['Rheumatoid arthritis — symmetric inflammatory small joint arthritis',"Osteoarthritis — bony outgrowths at DIP joints from cartilage degeneration","Gouty arthritis — urate crystal deposits forming tophi at joint margins","Psoriatic arthritis — enthesitis with nail changes and sausage digits"],ans:[1],rationale:"Heberden's nodes = bony osteophyte outgrowths at the DISTAL interphalangeal (DIP) joints from OA. Bouchard's nodes = similar outgrowths at the PROXIMAL interphalangeal (PIP) joints in OA. Both are characteristic of hand osteoarthritis.",pearl:"OA hand nodes: Heberden's = DISTAL IP (farther from palm). Bouchard's = PROXIMAL IP. Both = OA. RA = spares DIP joints, affects PIP, MCP, wrist joints symmetrically. Gout = tophi (chalky white deposits) at joints, especially big toe (podagra)."},
{id:'m11_11',mod:'m11',drug:false,type:'mc',q:'Which fracture type is a medical emergency due to high risk of massive hemorrhage and fat embolism?',opts:['Greenstick fracture of the forearm in a child — partial cortex break','Avulsion fracture of the finger — small bone fragment pulled away','Pelvic or femur fracture from high-energy trauma — potential 2-4 liters of blood loss','Stress fracture of the metatarsal from repetitive loading'],ans:[2],rationale:'Pelvic fractures can cause massive hemorrhage (2-4 liters blood loss into the pelvic cavity) leading to hemorrhagic shock. Femur fractures: each can bleed 1-2 liters into the thigh. Both risk fat embolism (fat from bone marrow enters circulation → lodges in lungs/brain). Rapid stabilization is critical.',pearl:'Fat embolism syndrome (FES): occurs 24-72 hours after long bone or pelvic fracture. Classic triad: respiratory failure (hypoxemia) + neurological changes (confusion) + petechial rash on chest/axillae/conjunctivae. Treatment: supportive (O2, fluids). Prevention: early fracture stabilization.'},
{id:'m11_12',mod:'m11',drug:false,type:'mc',q:'Ankylosing spondylitis (AS) is characterized by:',opts:['Asymmetric DIP joint arthritis with psoriatic skin plaques and nail changes','Progressive inflammatory spinal stiffness beginning in the sacroiliac joints — worse in the morning improved with activity','Butterfly rash, photosensitivity, and symmetrical arthritis of small joints','Acute episodic joint swelling and tenderness at the big toe with elevated uric acid'],ans:[1],rationale:'Ankylosing spondylitis: seronegative inflammatory arthritis primarily affecting the axial skeleton (spine and sacroiliac joints). Classic: young male, insidious onset of lower back pain/stiffness worse in morning and improved with exercise (distinguishes from mechanical back pain).',pearl:"AS: young males (20-30s), strong HLA-B27 association (90% positive). Bamboo spine on X-ray = complete spinal fusion in advanced AS. Treatment: NSAIDs first-line, TNF blockers (etanercept, adalimumab) for severe/refractory cases. Exercise is essential — if you don't move it, you lose it."},
{id:'m11_13',mod:'m11',drug:true,type:'mc',q:'The nurse should clarify an NSAID prescription for a 72-year-old patient with CKD and history of GI ulcers because:',opts:['NSAIDs are preferred over opioids in all elderly patients regardless of comorbidities','NSAIDs are relatively contraindicated in this patient — they reduce renal perfusion AND remove gastric mucosal protection — two major risk factors present','NSAIDs require dose reduction in elderly but are otherwise safe with monitoring','Dose reduction to once daily adequately minimizes both renal and GI risks'],ans:[1],rationale:'NSAIDs are relatively contraindicated in patients with CKD (COX-1 inhibition reduces renal prostaglandins that maintain renal perfusion → acute kidney injury) AND a history of GI ulcers (COX-1 inhibition removes gastric mucosal protection → ulcer reactivation). This patient has BOTH risk factors.',pearl:'NSAID contraindications: CKD/renal impairment, GI ulcer history, heart failure (Na/fluid retention), pregnancy 3rd trimester, aspirin allergy. Elderly patients: increased risk of ALL NSAID complications. Consider acetaminophen for mild pain. For moderate-severe pain: consult with pain specialist.'},
{id:'m11_14',mod:'m11',drug:false,type:'mc',q:'In fracture healing, which stage involves formation of a soft cartilaginous callus at the fracture site?',opts:['Stage 1: Hematoma formation — immediate response within hours of fracture','Stage 2: Inflammatory response — macrophages and growth factors arrive days 1-5','Stage 3: Soft callus formation — fibroblasts and chondrocytes produce cartilaginous bridge weeks 2-3','Stage 4: Hard callus formation — osteoblasts mineralize the cartilage matrix weeks 4-12'],ans:[2],rationale:'Fracture healing stages: (1) Hematoma (within hours), (2) Inflammation — macrophages, growth factors, granulation tissue (days 1-5), (3) Soft callus — fibroblasts + chondrocytes form cartilaginous bridge (weeks 2-3), (4) Hard callus — osteoblasts mineralize cartilage with calcium (weeks 4-12), (5) Remodeling (months to years).',pearl:'Fracture healing impaired by: smoking (vasoconstriction, impairs osteoblast activity), corticosteroids (suppress bone formation), poor nutrition (low protein, calcium, vitamin D), infection, inadequate immobilization, advanced age, and poor blood supply. Good nutrition + immobilization + time = healing.'},
{id:'m11_15',mod:'m11',drug:false,type:'mc',q:'Fibromyalgia is distinguished from inflammatory arthritis by which characteristic?',opts:['Fibromyalgia causes visible joint swelling with elevated CRP and ESR','Fibromyalgia presents with widespread pain, fatigue, and sleep disturbances but NORMAL inflammatory markers and no joint damage','Fibromyalgia primarily affects the spine and sacroiliac joints of young males','Fibromyalgia is confirmed by positive antinuclear antibody (ANA) test'],ans:[1],rationale:'Fibromyalgia: chronic widespread pain + tender points + fatigue + sleep disturbances + cognitive symptoms (fibro fog). ALL LABS ARE NORMAL (normal ESR, CRP, CBC, ANA, RF) and normal imaging — it is a central sensitization syndrome (abnormal pain processing) not an inflammatory or structural condition.',pearl:'Fibromyalgia = diagnosis of exclusion. Normal labs and imaging — their purpose is to EXCLUDE other diagnoses. Treatment: multimodal approach — aerobic exercise (MOST effective intervention), sleep hygiene, cognitive-behavioral therapy, duloxetine/milnacipran/pregabalin. NSAIDs and opioids are NOT effective for fibromyalgia.'},
{id:'m11_16',mod:'m11',drug:false,type:'sata',q:'Which are risk factors for poor fracture healing? Select all that apply.',opts:['Tobacco smoking','Long-term corticosteroid use','Active infection at the fracture site','Patient age under 20','Adequate dietary protein and calcium intake','Osteoporosis'],ans:[0,1,2,5],rationale:'Poor fracture healing risk factors: smoking (vasoconstriction, impairs osteoblast function), corticosteroids (suppress bone formation, impair healing), active infection (bacteria consume healing resources), osteoporosis (poor bone quality, inadequate mineral for callus formation). Young age and adequate nutrition PROMOTE healing.',pearl:'Fracture healing promoters: young age, good nutrition (protein, Ca2+, Vitamin D, C), adequate blood supply, proper immobilization, appropriate weight-bearing. Inhibitors: smoking, steroids, diabetes, malnutrition, osteoporosis, infection, long-term NSAIDs (impair osteoblast activity), radiation exposure.'},
