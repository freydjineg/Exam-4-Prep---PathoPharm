{id:'m8_6',mod:'m8',drug:true,type:'mc',q:'A patient prescribed sulfamethoxazole/trimethoprim (Bactrim) for a UTI asks about sun exposure. The nurse should:',opts:['Sun exposure is not a concern with this medication','Avoid prolonged sun exposure — this drug causes photosensitivity','Wear sunscreen only if outdoors more than 4 hours','This only applies to the IV formulation, not oral tablets'],ans:[1],rationale:'Sulfonamides (Bactrim/SMX-TMP) cause photosensitivity — skin becomes abnormally sensitive to UV radiation. Patients should avoid prolonged sun exposure, use sunscreen, and wear protective clothing.',pearl:'Bactrim (sulfa) pearls: photosensitivity (avoid sun), avoid in sulfa allergy, avoid in pregnancy (teratogenic), avoid with renal impairment (dose adjustment needed), monitor CBC (can cause bone marrow suppression). Also interacts with warfarin (increases INR).'},
{id:'m8_7',mod:'m8',drug:false,type:'mc',q:'Glomerulonephritis is characterized by bilateral glomerular inflammation often following:',opts:['A urinary tract infection with E. coli','A streptococcal throat or skin infection','Prolonged NSAID use','Indwelling urinary catheter placement'],ans:[1],rationale:'Post-streptococcal glomerulonephritis: immune complexes from the streptococcal infection deposit in the glomeruli → inflammation → damaged filtration membrane. Classic findings: hematuria (tea/cola-colored urine), proteinuria, hypertension, periorbital edema.',pearl:'Glomerulonephritis = immune complex deposition (Type III hypersensitivity). Classic presentation: cola-colored urine + foamy urine (proteinuria) + hypertension + edema 1-3 weeks after strep throat. Treat the underlying strep infection. Monitor renal function.'},
{id:'m8_8',mod:'m8',drug:false,type:'mc',q:'In acute tubular necrosis (ATN), which is the MOST common cause in hospitalized patients?',opts:['Glomerular immune complex deposition','Ischemic or nephrotoxic injury to renal tubular cells','Obstructive uropathy from BPH','Autoimmune destruction of the renal cortex'],ans:[1],rationale:'ATN = most common form of intrinsic AKI in hospitals. Caused by: (1) ischemic injury (prolonged hypoperfusion, sepsis, cardiac arrest) or (2) nephrotoxic injury (aminoglycosides, contrast dye, vancomycin, NSAIDs, myoglobin from rhabdomyolysis).',pearl:'ATN nursing: avoid nephrotoxins, ensure adequate hydration before contrast dye (prevent contrast-induced nephropathy), monitor aminoglycoside levels, strict I&O, daily weights, monitor electrolytes (hyperkalemia is the most dangerous complication of AKI).'},
{id:'m8_9',mod:'m8',drug:false,type:'sata',q:'Which are clinical manifestations of fluid volume overload in a patient with ESRD (end-stage renal disease)? Select all that apply.',opts:['Hypertension','Pitting edema','Pulmonary crackles','Flat neck veins','Weight gain','Decreased urine output'],ans:[0,1,2,4,5],rationale:'ESRD with fluid overload: HTN (excess volume increases BP), pitting edema (excess interstitial fluid), pulmonary crackles (fluid in alveoli), weight gain (water weight), decreased urine output (kidneys failing to excrete fluid). Flat neck veins = fluid deficit, not overload.',pearl:'ESRD fluid management: strict fluid restriction, sodium restriction, daily weights (1 kg gain = ~1 liter fluid), dialysis to remove excess fluid. Weight gain of 2+ lbs/day = fluid retention and needs provider notification.'},
{id:'m8_10',mod:'m8',drug:false,type:'mc',q:'The nurse is educating a male patient newly diagnosed with BPH about medication. Tamsulosin (Flomax) works by:',opts:['Inhibiting 5-alpha reductase to shrink the prostate over time','Blocking alpha-1 receptors in the prostate to relax smooth muscle and improve urine flow','Stimulating testosterone receptors to reduce gland size','Inhibiting DHT production from testosterone'],ans:[1],rationale:'Tamsulosin (Flomax) = selective alpha-1 blocker. Alpha-1 receptors in the prostate and bladder neck control smooth muscle tone. Blocking them → relaxation → improved urine flow. Effect is rapid (days). Does NOT shrink the prostate.',pearl:'BPH drug classes: Alpha-blockers (tamsulosin, terazosin) = relax smooth muscle = fast acting. 5-alpha reductase inhibitors (finasteride, dutasteride) = shrink prostate = take 3-6 months. Side effect of alpha-blockers: orthostatic hypotension (warn patient to rise slowly).'},

// ===== MODULE 9: ENDOCRINE =====
{id:'m9_1',mod:'m9',drug:false,type:'mc',q:'SIADH (Syndrome of Inappropriate ADH secretion) results in which electrolyte abnormality?',opts:['Hypernatremia and decreased urine concentration','Dilutional hyponatremia from excess water retention','Hyperkalemia and metabolic alkalosis','Hypercalcemia and low phosphate'],ans:[1],rationale:'SIADH = excess ADH → excess water retention → dilutes sodium → hyponatremia. Assessment: mental status changes, decreased urine output (concentrated urine despite normal or high fluid intake), weight gain without edema, hypertension.',pearl:'SIADH = "Soaked Inside" — too much water dilutes Na+. DI = "Dry Inside" — too little ADH → too much water lost → hypernatremia. They are opposites. Treatment: SIADH = fluid restriction ± hypertonic saline. DI = desmopressin (vasopressin replacement).'},
{id:'m9_2',mod:'m9',drug:false,type:'mc',q:'A patient with Addison\'s disease presents in adrenal crisis. Expected lab values include:',opts:['Hypernatremia, hypokalemia, hyperglycemia','Hyponatremia, hyperkalemia, hypoglycemia','Hypernatremia, hyperkalemia, elevated cortisol','Hyponatremia, hypokalemia, elevated ACTH only'],ans:[1],rationale:'Addison\'s = decreased aldosterone → kidneys cannot retain Na+ or excrete K+ → hyponatremia + hyperkalemia. Decreased cortisol → impaired gluconeogenesis → hypoglycemia. Classic Addisonian crisis triad: hyponatremia, hyperkalemia, hypoglycemia.',pearl:'Addison\'s mnemonic "Adding what\'s missing": Add cortisol + aldosterone. Low aldosterone → low Na, high K (opposite of what aldosterone normally does). Low cortisol → low glucose. Hyperpigmentation is the classic physical finding (excess ACTH stimulates melanocytes).'},
{id:'m9_3',mod:'m9',drug:false,type:'mc',q:'Which cluster of findings is MOST characteristic of Cushing\'s syndrome?',opts:['Weight loss, hypotension, hyperkalemia, hypoglycemia, thin skin','Moon face, buffalo hump, hyperglycemia, hypertension, muscle weakness, purple striae','Exophthalmos, tachycardia, weight loss, heat intolerance, diarrhea','Myxedema, bradycardia, constipation, weight gain, cold intolerance'],ans:[1],rationale:'Cushing\'s = excess cortisol → moon face, buffalo hump, central obesity with thin extremities, muscle wasting, hyperglycemia (cortisol is anti-insulin), hypertension, hypokalemia, purple/reddish striae (skin thinning), easy bruising.',pearl:'Cushing\'s vs Addison\'s: Cushing\'s = EXCESS cortisol (moon face, hyperglycemia, hypertension, hypokalemia, obesity). Addison\'s = DEFICIT cortisol (thin, hypotension, hypoglycemia, hyponatremia, hyperkalemia, hyperpigmentation). They are opposites.'},
{id:'m9_4',mod:'m9',drug:false,type:'mc',q:'Lab results show TSH 0.1 mU/L (low) and T3/T4 both elevated. The nurse interprets this as:',opts:['Primary hypothyroidism (Hashimoto\'s thyroiditis)','Secondary hypothyroidism from pituitary failure','Primary hyperthyroidism (e.g., Graves\' disease)','Diabetes insipidus'],ans:[2],rationale:'In primary hyperthyroidism: thyroid overproduces T3/T4 → negative feedback suppresses pituitary TSH production → low TSH + high T3/T4 = hyperthyroidism. Hypothyroidism = high TSH + low T3/T4.',pearl:'Thyroid axis: TSH and thyroid hormones are OPPOSITE in primary disease. Low TSH + High T4 = Hyper. High TSH + Low T4 = Hypo. If both TSH and T4 are low = secondary (pituitary) hypothyroidism. This inverse relationship is critical for NCLEX.'},
{id:'m9_5',mod:'m9',drug:true,type:'mc',q:'A patient taking levothyroxine reports racing heart, sweating, anxiety, and unintentional weight loss. The nurse recognizes:',opts:['Myxedema coma — emergency, needs IV levothyroxine','Hypothyroidism — dose increase required','Thyroid storm — life-threatening hyperthyroid emergency','Iatrogenic hyperthyroidism from excessive levothyroxine dosing'],ans:[3],rationale:'These are signs of hyperthyroidism from too much levothyroxine — iatrogenic (drug-induced) overdose. The dose needs to be reduced. Monitor for tachycardia, palpitations, weight loss, anxiety, heat intolerance.',pearl:'Levothyroxine monitoring: watch for BOTH directions. Under-dosing = hypothyroid (fatigue, weight gain, bradycardia, cold intolerance). Over-dosing = hyperthyroid (tachycardia, weight loss, anxiety, heat intolerance). Takes 6-8 weeks to reach steady state after dose change.'},
{id:'m9_6',mod:'m9',drug:true,type:'mc',q:'A patient with Type 2 diabetes is scheduled for a CT scan with IV contrast dye. Which medication management is critical?',opts:['Hold glipizide the morning of the procedure to prevent hypoglycemia','Hold metformin 48 hours before AND after contrast — risk of lactic acidosis with renal impairment from contrast','Insulin glargine must be held the morning of the procedure','Sitagliptin causes QT prolongation with contrast and must be held'],ans:[1],rationale:'Metformin must be held 48 hours before AND after IV contrast because contrast dye can temporarily impair renal function → metformin accumulates → lactic acidosis (potentially fatal). GFR should be rechecked before restarting.',pearl:'Metformin + IV contrast = HOLD 48 hours before/after. This is a frequent NCLEX question. Lactic acidosis signs: hyperventilation, myalgias, malaise. Metformin is also contraindicated in active renal failure (BUN/Cr elevated).'},
{id:'m9_7',mod:'m9',drug:false,type:'mc',q:'An unconscious patient with Type 1 diabetes has a blood glucose of 28 mg/dL. The FIRST intervention is:',opts:['Administer 15g of orange juice orally','Give insulin per sliding scale','Administer IV D50% or glucagon IM/SubQ if no IV access','Notify provider and await orders'],ans:[2],rationale:'Unconscious patient cannot swallow safely (aspiration risk). For severe hypoglycemia in unconscious patients: IV D50% (dextrose 50%) or glucagon IM/SubQ if IV access unavailable. Blood glucose rises 5-20 minutes after glucagon.',pearl:'Conscious mild hypoglycemia = Rule of 15s: 15g fast-acting carbs, wait 15 min, recheck. Unconscious = IV D50% or glucagon IM. NEVER give oral glucose to an unconscious patient — aspiration risk. Glucagon raises blood glucose by stimulating glycogenolysis.'},
{id:'m9_8',mod:'m9',drug:false,type:'sata',q:'Which are risk factors for osteoporosis? Select all that apply.',opts:['Postmenopausal status (decreased estrogen)','Long-term corticosteroid use','Male gender under age 40','Excessive weight-bearing exercise','Low calcium and vitamin D intake','Caucasian or Asian ethnicity'],ans:[0,1,4,5],rationale:'Osteoporosis risk factors: postmenopausal (decreased estrogen → increased bone resorption), long-term corticosteroids (major iatrogenic cause), low calcium/vitamin D (less building material), Caucasian/Asian women (higher risk). Male gender and weight-bearing exercise are NOT major risk factors.',pearl:'CALCIUM mnemonic for osteoporosis risk: Calcium/D low, Age/Menopause, Lifestyle (smoking, alcohol, sedentary), Caucasian/Asian, Inherited, Underweight/malabsorption, Medications (steroids, anticonvulsants). DEXA scan: T-score normal >-1.0; osteopenia -1.0 to -2.5; osteoporosis <-2.5.'},
{id:'m9_9',mod:'m9',drug:false,type:'mc',q:'A patient with gout presents with sudden onset severe pain in the right great toe. The dietary advice MOST appropriate is:',opts:['Increase red meat and organ meat to build protein','Increase fluid intake and avoid alcohol, organ meats, shellfish, and high-fructose foods','Restrict all dietary fats and increase complex carbohydrates','Avoid dairy products and calcium-containing foods'],ans:[1],rationale:'Gout = uric acid crystal deposition. Uric acid comes from purines (found in alcohol, organ meats, red meat, shellfish, anchovies, soft drinks/fructose). High fluid intake (2-3 L/day) helps excrete uric acid.',pearl:'Gout triggers AASH: Alcohol, Animal proteins (organ meats, seafood), Sugar (fructose), deHydration. Allopurinol = long-term uric acid reduction (takes months). Colchicine/NSAIDs = treat acute attacks. Probenecid = increases uric acid excretion by kidneys.'},
{id:'m9_10',mod:'m9',drug:true,type:'mc',q:'A patient taking alendronate (Fosamax) for osteoporosis reports difficulty swallowing and chest pain. The nurse recognizes:',opts:['Expected side effects — continue taking the medication','Signs of esophageal ulceration — hold next dose and evaluate','Osteonecrosis of the jaw — discontinue immediately','Signs of hypocalcemia from reduced bone resorption'],ans:[1],rationale:'Bisphosphonates like alendronate can cause severe esophageal irritation and ulceration. Dysphagia and chest pain are warning signs. Proper administration prevents this: full glass of water, remain upright 30 minutes, empty stomach.',pearl:'Bisphosphonate admin: Full glass of water + stay UPRIGHT 30 minutes + empty stomach. These three steps prevent esophageal damage. Separate from iron, antacids, calcium, and multivitamins by 30+ minutes. Take weekly (Fosamax) or monthly (Boniva) for compliance.'},
{id:'m9_11',mod:'m9',drug:false,type:'mc',q:'DKA (diabetic ketoacidosis) and HHS (hyperosmolar hyperglycemic state) differ in that DKA:',opts:['Occurs in Type 2 diabetes; HHS occurs in Type 1','Is associated with blood glucose >600 mg/dL; HHS has lower glucose','Has ketosis and metabolic acidosis (pH <7.35); HHS has minimal ketones and normal pH','Presents with slow gradual onset; HHS presents suddenly'],ans:[2],rationale:'DKA: Type 1 DM, no insulin → fat breakdown → ketones → metabolic acidosis (pH <7.35), blood glucose >250 mg/dL, Kussmaul breathing, fruity breath. HHS: Type 2 DM, some insulin (prevents ketosis) → profound hyperglycemia (>600 mg/dL), no ketones, normal pH, severe dehydration.',pearl:'DKA: KETONES + ACIDOSIS. HHS: No ketones + profound hyperglycemia (>600) + severe dehydration. Both treated with IV fluids first (correct dehydration), then insulin, then electrolyte replacement. HHS has higher mortality due to more severe dehydration and older patient population.'},
{id:'m9_12',mod:'m9',drug:true,type:'mc',q:'Which insulin type is the ONLY one that can be administered intravenously?',opts:['NPH insulin (intermediate-acting)','Insulin glargine (long-acting, Lantus)','Regular insulin (short-acting)','Insulin lispro (rapid-acting, Humalog)'],ans:[2],rationale:'Regular insulin is the ONLY insulin formulation safe for IV administration. All other insulin types (NPH, lispro, aspart, glargine, detemir) are subcutaneous ONLY. IV regular insulin is used in DKA treatment and insulin drips.',pearl:'Regular insulin: Only IV insulin. Clear solution. Onset 30-60 min, Peak 2-4 hrs. NPH: NEVER IV (cloudy). Lantus (glargine): NEVER mix with other insulins, NO peak, once daily. Mixing order: clear before cloudy (Regular first, then NPH) — "Not Retired, you are an RN."'},

// ===== MODULE 10: GASTROINTESTINAL =====
{id:'m10_1',mod:'m10',drug:false,type:'mc',q:'A patient with peptic ulcer disease reports that pain is WORSE after eating. This is consistent with:',opts:['Duodenal ulcer — pain worse on empty stomach','Gastric ulcer — pain worsens with meals due to acid stimulation','GERD — pain is always related to position changes','Cholecystitis — pain after fatty meals'],ans:[1],rationale:'Gastric ulcer: pain WITH eating (food stimulates acid in an already-irritated stomach). Duodenal ulcer: pain WITHOUT food / 2-3 hours after meals / at night (empty stomach, duodenum exposed to acid).',pearl:'Gastric ulcer = pain with food (full stomach hurts). Duodenal ulcer = pain without food/on empty stomach (acid burns the duodenum). Both treated with PPIs ± H. pylori eradication (triple therapy). H. pylori is the most common cause of both.'},
{id:'m10_2',mod:'m10',drug:true,type:'mc',q:'Omeprazole (Prilosec) works by which mechanism?',opts:['Neutralizing acid already present in the stomach','Blocking H+/K+-ATPase on parietal cells — stopping the final step of acid production','Blocking H2 receptors on parietal cells','Coating the stomach lining to protect from acid'],ans:[1],rationale:'PPIs (omeprazole, pantoprazole, lansoprazole) inhibit H+/K+-ATPase on gastric parietal cells — blocking the final, irreversible step of acid production. Most potent acid suppressors. Antacids only neutralize existing acid (temporary).',pearl:'PPIs = most powerful acid suppressors. Give 30-60 minutes BEFORE the first meal for best effect (proton pumps are most active after eating). Long-term PPI risks: decreased bone density (decreased calcium absorption), decreased magnesium, increased C. diff infection risk.'},
{id:'m10_3',mod:'m10',drug:false,type:'mc',q:'A patient with cirrhosis of the liver has an INR of 3.2 and albumin of 2.0 g/dL. The nurse recognizes these values indicate:',opts:['Improved liver function requiring anticoagulation adjustment','Severe synthetic liver function failure — bleeding risk and low oncotic pressure','Normal liver function — these values are expected in cirrhosis','Cholestasis from bile duct obstruction'],ans:[1],rationale:'The liver synthesizes clotting factors AND albumin. Cirrhosis → synthetic failure → elevated INR/PT (can\'t make clotting factors = bleeding risk) + low albumin (decreased oncotic pressure = edema/ascites). These are PROGNOSTIC markers of liver failure.',pearl:'LFT patterns: AST/ALT elevated = hepatocellular damage (hepatitis, drug toxicity). ALP/bilirubin elevated = bile flow problem (cholestasis). Elevated PT/INR + low albumin = SYNTHETIC FAILURE (cirrhosis, acute liver failure). Child-Pugh and MELD scores use these values to assess severity.'},
{id:'m10_4',mod:'m10',drug:false,type:'mc',q:'A patient presents with positive Murphy\'s sign, constant severe RUQ pain, fever, and nausea. This presentation is MOST consistent with:',opts:['Biliary colic (asymptomatic gallstones)','Acute cholecystitis (inflamed gallbladder)','Peptic ulcer disease','Crohn\'s disease'],ans:[1],rationale:'Murphy\'s sign (pain on deep inspiration with RUQ palpation stopping inspiration) + constant pain + fever + nausea = acute cholecystitis. Biliary colic is episodic and resolves. Cholecystitis is persistent and worsening.',pearl:'Murphy\'s sign = cholecystitis (inflamed gallbladder). Biliary colic = comes and goes (stone temporarily blocks cystic duct, then releases). Cholecystitis = constant + fever + Murphy\'s sign positive. Treatment: NPO + IV antibiotics + cholecystectomy within 72 hours.'},
{id:'m10_5',mod:'m10',drug:true,type:'mc',q:'A patient is prescribed misoprostol (Cytotec) to prevent NSAID-induced ulcers. What is the MOST critical teaching point?',opts:['Avoid grapefruit juice during treatment','This drug is contraindicated in pregnancy — it induces uterine contractions and can cause miscarriage','Take on an empty stomach for best absorption','Avoid all NSAIDs while taking this medication'],ans:[1],rationale:'Misoprostol is a prostaglandin analogue that protects the stomach AND induces uterine contractions. It is absolutely contraindicated in pregnancy — it causes miscarriage and is used medically for medication abortion and labor induction.',pearl:'Misoprostol (Cytotec) dual use: stomach protectant (prevents NSAID ulcers) AND uterotonic (induces labor/abortion). Always confirm patient is NOT pregnant before prescribing. This dual mechanism is high-yield NCLEX knowledge.'},
{id:'m10_6',mod:'m10',drug:false,type:'sata',q:'Which clinical features are characteristic of Crohn\'s disease (NOT ulcerative colitis)? Select all that apply.',opts:["Can affect any part of the GI tract (mouth to anus)","Skip lesions (patchy, non-continuous inflammation)","Affects the colon only","Can be cured by colectomy (surgical removal of colon)","Transmural (full-thickness) inflammation with fistula formation"],ans:[0,1,4],rationale:"Crohn's: any part of GI tract, skip lesions, transmural inflammation (fistulas/abscesses), NOT curable by surgery. UC: colon only, continuous inflammation, superficial/mucosal only, colectomy IS curative.",pearl:"KEY distinction: UC = colon only + colectomy = cure. Crohn's = anywhere + NOT surgically curable. Both have remissions/exacerbations, systemic manifestations, and respond to similar medications (aminosalicylates, steroids, immunosuppressants, biologics)."},
{id:'m10_7',mod:'m10',drug:false,type:'mc',q:'C. difficile (C. diff) colitis most commonly occurs because:',opts:['Patient ate contaminated food from a restaurant','Antibiotics disrupted normal gut flora allowing C. diff to overgrow','Patient was immunocompromised from HIV','The patient received inadequate hand hygiene during hospitalization'],ans:[1],rationale:'Antibiotics (especially clindamycin, cephalosporins, fluoroquinolones) kill normal protective gut bacteria. Without competition, C. diff spores germinate and overgrow → toxin production → profuse watery diarrhea, abdominal pain, pseudomembranous colitis.',pearl:'C. diff = watery, foul-smelling, greenish diarrhea after antibiotics. Contact precautions (gown + gloves). Hand WASHING with SOAP (NOT hand sanitizer — alcohol doesn\'t kill spores!). Treatment: oral vancomycin (first-line) or fidaxomicin. Fecal transplant for recurrent C. diff.'},
{id:'m10_8',mod:'m10',drug:true,type:'mc',q:'A patient on ondansetron (Zofran) is also taking an SSRI antidepressant. The nurse monitors for:',opts:['Increased risk of GI bleeding','Serotonin syndrome (hyperthermia, agitation, clonus, tachycardia)','Additive anticoagulation effects','Hypertensive crisis'],ans:[1],rationale:'Ondansetron (5-HT3 blocker) combined with SSRIs increases serotonin syndrome risk: hyperthermia, agitation, neuromuscular abnormalities (clonus, hyperreflexia), and autonomic instability.',pearl:'Serotonin syndrome = hyperthermia + neuromuscular excitation (clonus, hyperreflexia) + autonomic instability (tachycardia, diaphoresis). Drugs that raise serotonin: SSRIs, SNRIs, MAOIs, TCAs, ondansetron, triptans, tramadol, linezolid, St. John\'s Wort.'},
{id:'m10_9',mod:'m10',drug:false,type:'mc',q:'The classic findings of cholestasis include jaundice, pruritus, and:',opts:['Dark urine and clay-colored (pale) stools','Bright red stools and lower abdominal cramping','Frothy urine and periorbital edema','Pale urine and darkened stools'],ans:[0],rationale:'Cholestasis = impaired bile flow → bilirubin backs up into blood (jaundice), kidneys excrete bilirubin (dark urine), less bile reaches intestines (clay/pale stools = no stercobilin), bile salts deposit in skin (pruritus).',pearl:'Cholestasis classic 4: Jaundice (yellow skin/eyes), Dark urine (bilirubin in urine), Pale/clay stools (no bile), Pruritus (bile salts in skin). Lab pattern: ALP and bilirubin elevated disproportionately to AST/ALT.'},

// ===== MODULE 11: MUSCULOSKELETAL =====
{id:'m11_1',mod:'m11',drug:false,type:'mc',q:'A patient with osteoarthritis (OA) describes pain that is WORSE with movement and BETTER with rest, affecting only one hip. This is consistent with OA because:',opts:['OA is an inflammatory autoimmune disease causing symmetric joint involvement','OA is degenerative — cartilage breakdown occurs in weight-bearing joints, worse with use, relieved by rest','OA causes morning stiffness lasting >1 hour and improves with activity','OA primarily affects small joints of the hands bilaterally'],ans:[1],rationale:'OA is non-inflammatory and degenerative. Articular cartilage breaks down, often unilaterally, in weight-bearing joints (hips, knees, spine). Pain: worse with activity, better with rest. Morning stiffness is brief (<30 minutes). No systemic symptoms.',pearl:'OA vs RA: OA = degenerative, unilateral, weight-bearing joints, brief morning stiffness, Heberden\'s nodes (distal IP), Bouchard\'s nodes (proximal IP), no systemic symptoms. RA = inflammatory autoimmune, symmetric, morning stiffness >1 hour, systemic symptoms (fever, fatigue).'},
{id:'m11_2',mod:'m11',drug:false,type:'mc',q:'A patient with rhabdomyolysis presents with muscle pain, weakness, and tea-colored urine. The MOST serious complication to monitor is:',opts:['Hypoglycemia from muscle glycogen depletion','Acute renal failure from myoglobin precipitation in renal tubules','Pulmonary embolism from immobility','Hypocalcemia causing tetany'],ans:[1],rationale:'Rhabdomyolysis releases myoglobin from damaged muscle cells. Myoglobin precipitates in renal tubules → acute tubular necrosis → acute kidney injury. Treatment: aggressive IV fluid hydration to flush the kidneys.',pearl:'Rhabdo triad: Muscle pain + Weakness + Tea/cola-colored urine (myoglobinuria). Most dangerous: AKI. Also monitor: hyperkalemia (from cell lysis) → cardiac arrhythmias. CK level: <1,000 = absent; 1,000-5,000 = mild; >5,000 = moderate-severe. Treat with aggressive IV hydration.'},
{id:'m11_3',mod:'m11',drug:false,type:'mc',q:'Which hormones regulate calcium balance? PTH, calcitonin, and vitamin D — which statement correctly describes their actions?',opts:['PTH decreases calcium; calcitonin increases calcium; vitamin D decreases calcium','PTH increases calcium (from bone, kidney, intestine); calcitonin decreases calcium (inhibits osteoclasts); vitamin D increases calcium (intestinal absorption)','PTH increases calcium; vitamin D decreases calcium; calcitonin increases phosphate','All three hormones act only on the intestines to regulate dietary calcium absorption'],ans:[1],rationale:'PTH: released when Ca2+ is LOW → increases Ca2+ by stimulating osteoclasts (bone resorption), increasing kidney reabsorption, and activating vitamin D. Vitamin D: increases intestinal calcium absorption. Calcitonin: released when Ca2+ is HIGH → inhibits osteoclasts (decreases bone resorption) and increases urinary excretion.',pearl:'Remember: PTH = Pulls calcium up (osteoclast activity). Calcitonin = Calms calcium down (inhibits osteoclasts). Vitamin D = Delivers calcium from diet (intestinal absorption). Vitamin D must be activated: skin → liver → kidneys (CKD impairs this → hypocalcemia → bone disease).'},
{id:'m11_4',mod:'m11',drug:true,type:'mc',q:'A patient taking alendronate (Fosamax) for osteoporosis asks how to take it correctly. The nurse instructs:',opts:['Take at bedtime with a small glass of water and lie down after','Take first thing in the morning on empty stomach, with a full glass of water, and stay upright for 30 minutes','Take with calcium supplements to enhance absorption','Crush the tablet and dissolve in orange juice for easier swallowing'],ans:[1],rationale:'Bisphosphonate (alendronate) administration: take on empty stomach first thing in morning (food blocks absorption), with FULL glass of water (ensures medication reaches stomach), remain upright 30 minutes (prevents esophageal ulceration from reflux).',pearl:'Bisphosphonate cardinal rules: Full glass of water + Stay upright 30 min + Empty stomach. NEVER give with calcium, antacids, or iron (chelation reduces absorption). Give weekly (Fosamax) or monthly (Boniva) for better adherence. Report dysphagia or chest pain immediately.'},
{id:'m11_5',mod:'m11',drug:true,type:'mc',q:'Colchicine is prescribed for an acute gout attack. The nurse educates the patient that expected side effects include:',opts:['Significant bone pain and fatigue','Diarrhea, nausea, and vomiting','Severe constipation requiring laxatives','Chest pain and palpitations'],ans:[1],rationale:'Colchicine for acute gout: works rapidly within 12-24 hours. Most common side effects are GI — diarrhea, nausea, vomiting, abdominal cramping. These occur because colchicine inhibits mitosis and is particularly toxic to rapidly dividing GI epithelial cells.',pearl:'Colchicine: start at FIRST sign of gout attack for best results (rapid relief within 12 hrs). Main side effects: GI (diarrhea). Long-term use: bone marrow suppression (monitor CBC). Not the same as allopurinol (which is for PREVENTION, takes months to work, does not treat acute attack).'},
{id:'m11_6',mod:'m11',drug:false,type:'mc',q:'Rheumatoid arthritis differs from osteoarthritis in that RA:',opts:['Affects primarily weight-bearing joints asymmetrically','Is a chronic autoimmune inflammatory disease with symmetric joint involvement and systemic manifestations','Causes Heberden\'s and Bouchard\'s nodes from cartilage degeneration','Is degenerative and non-inflammatory'],ans:[1],rationale:'RA is an autoimmune inflammatory disease: symmetric joint involvement (both sides), morning stiffness >1 hour (improves with activity), systemic manifestations (fever, fatigue, rheumatoid nodules, extra-articular involvement of heart, lungs, eyes). RF positive in ~80%.',pearl:'RA pathology: synovitis → pannus formation → fibrous ankylosis → bony ankylosis (joint fusion). Treatment: NSAIDs for symptoms, DMARDs (methotrexate first-line) to prevent joint destruction, steroids during flares, biologics (TNF blockers like etanercept) for refractory cases.'},
{id:'m11_7',mod:'m11',drug:false,type:'sata',q:'Which fracture types present with bone protruding through or near the skin? Select all that apply.',opts:['Open (compound) fracture','Closed (simple) fracture','Comminuted fracture','Greenstick (incomplete) fracture','Open fracture with contamination risk'],ans:[0,4],rationale:'Open/compound fracture = bone penetrates through the skin = high risk of infection, contamination, and osteomyelitis. Closed fracture = bone does not penetrate skin. Comminuted = crushed into fragments. Greenstick = incomplete/partially broken.',pearl:'Open fracture = infection risk → requires immediate wound irrigation, antibiotics, and surgical stabilization. Fracture healing stages: Hematoma → Inflammation → Soft callus → Hard callus → Remodeling. Complications: infection, non-union (failure to heal), compartment syndrome (most serious acute complication).'},
{id:'m11_8',mod:'m11',drug:false,type:'mc',q:'Allopurinol (Zyloprim) is prescribed for chronic gout prevention. The nurse educates the patient that:',opts:['It will provide immediate relief during acute attacks','It takes months to reduce uric acid levels — do not stop after feeling better','It is used only during acute flares and then discontinued','It works by increasing urinary excretion of uric acid'],ans:[1],rationale:'Allopurinol blocks xanthine oxidase → decreases uric acid synthesis. Takes months to reduce serum uric acid levels. Must continue long-term even when asymptomatic. Do NOT use during acute attacks (can worsen by mobilizing urate crystals).',pearl:'Allopurinol: PREVENTION (not treatment) of gout. Takes weeks to months. During initial therapy, acute gout attacks may actually increase (urate crystals mobilize) — add colchicine prophylaxis initially. Monitor: CBC, LFTs, renal function, uric acid levels. Serious rare side effect: Stevens-Johnson syndrome (stop immediately if rash develops).'},

{id:'m1_16',mod:'m1',drug:false,type:'mc',q:'Which cellular transport process requires ATP and moves substances AGAINST a concentration gradient?',opts:['Simple diffusion','Osmosis','Active transport','Facilitated diffusion'],ans:[2],rationale:'Active transport moves substances from low to high concentration and requires ATP. The Na+/K+ pump moves 3 Na+ out and 2 K+ in against their gradients. Passive transport moves WITH the gradient and needs no energy.',pearl:'Passive = downhill (no energy). Active = uphill (needs ATP). Na+/K+ pump maintains the resting membrane potential of every cell — the foundation of nerve and muscle function.'},
{id:'m1_17',mod:'m1',drug:false,type:'mc',q:'A disease with an insidious onset means it:',opts:['Began suddenly and severely','Developed gradually with subtle early symptoms often unnoticed','Is highly contagious and spreads rapidly','Follows a predictable pattern with defined stages'],ans:[1],rationale:'Insidious onset = gradual, slow, subtle development — patients often do not notice early symptoms. Examples: hypertension, type 2 diabetes, CKD. Contrast with acute onset (sudden, like MI or stroke).',pearl:'Insidious = sneaky and slow. Acute = sudden. Chronic = long-lasting. Many chronic diseases have insidious onsets — patients present late because early symptoms are minimal. This is why screening programs are critical.'},
{id:'m1_18',mod:'m1',drug:false,type:'mc',q:'The Na+/K+ ATPase pump moves ions in which direction per cycle?',opts:['2 Na+ out of cell and 3 K+ into cell','3 Na+ out of cell and 2 K+ into cell','Na+ and K+ both into the cell','Na+ and K+ both out of the cell'],ans:[1],rationale:'The Na+/K+ ATPase moves 3 Na+ OUT and 2 K+ IN per cycle using 1 ATP. This creates the electrochemical gradient essential for nerve impulses, muscle contraction, and cell volume regulation.',pearl:'3 out 2 in = net positive charge leaving = resting membrane potential of approximately -70mV. ICF = high K+, low Na+. ECF = high Na+, low K+. Digoxin inhibits this pump — hence its positive inotropic effect on cardiac muscle.'},
{id:'m1_19',mod:'m1',drug:false,type:'sata',q:'Which of the following are INTRINSIC (genetic/hereditary) causes of disease? Select all that apply.',opts:['Sickle cell disease','Cystic fibrosis','Smoking-related COPD','Hemophilia A','Turner syndrome','Alcohol use disorder'],ans:[0,1,3,4],rationale:'Intrinsic = genetic or hereditary: Sickle cell (autosomal recessive), Cystic fibrosis (autosomal recessive), Hemophilia A (X-linked recessive), Turner syndrome (45,X0). Smoking and alcohol are extrinsic (environmental/behavioral) causes.',pearl:'Intrinsic = born with it. Extrinsic = acquired. Many diseases have BOTH components — type 2 DM = genetic predisposition + obesity/diet trigger. Understanding etiology guides prevention strategies.'},
{id:'m1_20',mod:'m1',drug:false,type:'mc',q:'A patient has calcium of 6.8 mg/dL (normal 8.8-10.5). The nurse anticipates:',opts:['Lethargy, constipation, and decreased deep tendon reflexes','Polyuria, polydipsia, and muscle weakness','Tetany, muscle cramps, and positive Trousseau sign','Hypertension, bradycardia, and flushed skin'],ans:[2],rationale:'Hypocalcemia causes neuromuscular hyperexcitability: tetany, muscle cramps, paresthesias, positive Chvostek sign (facial twitch on CN VII tap), positive Trousseau sign (carpal spasm with BP cuff inflation). Severe: laryngospasm and seizures.',pearl:'Hypocalcemia = CATS: Convulsions, Arrhythmias, Tetany, Stridor/Spasms. Trousseau sign = inflate BP cuff → carpal spasm. Chvostek sign = tap near CN VII → facial twitch. Both are bedside tests for hypocalcemia.'},
{id:'m1_21',mod:'m1',drug:false,type:'mc',q:'Which IV fluid is isotonic and appropriate for volume replacement after hemorrhage?',opts:['0.45% NaCl (half normal saline)','3% NaCl (hypertonic saline)','0.9% NaCl (normal saline)','Sterile water for injection'],ans:[2],rationale:'0.9% NaCl is isotonic — same osmolarity as ECF. It expands intravascular volume without causing fluid shifts into or out of cells. Used for hemorrhage, surgery, blood transfusion companion fluid, and hypovolemia.',pearl:'Isotonic fluids stay in ECF (vascular + interstitial). 0.9% NS and Lactated Ringer are the main isotonic crystalloids. D5W is isotonic in the bag but becomes hypotonic in the body after glucose is metabolized — not ideal for resuscitation.'},
{id:'m1_22',mod:'m1',drug:false,type:'mc',q:'ADH (antidiuretic hormone) released in response to low blood volume — its PRIMARY renal action is:',opts:['Stimulating aldosterone release from the adrenal cortex','Increasing water reabsorption in collecting ducts to restore blood volume','Increasing sodium excretion to lower osmolality','Stimulating renin release from juxtaglomerular cells'],ans:[1],rationale:'ADH is released by the posterior pituitary in response to low blood volume or high osmolality. It acts on collecting duct V2 receptors → inserts aquaporin water channels → water reabsorption → concentrated urine → increased blood volume.',pearl:'ADH = Anti-Diuretic = keeps water IN. No ADH (diabetes insipidus) = massive water loss = dilute urine + hypernatremia. Too much ADH (SIADH) = water retained = concentrated urine + hyponatremia. They are direct opposites.'},
{id:'m1_23',mod:'m1',drug:false,type:'mc',q:'A patient has magnesium of 1.2 mEq/L (normal 1.8-3.6). Which drug presents the GREATEST toxicity risk?',opts:['Amoxicillin (penicillin antibiotic)','Heparin (anticoagulant)','Digoxin (cardiac glycoside)','Prednisone (corticosteroid)'],ans:[2],rationale:'Hypomagnesemia increases cardiac cell excitability and potentiates digoxin toxicity. Hypomagnesemia commonly coexists with hypokalemia. Both electrolyte deficits increase risk of digoxin toxicity and life-threatening dysrhythmias.',pearl:'Mg2+ deficiency is the most overlooked electrolyte problem. Always check Mg2+ when treating hypokalemia — you cannot effectively replace K+ without also replacing Mg2+. Hypo-Mg + hypo-K + digoxin = dangerous arrhythmia recipe.'},
{id:'m1_24',mod:'m1',drug:false,type:'mc',q:'When rising blood pressure triggers mechanisms that lower it back to normal, this is an example of:',opts:['Positive feedback — amplifying the change further','Negative feedback — counteracting the change to restore balance','Forward feedback — anticipating future changes','Passive feedback — requires no monitoring or energy'],ans:[1],rationale:'Negative feedback counteracts change to maintain homeostasis. High BP → baroreceptors activate → parasympathetic stimulation → vasodilation + decreased HR → BP falls back toward normal. Most physiological homeostatic mechanisms use negative feedback.',pearl:'Negative feedback = normal homeostasis (counteracts change). Positive feedback = amplifies change (oxytocin/labor, blood clotting cascade). HTN occurs when negative feedback mechanisms are overwhelmed or reset at a higher setpoint.'},
{id:'m1_25',mod:'m1',drug:false,type:'fill',q:'A serum sodium greater than 145 mEq/L is called ____________ and causes water to shift OUT of cells leading to cellular dehydration and neurological symptoms.',ans:['hypernatremia'],rationale:'Hypernatremia (Na+ >145 mEq/L) = hyperosmolar state → water pulled out of cells → cellular dehydration → cerebral cells shrink → neurological symptoms: confusion, lethargy, irritability, seizures, coma.',pearl:'Hypernatremia causes (6 Ds): Dehydration, Diarrhea, Diuretics, Diabetes insipidus, Docs (iatrogenic), Disease (renal failure). Treatment: GRADUAL free water replacement — too fast causes cerebral edema.'},
{id:'m1_26',mod:'m1',drug:false,type:'mc',q:'Which tissue type is primarily responsible for rapid electrical communication throughout the body?',opts:['Connective tissue','Epithelial tissue','Muscle tissue','Nervous tissue'],ans:[3],rationale:'Nervous tissue (neurons + glial cells) is specialized for communication, transmitting electrical signals rapidly throughout the body. Connective = support/protection. Epithelial = protection/secretion/absorption. Muscle = movement/transport.',pearl:'Four tissue types: Connective (bone, cartilage, blood), Epithelial (skin, GI lining), Muscle (skeletal, smooth, cardiac), Nervous (neurons and glia). Cancer named by tissue: carcinoma = epithelial, sarcoma = connective, lymphoma = immune cells, glioma = glial.'},
{id:'m1_27',mod:'m1',drug:false,type:'mc',q:'A patient in metabolic acidosis (pH 7.28, HCO3- 14 mEq/L). Which respiratory compensation is expected?',opts:['Decreased respiratory rate to retain CO2 and raise pH','Deep rapid breathing (Kussmaul) to blow off CO2 and raise pH toward normal','No respiratory compensation — only kidneys compensate for metabolic acidosis','Alternating apnea and hyperpnea (Cheyne-Stokes pattern)'],ans:[1],rationale:'In metabolic acidosis the respiratory system compensates by hyperventilating (Kussmaul breathing) to blow off CO2 which reduces carbonic acid and raises pH toward normal. Kussmaul = deep, rapid, labored breathing — classic in DKA.',pearl:'Compensation: Metabolic acidosis → respiratory alkalosis (hyperventilate, blow off CO2). Metabolic alkalosis → respiratory acidosis (hypoventilate, retain CO2). Respiratory acidosis → kidneys retain HCO3-. Kussmaul breathing = DKA until proven otherwise.'},
{id:'m1_28',mod:'m1',drug:false,type:'mc',q:'A patient has serum potassium of 2.9 mEq/L. Which gastrointestinal manifestation is expected?',opts:['Hyperactive bowel sounds and watery diarrhea','Hypoactive bowel sounds, decreased motility, and constipation','Severe abdominal pain with guarding and rigidity','Nausea and vomiting only without bowel sound changes'],ans:[1],rationale:'Hypokalemia causes decreased smooth muscle contractility → decreased peristalsis → hypoactive bowel sounds, constipation, abdominal distension. Severe hypokalemia can cause paralytic ileus.',pearl:'K+ and smooth muscle: Hypo-K = decreased GI motility (hypoactive bowel sounds, constipation, ileus). Hyper-K = increased GI motility (hyperactive bowel sounds, diarrhea). Always assess bowel sounds with electrolyte abnormalities.'},
// M2 additions: m2_15 to m2_28
{id:'m2_15',mod:'m2',drug:true,type:'mc',q:'A DEA Schedule II drug is characterized by:',opts:['No currently accepted medical use in the United States','High abuse potential AND currently accepted medical use — written Rx required no refills','Low potential for abuse with accepted medical use','Moderate abuse potential with telephone prescriptions allowed'],ans:[1],rationale:'Schedule II = high abuse potential + currently accepted medical use. Examples: oxycodone, fentanyl, morphine, Adderall, Ritalin. Require written prescriptions — no phone-in refills. DEA registration required for prescribers.',pearl:'DEA Schedules: I = no medical use (heroin, LSD). II = high abuse accepted use (opioids, stimulants — no refills). III = moderate (buprenorphine). IV = low (benzodiazepines, tramadol). V = lowest (some cough syrups with codeine). Higher number = less restrictive.'},
{id:'m2_16',mod:'m2',drug:true,type:'mc',q:'Vancomycin 1g IV should be infused over at least 60 minutes to prevent:',opts:['Nephrotoxicity from rapid peak serum concentration','Red Man Syndrome — histamine-mediated flushing erythema and hypotension','Ototoxicity from a rapid rate of infusion','Thrombophlebitis at the peripheral IV site'],ans:[1],rationale:'Rapid vancomycin infusion causes histamine release → Red Man Syndrome: flushing, erythema from neck upward, hypotension, pruritus. NOT a true IgE-mediated allergy — it is rate-dependent. Infusing over 60+ minutes prevents it.',pearl:'Vancomycin rule: SLOW infusion (60+ min). Red Man Syndrome = rate-related NOT an allergy (patient can receive vancomycin again with slower infusion). Pre-medicate with diphenhydramine for patients with prior reactions. Monitor trough levels for nephrotoxicity.'},
{id:'m2_17',mod:'m2',drug:false,type:'mc',q:'A patient has GFR of 12 mL/min. Which pharmacokinetic process is MOST impaired?',opts:['Drug absorption from the GI tract','Drug distribution into peripheral tissues','Hepatic first-pass metabolism','Renal excretion of drugs and their metabolites'],ans:[3],rationale:'The kidneys are the primary organ of drug excretion. Severely reduced GFR → drugs and metabolites accumulate → toxicity. Dose reduction or interval extension required for renally-cleared drugs: metformin, vancomycin, aminoglycosides, digoxin.',pearl:'GFR <30 = significant dose adjustment for most renally-cleared drugs. Key drugs requiring renal dosing: aminoglycosides (ototoxic/nephrotoxic), vancomycin, metformin, NSAIDs, LMWH, digoxin. Always check renal function before prescribing these.'},
{id:'m2_18',mod:'m2',drug:true,type:'mc',q:'A patient on opioids for 2 weeks now requires higher doses for the same pain relief. This is BEST described as:',opts:['Drug allergy from immune sensitization to the opioid','Drug tolerance — decreased response to the same dose over time','Physical dependence requiring immediate detoxification','A drug-drug interaction reducing the opioid effectiveness'],ans:[1],rationale:'Tolerance = decreased pharmacological effect with repeated exposure to the same dose, requiring dose increases to maintain effect. Common with opioids, benzodiazepines, alcohol, and nitrates. Results from receptor downregulation and enzyme induction.',pearl:'Tolerance vs Dependence vs Addiction: Tolerance = need more for same effect. Physical dependence = withdrawal if stopped suddenly. Addiction/SUD = compulsive use despite harm. A patient CAN be physically dependent without having addiction — expected in chronic pain management.'},
{id:'m2_19',mod:'m2',drug:true,type:'sata',q:'Which are characteristics of an ANTAGONIST drug? Select all that apply.',opts:['Binds to the receptor without activating it','Blocks agonists from accessing the receptor site','Produces a maximal therapeutic response on its own','Competitive antagonists can be overcome by increasing agonist dose','Can be used clinically to reverse agonist drug overdoses'],ans:[0,1,3,4],rationale:'Antagonists: bind receptors WITHOUT activating them (zero intrinsic activity), block agonist access, competitive antagonists can be overcome with more agonist, used for reversal (naloxone for opioids, flumazenil for BZDs). They do NOT produce responses on their own.',pearl:'Agonist = activates receptor (morphine). Antagonist = blocks no activation (naloxone). Partial agonist = partial activation + blocks full agonists (buprenorphine). Competitive antagonist = can be displaced by more agonist. Noncompetitive = irreversible binding.'},
{id:'m2_20',mod:'m2',drug:false,type:'mc',q:'After 5 half-lives of a drug, approximately what percentage remains in the body?',opts:['50%','25%','6.25%','Less than 3.2%'],ans:[3],rationale:'After each half-life 50% of remaining drug is eliminated: 100% to 50% to 25% to 12.5% to 6.25% to 3.125%. After 5 half-lives approximately 97% is eliminated — considered functionally cleared from the body.',pearl:'5 half-life rule: drug is essentially gone AND steady state is reached with regular dosing. Short half-life (acetaminophen 2-3 hrs) = steady state in ~15 hrs. Long half-life (amiodarone ~58 days) = months for steady state. Loading doses bypass this wait.'},
{id:'m2_21',mod:'m2',drug:true,type:'mc',q:'For subcutaneous insulin injection, which site has the FASTEST absorption rate?',opts:['Posterior upper arm','Anterior thigh','Abdomen (periumbilical area)','Hip or buttock'],ans:[2],rationale:'Absorption rates fastest to slowest: Abdomen > Arms > Thighs > Hips. The abdomen is preferred for rapid-acting insulin before meals due to fastest and most consistent absorption. Heat, exercise, and massage over the injection site increase absorption.',pearl:'Insulin absorption: Abdomen = fastest (use for rapid-acting before meals). Thigh = slowest (use for bedtime NPH). Exercise the injected limb → absorption speeds up. Rotate sites within same region to prevent lipodystrophy (lumpy scar tissue = irregular absorption).'},
{id:'m2_22',mod:'m2',drug:false,type:'mc',q:'Which route provides 100% bioavailability and completely bypasses first-pass metabolism?',opts:['Oral (PO)','Rectal — only partial bypass','Intravenous (IV)','Intramuscular (IM)'],ans:[2],rationale:'IV administration delivers drug directly into systemic circulation bypassing the GI tract and hepatic first-pass entirely. 100% bioavailability. Sublingual also largely bypasses first-pass. Rectal partially bypasses depending on venous drainage involved.',pearl:'Bioavailability: IV = 100%. Oral morphine ~25-30% (70-75% lost to first-pass). That is why IV morphine is ~3x more potent per mg than oral. Sublingual nitroglycerin bypasses first-pass — that is why it is used sublingually rather than swallowed.'},
{id:'m2_23',mod:'m2',drug:true,type:'mc',q:'A nurse gives the wrong dose due to an incorrect calculation. This error type is:',opts:['Knowledge deficit error — lacks drug knowledge','Performance deficit error — knew but executed incorrectly','Miscalculation error — incorrect mathematical computation of the dose','Communication error — transcription or verbal order mistake'],ans:[2],rationale:'Miscalculation errors (13% of medication errors) result from incorrect mathematical calculations of drug doses. Performance deficit (30% — most common) = correct knowledge but incorrect execution. Knowledge deficit (14%) = lacks drug knowledge.',pearl:'Top error causes: Performance deficit 30%, Communication 15%, Knowledge deficit 14%, Miscalculation 13%. Prevention: double-check calculations with another nurse, barcode scanning, limit interruptions during med prep, standardized concentration protocols for high-alert drugs.'},
{id:'m2_24',mod:'m2',drug:false,type:'mc',q:'Cytochrome P450 (CYP450) drug-metabolizing enzymes are primarily located in which organ?',opts:['Kidneys','Lungs','Liver','Small intestine'],ans:[2],rationale:'CYP450 enzymes are concentrated in hepatocytes (liver cells). They metabolize the majority of drugs through oxidation, reduction, and hydrolysis. Some CYP450 enzymes also exist in the intestinal wall explaining gut-level interactions.',pearl:'Key CYP enzymes: CYP3A4 metabolizes ~50% of all drugs (inhibited by grapefruit, macrolides, azoles; induced by rifampin, carbamazepine, St. Johns Wort). CYP2D6 metabolizes many antidepressants and opioids. Genetic polymorphisms create poor vs. ultrarapid metabolizers.'},
{id:'m2_25',mod:'m2',drug:true,type:'mc',q:'A nurse administers the correct medication to the wrong patient. Which medication right was violated?',opts:['Right drug','Right patient','Right dose','Right route'],ans:[1],rationale:'Right Patient: giving the correct medication to the wrong person. Prevention: use TWO patient identifiers (name + date of birth, OR name + MRN) before EVERY medication administration. Never use room number as an identifier.',pearl:'Two patient identifiers EVERY time — The Joint Commission requirement. Ask the patient to STATE their name and DOB (do not just say Are you Mr. Smith — confused patients may agree). Scan barcodes when available. Wrong patient errors are sentinel events and are 100% preventable.'},
{id:'m2_26',mod:'m2',drug:true,type:'fill',q:'Drugs that SPEED UP CYP450 enzymes and lower plasma levels of co-administered drugs are called enzyme ______.',ans:['inducers','inducer'],rationale:'Enzyme inducers increase CYP450 enzyme synthesis → faster drug metabolism → LOWER drug levels → reduced drug effect. Classic inducers: Rifampin, Carbamazepine, Phenytoin, St. Johns Wort, Barbiturates, chronic alcohol use.',pearl:'Inducers DECREASE drug levels. Inhibitors INCREASE drug levels. Mnemonic for inducers RIPS-CB: Rifampin, Isoniazid, Phenytoin, St. Johns Wort, Carbamazepine, Barbiturates. Rifampin is the most potent inducer — can slash warfarin levels by 50%.'},
{id:'m2_27',mod:'m2',drug:false,type:'mc',q:'Which food-drug interaction is MOST life-threatening?',opts:['Calcium and acetaminophen reducing absorption','Tyramine-rich foods and MAO inhibitors causing hypertensive crisis','Grapefruit and aspirin causing GI bleeding','Vitamin C and penicillin reducing antibiotic effectiveness'],ans:[1],rationale:'Tyramine-rich foods (aged cheese, red wine, cured meats, soy sauce) + MAO inhibitors = hypertensive crisis (potentially fatal). MAOIs block tyramine breakdown → massive norepinephrine release → severe hypertension, stroke risk.',pearl:'MAOIs + tyramine = cheese reaction = hypertensive crisis = life-threatening. MAOIs include phenelzine, tranylcypromine, selegiline (high dose), linezolid (antibiotic with MAOI activity). MAOIs + SSRIs = serotonin syndrome. MAOIs have the most dangerous interactions of any drug class.'},
{id:'m2_28',mod:'m2',drug:true,type:'mc',q:'A patient on warfarin dramatically increases daily spinach and kale intake. The nurse expects:',opts:['Increased warfarin effect and bleeding risk','Decreased warfarin effect and increased clotting risk from dietary vitamin K','No clinically significant effect on anticoagulation','Increased INR readings without changing actual anticoagulation'],ans:[1],rationale:'Warfarin blocks vitamin K-dependent clotting factor synthesis. Large amounts of dietary vitamin K compete with warfarin mechanism → reduced anticoagulation → lower INR → clotting risk. Patients should maintain CONSISTENT green vegetable intake.',pearl:'Warfarin + vitamin K = competition. More K = less warfarin effect (lower INR = more clotting risk). Consistency is key — sudden large increases in vitamin K can drop INR dramatically within days. Garlic, ginkgo, fish oil, and ginger increase warfarin effect (bleeding risk).'},
// M3 additions: m3_13 to m3_25
{id:'m3_13',mod:'m3',drug:false,type:'mc',q:'B lymphocytes differentiate into plasma cells. The PRIMARY function of plasma cells is:',opts:['Directly killing virally infected cells via cytotoxic mechanisms','Producing and secreting specific antibodies (immunoglobulins)','Presenting antigens on MHC II molecules to activate helper T cells','Secreting cytokines to recruit and activate macrophages'],ans:[1],rationale:'Plasma cells are antibody-producing factories. When B lymphocytes are activated by T helper cells and antigens, they differentiate into plasma cells that produce large amounts of specific IgM, IgG, IgA, IgE, or IgD targeting specific pathogens.',pearl:'B cell pathway: Antigen + T helper help → B cell activation → Plasma cell (antibodies) OR Memory B cell (rapid secondary response). Memory B cells are the basis of vaccine immunity — why second exposures produce faster stronger responses.'},
{id:'m3_14',mod:'m3',drug:false,type:'mc',q:'The PRIMARY difference between innate and adaptive immunity is:',opts:['Innate works only against bacteria; adaptive works against all pathogens','Innate is rapid and non-specific without memory; adaptive is slower but specific with immunological memory','Adaptive immunity is present at birth; innate develops over a lifetime','Innate produces antibodies; adaptive uses phagocytosis and complement'],ans:[1],rationale:'Innate: rapid (minutes to hours), non-specific, no memory, first line (skin, mucus, complement, neutrophils, macrophages, NK cells). Adaptive: slower (days), highly specific, has immunological memory, uses T and B lymphocytes.',pearl:'Innate = born with it, immediate, non-specific, no memory. Adaptive = learned, specific (MHC recognition), has memory (vaccines work through adaptive memory). HIV destroys adaptive immunity (CD4 T cells) — why AIDS patients get opportunistic infections normally controlled by a healthy immune system.'},
{id:'m3_15',mod:'m3',drug:false,type:'mc',q:'Which finding is characteristic of SLE (systemic lupus erythematosus)?',opts:['Positive rheumatoid factor and symmetric small joint arthritis beginning in the fingers','Butterfly (malar) rash on the face, joint inflammation, and renal involvement','Progressive CNS demyelination with optic neuritis and relapsing-remitting course','Destruction of pancreatic beta cells causing absolute insulin deficiency'],ans:[1],rationale:'SLE (lupus) classic findings: butterfly/malar rash (cheeks and nose bridge), joint pain/swelling, photosensitivity, oral ulcers, serositis, renal involvement (lupus nephritis), neurological and hematologic abnormalities. Diagnosed with ANA test.',pearl:'SLE affects women 9:1 over men, especially African American women. ANA positive >95% of SLE. Anti-dsDNA and anti-Smith are specific for SLE. Lupus nephritis is a leading cause of morbidity. Hydroxychloroquine is first-line and safe in pregnancy.'},
{id:'m3_16',mod:'m3',drug:false,type:'mc',q:'The inflammatory response cardinal signs — redness and heat — are caused primarily by:',opts:['Lymphocyte migration and cytokine release into the tissue','Vasodilation increasing blood flow to the injured area','Histamine causing direct chemical damage to surrounding tissue','Platelet aggregation forming a clot at the injury site'],ans:[1],rationale:'Vasodilation (mediated by histamine, prostaglandins, bradykinin) increases blood flow → more warm blood = heat, more blood = redness. Swelling results from increased capillary permeability. Pain from bradykinin and prostaglandin stimulation of nerve endings.',pearl:'Cardinal signs: Redness = vasodilation (more blood). Heat = vasodilation (warm blood). Swelling = increased capillary permeability. Pain = bradykinin + prostaglandins. NSAIDs block prostaglandin synthesis → reduce all 4 signs.'},
{id:'m3_17',mod:'m3',drug:true,type:'mc',q:'Methotrexate as a DMARD for rheumatoid arthritis works by:',opts:['Blocking TNF-alpha cytokine activity in inflamed synovium','Inhibiting dihydrofolate reductase blocking folic acid metabolism needed for DNA synthesis in rapidly dividing immune cells','Suppressing T cell activation via calcineurin inhibition','Blocking interleukin-1 receptor signaling in joint chondrocytes'],ans:[1],rationale:'Methotrexate inhibits dihydrofolate reductase → blocks folic acid metabolism → impairs DNA synthesis → reduces rapidly dividing immune cells driving RA inflammation. Same mechanism as cancer chemotherapy but at much lower doses.',pearl:'Methotrexate is the gold standard first-line DMARD for RA. Key side effects: hepatotoxicity (monitor LFTs q3-6 months), bone marrow suppression (monitor CBC), severe teratogenicity (NEVER in pregnancy). Always supplement folic acid to reduce side effects without reducing efficacy.'},
{id:'m3_18',mod:'m3',drug:true,type:'mc',q:'Cyclosporine after organ transplantation most commonly requires monitoring for:',opts:['Bone marrow suppression leading to pancytopenia and infection','Nephrotoxicity and hypertension from calcineurin inhibition in renal tubular cells','Irreversible peripheral neuropathy and foot drop','Hyperglycemia requiring insulin therapy in all transplant patients'],ans:[1],rationale:'Cyclosporine inhibits calcineurin → blocks IL-2 → prevents T cell proliferation. However calcineurin is also present in renal tubular cells → nephrotoxicity is the major limiting side effect. Also causes hypertension, hepatotoxicity, gingival hyperplasia, and hirsutism.',pearl:'Calcineurin inhibitors (cyclosporine, tacrolimus) = nephrotoxic + hypertensive. Monitor: drug levels (narrow TI), creatinine, blood pressure, blood glucose. All immunosuppressants increase infection and cancer (especially lymphoma) risk. Never stop suddenly — transplant rejection risk.'},
{id:'m3_19',mod:'m3',drug:false,type:'sata',q:'Which cells are part of INNATE immunity? Select all that apply.',opts:['Neutrophils','B lymphocytes','Natural killer (NK) cells','Macrophages','Cytotoxic T cells (CD8+)','Basophils'],ans:[0,2,3,5],rationale:'Innate immunity cells: Neutrophils (first responders, phagocytose bacteria), NK cells (kill virally infected cells without prior sensitization), Macrophages (phagocytosis, APC, cytokine release), Basophils (release histamine). B lymphocytes and cytotoxic T cells are ADAPTIVE immunity.',pearl:'Innate cells = non-specific defense. Neutrophils = most abundant WBC, first to arrive at infection. Macrophages = long-lived, tissue-specific names (Kupffer in liver, microglia in CNS, Langerhans in skin). NK cells = kill without antibodies or prior sensitization.'},
{id:'m3_20',mod:'m3',drug:false,type:'mc',q:'A positive PPD (tuberculin skin test) at 16mm induration in a healthcare worker indicates:',opts:['Active tuberculosis disease requiring immediate isolation and treatment','Previous exposure to M. tuberculosis and a Type IV cell-mediated immune response — further workup needed','A failed test that must be immediately repeated due to poor technique','Immunity from BCG vaccination only with no pathological significance'],ans:[1],rationale:'Positive PPD = previous exposure to M. tuberculosis + Type IV cell-mediated immune response (delayed hypersensitivity). Does NOT diagnose active TB. Further testing (CXR, sputum culture, IGRA) needed to distinguish latent from active TB.',pearl:'PPD positive cutoffs: 5mm (HIV, close TB contacts, immunocompromised), 10mm (healthcare workers, immigrants from high-prevalence areas), 15mm (no risk factors). BCG vaccination can cause false-positive PPD — IGRA (QuantiFERON-TB Gold) is not affected by BCG.'},
{id:'m3_21',mod:'m3',drug:true,type:'mc',q:"A patient receiving IV penicillin develops hives, wheezing, and hypotension. The nurse's FIRST action is:",opts:['Stop infusion and administer diphenhydramine IV immediately','Stop infusion, call for help, and administer epinephrine IM in the vastus lateralis immediately','Slow the infusion rate and observe the patient for 30 minutes','Administer IV corticosteroids and reassess in 15 minutes'],ans:[1],rationale:'Anaphylaxis. First: STOP the offending agent. Call for help. Administer EPINEPHRINE IM immediately — it is the only treatment addressing all three life-threatening components: bronchospasm, vasodilation/shock, and continued mast cell degranulation.',pearl:'Anaphylaxis order: Stop allergen → Epinephrine IM (vastus lateralis) → Call emergency help → Airway management → IV fluids → Antihistamines and steroids (adjuncts only). Diphenhydramine and steroids do not work fast enough to prevent death from airway obstruction or cardiovascular collapse.'},
{id:'m3_22',mod:'m3',drug:false,type:'mc',q:'Neutrophils have a half-life of approximately 6 hours. The clinical significance is:',opts:['They provide long-term immunity against recurrent bacterial infections','Their short lifespan means counts drop rapidly with bone marrow suppression creating severe infection risk within days','They produce antibodies throughout their brief lifespan that persist longer','Their rapid turnover makes them completely resistant to chemotherapy agents'],ans:[1],rationale:"Neutrophils' short lifespan means bone marrow must continuously produce them. When suppressed (chemotherapy, aplastic anemia) → neutrophil counts drop rapidly within days → severe infection risk. Nadir after chemotherapy: typically 7-14 days post-treatment.",pearl:'Neutropenia: ANC <1500. ANC <500 = severe. ANC <100 = profound — empiric broad-spectrum antibiotics for any fever. Treatment: filgrastim (G-CSF). Neutropenic precautions: private room, strict hand hygiene, avoid fresh unpeeled fruits/veggies.'},
{id:'m3_23',mod:'m3',drug:true,type:'mc',q:'Monoclonal antibodies used in immunotherapy and targeted cancer therapy end in which suffix?',opts:['-cillin (penicillin antibiotics)','-mab (monoclonal antibodies)','-olol (beta-blockers)','-pril (ACE inhibitors)'],ans:[1],rationale:"Monoclonal antibodies = -mab suffix. Examples: bevacizumab (VEGF inhibitor for cancer), rituximab (anti-CD20 for lymphoma and RA), adalimumab (TNF blocker for RA/Crohn's), evolocumab (PCSK9 inhibitor for cholesterol), omalizumab (anti-IgE for asthma).",pearl:'Drug suffix guide: -mab = Monoclonal AntiBody. -cillin = penicillin. -olol = beta-blocker. -pril = ACE inhibitor. -sartan = ARB. -statin = HMG-CoA reductase inhibitor. -zepam/-zolam = benzodiazepine. -dipine = dihydropyridine CCB. -floxacin = fluoroquinolone.'},
{id:'m3_24',mod:'m3',drug:false,type:'mc',q:'Type III hypersensitivity (immune complex disease) causes tissue damage by:',opts:['IgE-mediated mast cell degranulation releasing histamine immediately','Antigen-antibody complexes depositing in vessel walls and tissues activating complement and causing inflammation','Direct T-cell cytotoxic killing of target cells without antibody involvement','IgG/IgM antibodies binding directly to cell surface antigens causing direct cell lysis'],ans:[1],rationale:'Type III: antigen-antibody complexes form → deposit in blood vessel walls, kidneys, joints → activate complement → inflammation and tissue damage. Examples: SLE (lupus nephritis), rheumatoid arthritis, serum sickness, post-streptococcal glomerulonephritis.',pearl:'Hypersensitivity: Type I = IgE + mast cells = anaphylaxis (minutes). Type II = IgG/IgM + cell surface = cell destruction (transfusion reaction). Type III = immune complexes + complement = tissue damage (SLE, serum sickness). Type IV = T cells = delayed 24-72 hours (poison ivy, PPD, transplant rejection).'},
{id:'m3_25',mod:'m3',drug:true,type:'mc',q:'Hydroxychloroquine (Plaquenil) for SLE requires which unique ongoing monitoring?',opts:['Monthly liver function tests and CBC for hepatotoxicity and bone marrow suppression','Annual ophthalmologic exam — hydroxychloroquine accumulates in retinal tissue causing potential irreversible vision loss','Weekly blood pressure monitoring for medication-induced hypertension','Monthly serum creatinine for drug-induced nephrotoxicity'],ans:[1],rationale:"Hydroxychloroquine accumulates in retinal pigment epithelium over time → can cause irreversible bull's eye maculopathy and vision loss. Annual ophthalmologic exam (baseline before starting, then annually) is required to detect early changes before permanent damage.",pearl:'Hydroxychloroquine: baseline and ANNUAL eye exams (retinal toxicity). Generally well-tolerated. Safe in pregnancy (unique among DMARDs). Takes 2-6 months for full effect. One of the safest long-term DMARDs available. Also used for malaria prophylaxis and RA.'},
// M4 additions: m4_12 to m4_23
{id:'m4_12',mod:'m4',drug:false,type:'mc',q:"The spleen's role in the RBC lifecycle is to:",opts:['Produce all red blood cells in adults through hematopoiesis','Break down aged RBCs after their 120-day lifespan and recycle iron and amino acids','Store vitamin B12 needed for RBC maturation','Produce erythropoietin to stimulate RBC production in the bone marrow'],ans:[1],rationale:'The spleen destroys aged RBCs (~120-day lifespan). Macrophages recognize senescent RBCs → phagocytose them → break down hemoglobin → iron recycled (stored as ferritin, transferred to bone marrow) → heme becomes bilirubin → excreted in bile.',pearl:'RBC lifecycle: bone marrow produces → 120-day lifespan → spleen destroys → iron recycled → heme → bilirubin → bile. This explains why hemolytic disorders cause BOTH jaundice (excess bilirubin) and anemia (faster RBC destruction than production can replace).'},
{id:'m4_13',mod:'m4',drug:true,type:'mc',q:'A key advantage of enoxaparin (Lovenox/LMWH) over unfractionated heparin (UFH) is:',opts:['It can be reversed with Vitamin K in emergencies unlike UFH','Predictable dose-response eliminates routine aPTT monitoring and it has a lower HIT risk','It can be given orally for convenient outpatient use','It has a shorter half-life allowing immediate dose adjustments'],ans:[1],rationale:'LMWH advantages over UFH: predictable dose-response (no routine aPTT monitoring), lower risk of HIT, subcutaneous-only administration, longer half-life enabling once or twice daily dosing for outpatient anticoagulation.',pearl:'LMWH vs UFH: LMWH = predictable, less monitoring, less HIT risk, home use possible. UFH = more controllable (short half-life, reversible with protamine sulfate), preferred in renal failure (LMWH accumulates in CKD) and when rapid reversal may be needed.'},
{id:'m4_14',mod:'m4',drug:false,type:'mc',q:'A patient with DVT develops sudden severe dyspnea, pleuritic chest pain, and SpO2 of 88%. The nurse suspects:',opts:['Tension pneumothorax from DVT-related vessel damage','Pulmonary embolism from DVT propagation to the pulmonary vasculature','Acute COPD exacerbation from immobility-related bronchospasm','Left-sided heart failure with new onset pulmonary edema'],ans:[1],rationale:'DVT + sudden dyspnea + pleuritic chest pain + hypoxemia = classic pulmonary embolism. DVT → thrombus breaks off → travels through right heart → lodges in pulmonary artery → V/Q mismatch (ventilation without perfusion = dead space) → hypoxemia.',pearl:'PE prevention: early mobilization, SCDs, prophylactic anticoagulation for high-risk patients. PE diagnosis: CT pulmonary angiography (gold standard). Treatment: therapeutic anticoagulation. Massive PE with hemodynamic instability → thrombolytics.'},
{id:'m4_15',mod:'m4',drug:false,type:'mc',q:'Von Willebrand disease (vWD) causes abnormal bleeding because vWF is required for:',opts:['Activating the extrinsic coagulation pathway via tissue factor','Platelet adhesion to damaged vessel walls — without vWF the platelet plug cannot form properly','Inhibiting fibrinolysis to keep clots stable once formed','Vitamin K-dependent absorption needed for clotting factor synthesis'],ans:[1],rationale:'Von Willebrand Factor bridges between platelets and exposed subendothelial collagen at sites of vessel injury. Without vWF, platelets cannot adhere → platelet plug cannot form → abnormal bleeding. vWF also carries factor VIII in circulation.',pearl:'vWD = most common inherited bleeding disorder. Mucosal bleeding pattern (nosebleeds, heavy periods, gum bleeding). Hemophilia A = deep tissue/joint bleeds (hemarthroses). Treatment for vWD: DDAVP (releases stored vWF from endothelium) for mild cases; vWF concentrates for severe.'},
{id:'m4_16',mod:'m4',drug:true,type:'mc',q:'A patient on warfarin has INR of 1.4 (therapeutic target 2.0-3.0). The nurse understands:',opts:['The patient is over-anticoagulated and at immediate bleeding risk','The patient is under-anticoagulated and at risk for thrombosis or clot propagation','The patient is at therapeutic level for all anticoagulation indications','The patient is experiencing HIT from a drug interaction with warfarin'],ans:[1],rationale:'INR 1.4 is below therapeutic range (2.0-3.0). This means insufficient anticoagulation → risk of clot growth or new thrombosis. Investigate causes: missed doses, increased vitamin K intake, enzyme-inducing drug added (rifampin, carbamazepine).',pearl:'Warfarin INR targets: DVT/PE, A-fib = 2.0-3.0. Mechanical mitral valve = 2.5-3.5. Normal INR = 1.0. INR <2 = subtherapeutic (clotting risk). INR >3-4 = supratherapeutic (bleeding risk). INR >5 = hold warfarin and consider Vitamin K.'},
{id:'m4_17',mod:'m4',drug:false,type:'mc',q:'Disseminated intravascular coagulation (DIC) paradoxically causes both clotting AND bleeding because:',opts:['The patient alternates between hypo- and hypercoagulable states cyclically','Widespread coagulation cascade activation consumes all clotting factors and platelets leaving nothing for normal hemostasis','The patient has two separate unrelated disorders simultaneously','Anticoagulant therapy administered to treat DIC causes the bleeding'],ans:[1],rationale:'DIC: a triggering event causes massive widespread coagulation activation → microthrombi form throughout the microcirculation → clotting factors and platelets are CONSUMED (consumptive coagulopathy) → none remain for normal hemostasis → uncontrolled bleeding from all sites.',pearl:'DIC triggers: Sepsis, Trauma, Obstetric complications, Pancreatitis, Malignancy, Necrotizing fasciitis, Transfusion reactions. Labs: low fibrinogen (consumed), elevated D-dimer (most sensitive), prolonged PT/PTT, low platelets. Treat the underlying cause first.'},
{id:'m4_18',mod:'m4',drug:true,type:'mc',q:'Hydroxyurea (Droxia) reduces painful crises in sickle cell disease by:',opts:['Directly correcting the HbS gene mutation at the molecular level','Increasing fetal hemoglobin (HbF) production which dilutes HbS and prevents sickling polymerization','Anticoagulating the blood to prevent vaso-occlusive events','Supplementing iron to increase total hemoglobin and oxygen-carrying capacity'],ans:[1],rationale:'Hydroxyurea stimulates fetal hemoglobin (HbF) production. HbF does not participate in the sickling polymerization that creates rigid sickle cells. More HbF = less HbS relative proportion = less sickling = fewer vaso-occlusive crises and hospitalizations.',pearl:'Hydroxyurea (Droxia): most effective sickle cell drug. Reduces hospitalizations and mortality significantly. Side effects: bone marrow suppression (monitor CBC). Teratogenic (contraception required for both men and women of reproductive age). Takes months for full effect.'},
{id:'m4_19',mod:'m4',drug:false,type:'mc',q:'Which lab value specifically monitors unfractionated heparin (UFH) therapy effectiveness?',opts:['INR (International Normalized Ratio) — extrinsic pathway monitor','aPTT (activated partial thromboplastin time) — intrinsic and common pathway monitor','Platelet count — used for HIT surveillance only','Fibrinogen level — for clot stability assessment'],ans:[1],rationale:'aPTT monitors the intrinsic and common coagulation pathways — the pathways heparin affects. Therapeutic aPTT for heparin = 1.5-2.5x control (approximately 60-100 seconds). INR/PT monitors warfarin (extrinsic pathway).',pearl:'Lab-drug monitoring pairs: Heparin → aPTT. Warfarin → INR/PT. LMWH (enoxaparin) → generally no monitoring needed (anti-Xa for special populations). DOACs (apixaban, rivaroxaban) → no routine monitoring. Using the wrong test leads to wrong dose adjustments.'},
{id:'m4_20',mod:'m4',drug:false,type:'mc',q:'Iron deficiency anemia (IDA) produces which characteristic red blood cell morphology?',opts:['Macrocytic (large) and normochromic','Normocytic and normochromic — normal size and color','Microcytic (small) and hypochromic (pale)','Spherocytic and hyperchromic — round dark cells'],ans:[2],rationale:'IDA: insufficient iron → insufficient hemoglobin synthesis → small RBCs (microcytic, MCV <80 fL) that are pale due to low hemoglobin content (hypochromic). Contrast with B12/folate deficiency (macrocytic, MCV >100) and chronic disease anemia (normocytic normochromic).',pearl:'Anemia by MCV: Microcytic hypochromic (MCV <80) = IDA, thalassemia. Normocytic normochromic (MCV 80-100) = acute blood loss, hemolytic, chronic disease, bone marrow failure. Macrocytic (MCV >100) = B12 deficiency, folate deficiency, hypothyroidism, liver disease, alcoholism.'},
{id:'m4_21',mod:'m4',drug:false,type:'mc',q:'A leukemia patient has an ANC of 350 cells/mm3. The nurse implements:',opts:['Contact precautions only to protect other patients','Neutropenic precautions — protective isolation strict hand hygiene and infection source avoidance','Droplet precautions for respiratory pathogens only','Standard precautions with no additional restrictions needed'],ans:[1],rationale:'ANC <500 = severe neutropenia = profound infection risk. Neutropenic precautions: private room (REVERSE isolation — protecting patient FROM environment), strict hand hygiene by ALL personnel, avoid fresh unpeeled fruits/veggies, no flowers/plants, screen visitors.',pearl:"Neutropenic precautions = REVERSE isolation (protecting the PATIENT from the environment). ANC <500 = severe. ANC <100 = profound — empiric broad-spectrum antibiotics for any fever. Biggest risk: patient's OWN GI flora."},
{id:'m4_22',mod:'m4',drug:false,type:'mc',q:'Which vitamin is essential for the liver synthesis of clotting factors II, VII, IX, and X?',opts:['Vitamin A (retinol)','Vitamin C (ascorbic acid)','Vitamin K','Vitamin E (tocopherol)'],ans:[2],rationale:'Vitamin K (fat-soluble) is required as a cofactor for the liver to synthesize clotting factors II (prothrombin), VII, IX, and X, plus proteins C and S. Warfarin (Vitamin K antagonist) inhibits these syntheses — Vitamin K reverses warfarin.',pearl:'Vitamin K = fat-soluble (deficiency in fat malabsorption). Sources: leafy greens + gut bacteria. Newborns are deficient at birth (no gut bacteria) → give Vitamin K injection at birth to prevent hemorrhagic disease of the newborn. Vitamin K is for Koagulation.'},
{id:'m4_23',mod:'m4',drug:true,type:'mc',q:'Epoetin alfa (Epogen) for anemia of CKD must NOT target Hgb above 11 g/dL because:',opts:['Hypokalemia occurs as RBC production pulls potassium into new cells','Higher Hgb increases blood viscosity and thrombosis risk — proven increase in cardiovascular events (stroke, MI)','Bone marrow fibrosis occurs with overstimulation by exogenous EPO','Hepatotoxicity occurs from iron overload when combined with supplementation'],ans:[1],rationale:'Studies (CHOIR, CREATE, TREAT) showed targeting Hgb >11-12 g/dL increases cardiovascular events from increased blood viscosity and hypertension. Target Hgb 10-11 g/dL in CKD patients — NOT normal levels. Higher targets increase mortality.',pearl:'Epoetin alfa (Epogen): synthetic EPO. Target Hgb 10-11 g/dL in CKD (NOT normal levels). Monitor blood pressure (EPO raises BP in ~30% of patients). Often paired with iron supplementation (need iron to make RBCs). Given SQ or IV 3x/week or weekly.'},
// M5 additions: m5_13 to m5_25
{id:'m5_13',mod:'m5',drug:false,type:'mc',q:'A patient has a TIA (transient ischemic attack). The nurse understands this is:',opts:['A minor stroke with permanent but small neurological deficits','A temporary neurological deficit lasting <24 hours with no permanent infarction — a critical warning sign for stroke','A type of hemorrhagic stroke with self-limiting bleeding that resolves spontaneously','A migraine variant that mimics stroke symptoms'],ans:[1],rationale:'TIA: temporary neurological deficit from transient impaired cerebral blood flow, lasting minutes to <24 hours with complete resolution and no permanent infarction on imaging. However, TIA is a MAJOR warning sign — 10-15% of patients have a stroke within 90 days.',pearl:"TIA = the brain's 911 call. Treat as an emergency — same evaluation as stroke: CT/MRI, carotid studies, cardiac monitoring, echocardiogram. Start antiplatelet therapy, control risk factors aggressively. Act immediately."},
{id:'m5_14',mod:'m5',drug:true,type:'mc',q:'Carbamazepine (Tegretol) for seizures requires warning patients about which life-threatening skin reaction?',opts:['Gingival hyperplasia — common and expected with long-term use','Common maculopapular rash that resolves with antihistamines only','Stevens-Johnson syndrome (SJS) — severe blistering skin reaction that can be fatal','Mild photosensitivity requiring daily sunscreen use'],ans:[2],rationale:'Stevens-Johnson syndrome is a rare but life-threatening hypersensitivity reaction to carbamazepine (and allopurinol, sulfonamides, phenytoin). Painful blistering, skin sloughing, mucous membrane involvement. Risk increased in HLA-B*1502 genotype (Asian populations).',pearl:'SJS warning drugs CARBS-P: Carbamazepine, Allopurinol, Rifampin, Bactrim (sulfonamides), Phenytoin. Teach ALL patients: STOP immediately and seek emergency care if ANY rash develops. Early discontinuation can be life-saving. Screen Asian patients for HLA-B*1502 before starting carbamazepine.'},
{id:'m5_15',mod:'m5',drug:true,type:'mc',q:'Beyond standard LFT and CBC monitoring, valproic acid (Depakote) also requires monitoring of:',opts:['Thyroid function tests (TSH) — valproic acid suppresses thyroid function','Serum ammonia levels — valproate can cause hyperammonemia encephalopathy even with normal LFTs','Serum creatinine and BUN — valproic acid is nephrotoxic at therapeutic doses','Pulmonary function tests — valproic acid causes progressive pulmonary fibrosis'],ans:[1],rationale:'Valproic acid can cause hyperammonemia encephalopathy — elevated ammonia → confusion, lethargy, encephalopathy — even when LFTs are normal. This is a unique toxicity separate from hepatotoxicity. Also monitor drug levels (50-100 mcg/mL), LFTs, and CBC.',pearl:'Valproic acid monitoring: drug levels, LFTs (hepatotoxicity especially in children <2 years), ammonia (hyperammonemia encephalopathy), CBC (thrombocytopenia), pregnancy test (teratogenic — neural tube defects). Multiple parameters reflect multiple potential side effects.'},
