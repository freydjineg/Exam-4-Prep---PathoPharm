{id:'m11_17',mod:'m11',drug:true,type:'mc',q:'Bisphosphonates like alendronate treat osteoporosis by which mechanism?',opts:['Stimulating osteoblast activity to build new bone matrix and increase bone density','Inhibiting osteoclast activity to slow bone resorption and prevent further bone loss','Directly supplementing calcium into the bone matrix without affecting cellular activity','Mimicking PTH to increase both bone formation and resorption in a balanced manner'],ans:[1],rationale:'Bisphosphonates (alendronate, risedronate, zoledronic acid) are taken up by osteoclasts during bone resorption → inhibit osteoclast function → osteoclasts undergo apoptosis → reduced bone resorption → increased bone mineral density. They do NOT directly stimulate new bone formation.',pearl:'Bisphosphonates = anti-resorptive (inhibit osteoclasts). Anabolic agents (teriparatide/Forteo = PTH analogue) = stimulate new bone formation. Denosumab (Prolia) = RANKL inhibitor = also reduces osteoclast activity = anti-resorptive. Anabolic agents used for severe osteoporosis or when bisphosphonates fail.'},
{id:'m11_18',mod:'m11',drug:false,type:'mc',q:'A patient with SLE develops lupus nephritis. Which lab findings confirm renal involvement?',opts:['Elevated AST and ALT with jaundice indicating hepatic inflammation','Proteinuria, hematuria, elevated BUN and creatinine, and red blood cell (RBC) casts in urine','Elevated uric acid and joint aspirate showing monosodium urate crystals','Positive anti-dsDNA antibodies with thrombocytopenia only'],ans:[1],rationale:'Lupus nephritis: SLE immune complex deposition in glomeruli → glomerulonephritis → proteinuria (may reach nephrotic range), hematuria, RBC casts in urine (pathognomonic for glomerulonephritis), elevated BUN and creatinine (declining GFR), hypertension.',pearl:'RBC casts in urine = ALWAYS abnormal = glomerulonephritis until proven otherwise. RBC casts form when RBCs leak into tubular fluid and become embedded in protein. This hallmark finding occurs in lupus nephritis, post-strep GN, IgA nephropathy, and other immune-mediated glomerular diseases.'},
{id:'m11_19',mod:'m11',drug:false,type:'mc',q:"Paget's disease of bone is characterized by which pathophysiology?",opts:['Uniform decrease in bone density throughout the skeleton similar to osteoporosis',"Abnormal accelerated remodeling — disorganized osteoclast and osteoblast activity producing enlarged structurally weak bone",'Inflammatory synovitis destroying articular cartilage leading to joint deformity','Avascular necrosis of the femoral head from impaired arterial blood supply'],ans:[1],rationale:"Paget's disease: abnormal osteoclast activation (excessive resorption) followed by disorganized osteoblast response (excessive formation) → mosaic bone architecture → enlarged but structurally weak bones → deformity, fracture risk, nerve compression, high-output cardiac failure from hypervascularity.",pearl:"Paget's disease labs: markedly elevated alkaline phosphatase (ALP) = hallmark (reflects intense osteoblast activity). Normal calcium and phosphate. Bone scan shows lock of hair appearance. Treatment: bisphosphonates (zoledronic acid IV is most effective). Serious complication: osteosarcoma (1% risk)."},
{id:'m11_20',mod:'m11',drug:true,type:'mc',q:'A patient taking long-term prednisone for RA should routinely receive which prophylactic medications?',opts:['Prophylactic antibiotics to prevent opportunistic infections from immunosuppression','Calcium and vitamin D supplementation to prevent steroid-induced osteoporosis','Regular epinephrine doses to prevent adrenal insufficiency from steroid suppression','Anticoagulation to prevent DVT from steroid-induced hypercoagulability'],ans:[1],rationale:'Long-term systemic corticosteroids cause osteoporosis by suppressing osteoblast activity, decreasing intestinal calcium absorption, and increasing renal calcium excretion. ALL patients on long-term steroids should receive calcium (1000-1500 mg/day) and vitamin D (800-1000 IU/day) supplementation.',pearl:'Steroid-induced osteoporosis is the most PREVENTABLE form of secondary osteoporosis. If expected steroid use >3 months: calcium + vitamin D + consider bisphosphonate (alendronate or risedronate). Get baseline DEXA scan. Use lowest effective steroid dose and taper as quickly as clinically safe.'},

{id:'m1_29',mod:'m1',drug:false,type:'mc',q:'A patient in metabolic alkalosis has which acid-base values?',opts:['pH 7.28, HCO3 18, PaCO2 40','pH 7.50, HCO3 32, PaCO2 44','pH 7.32, HCO3 24, PaCO2 55','pH 7.48, HCO3 24, PaCO2 30'],ans:[1],rationale:'Metabolic alkalosis: elevated pH (>7.45), elevated HCO3 (>26), compensatory slight CO2 rise. Causes: vomiting (loss of HCl), diuretics, antacid overuse.',pearl:'ROME: Respiratory Opposite (pH up, CO2 down = resp alkalosis). Metabolic Equal (pH up, HCO3 up = met alkalosis). Memorize ROME for ABG interpretation.'},
{id:'m1_30',mod:'m1',drug:false,type:'mc',q:'Which type of necrosis is most characteristic of myocardial infarction?',opts:['Liquefactive necrosis','Caseous necrosis','Coagulative necrosis','Fat necrosis'],ans:[2],rationale:'Coagulative necrosis: structural framework of cells is preserved (like coagulated proteins). Classic in solid organs with ischemia — heart, kidney, spleen. Cell outlines remain visible on microscopy.',pearl:'Coagulative = Cardiac/ischemia (outlines preserved). Liquefactive = brain infarct + bacterial infections (enzymes liquefy tissue). Caseous = TB (cheese-like, granuloma). Fat = pancreas (saponification).'},
{id:'m1_31',mod:'m1',drug:false,type:'mc',q:'Cellular injury due to reperfusion after ischemia is primarily caused by:',opts:['Continued ATP depletion','Reactive oxygen species (free radicals) flooding the cell','Excessive calcium extrusion from the cell','Re-activation of the sodium-potassium pump'],ans:[1],rationale:'Reperfusion injury: when blood flow is restored, oxygen floods previously ischemic tissue → burst of reactive oxygen species (free radicals) → oxidative damage to cell membranes and DNA.',pearl:'Reperfusion paradox: restoring blood flow can WORSEN cell damage via free radicals. This is why antioxidants and careful post-MI management matter. Free radical damage = hallmark of reperfusion injury.'},
{id:'m1_32',mod:'m1',drug:false,type:'mc',q:'A nurse is caring for a patient in shock. Which compensatory mechanism is the FIRST to activate?',opts:['Renin-angiotensin-aldosterone system (RAAS)','Antidiuretic hormone (ADH) release from posterior pituitary','Baroreceptor-mediated sympathetic nervous system activation','Renal sodium and water retention'],ans:[2],rationale:'Baroreceptors (in aortic arch and carotid sinus) detect decreased BP and immediately activate the sympathetic nervous system → increased HR, vasoconstriction, increased contractility. This is the FASTEST compensatory response.',pearl:'Shock compensation order: (1) SNS/baroreceptors (seconds), (2) Renin-RAAS (minutes), (3) ADH (minutes), (4) Renal conservation (hours). NCLEX tip: recognize which compensatory mechanism has which timeline.'},
{id:'m1_33',mod:'m1',drug:false,type:'sata',q:'Which are characteristics of the INFLAMMATORY response? Select all that apply.',opts:['Rubor (redness)','Tumor (swelling)','Calor (heat)','Pallor (paleness)','Dolor (pain)','Loss of function'],ans:[0,1,2,4,5],rationale:'The five cardinal signs of inflammation (Cardinal signs of Celsus + Virchow): Rubor (redness — vasodilation), Tumor (swelling — increased permeability), Calor (heat — increased blood flow), Dolor (pain — bradykinin/prostaglandins), Functio laesa (loss of function). Pallor is NOT a sign of inflammation.',pearl:'Red, swollen, hot, painful, loss of function = classic inflammation. Pallor = vasoconstriction (opposite of inflammation). Prostaglandins cause fever, pain, vasodilation — that is why NSAIDs (COX inhibitors) reduce all three.'},
{id:'m2_29',mod:'m2',drug:false,type:'mc',q:'A patient develops anaphylaxis with stridor and bronchospasm. Which nursing action is the PRIORITY?',opts:['Administer diphenhydramine IV','Administer epinephrine IM in the vastus lateralis immediately','Position patient in high Fowler\'s and apply oxygen','Obtain IV access and run normal saline rapidly'],ans:[1],rationale:'Anaphylaxis with airway involvement requires EPINEPHRINE IM IMMEDIATELY. Epinephrine causes bronchodilation, vasoconstriction (raises BP), and inhibits further mast cell degranulation.',pearl:'For anaphylaxis: Epinephrine FIRST — then antihistamines and steroids as adjuncts. Give IM in vastus lateralis for fastest absorption. Repeat every 3-5 minutes as needed.'},
{id:'m2_30',mod:'m2',drug:true,type:'mc',q:'A nurse is administering IV vancomycin. Which monitoring parameter is MOST important to prevent nephrotoxicity?',opts:['Peak drug level drawn 30 minutes after infusion','Trough level drawn 30 minutes before next dose','CBC drawn weekly','Liver function tests drawn daily'],ans:[1],rationale:'Vancomycin nephrotoxicity is monitored primarily by trough levels (drawn 30 min before next dose). Troughs > 20 mg/L significantly increase nephrotoxicity risk. Some protocols also use AUC-guided monitoring.',pearl:'Vancomycin trough target: 10-20 mg/L for most infections. ALSO ototoxic (tinnitus, hearing loss). Two big toxicities: nephro- and oto-toxic. Think VAN-kidney and VAN-ear.'},
{id:'m2_31',mod:'m2',drug:true,type:'mc',q:'A patient is prescribed metronidazole (Flagyl). Which dietary instruction is MOST important?',opts:['Avoid dairy products for 2 hours after each dose','Avoid all alcohol during treatment and for 48 hours after completing therapy','Take on an empty stomach only','Avoid vitamin K-rich foods'],ans:[1],rationale:'Metronidazole + alcohol = disulfiram-like reaction: severe nausea, vomiting, flushing, palpitations, hypotension. Must avoid ALL alcohol including in mouthwash, cough syrups, and food.',pearl:'Flagyl = No Alcohol. Disulfiram (Antabuse) works the same way intentionally in alcohol use disorder treatment. Other medications with disulfiram-like reaction: tinidazole, chlorpropamide, some cephalosporins (cefotetan).'},
{id:'m2_32',mod:'m2',drug:false,type:'mc',q:'A drug\'s half-life is 6 hours. Approximately how long will it take to reach steady state?',opts:['6 hours','12 hours','24 hours (approximately 4 half-lives)','30 hours (approximately 5 half-lives)'],ans:[3],rationale:'Steady state is reached after approximately 5 half-lives regardless of the drug. At 5 half-lives = ~97% steady state concentration. At 5 × 6 hours = 30 hours.',pearl:'5 half-lives = steady state. 1 half-life = 50% remaining. 2 = 25%. 3 = 12.5%. 4 = 6.25%. 5 = 3.125%. Also applies in REVERSE — drug is 97% eliminated after 5 half-lives.'},
{id:'m2_33',mod:'m2',drug:true,type:'mc',q:'Which instruction is MOST important for a patient prescribed oral bisphosphonates (alendronate)?',opts:['Take at bedtime to improve calcium absorption','Take with a full glass of water and remain upright for 30 minutes after','Take with food to minimize GI side effects','Take with an antacid to prevent esophageal irritation'],ans:[1],rationale:'Bisphosphonates can cause severe esophageal irritation and ulceration if they pool in the esophagus. Take with 8 oz water, upright 30 minutes, no food or other meds for 30 minutes.',pearl:'Alendronate (Fosamax) = sit/stand upright 30 min. Reason: tablet must reach stomach without dwelling in esophagus. Serious complication = esophageal ulceration. Antacids REDUCE bisphosphonate absorption.'},
{id:'m2_34',mod:'m2',drug:false,type:'mc',q:'Which patient has the GREATEST risk of drug toxicity from standard doses?',opts:['A 25-year-old with normal renal and hepatic function','A 70-year-old with CKD stage 3 and mild hepatic impairment','A 40-year-old athlete with good renal clearance','A 35-year-old who is 20 weeks pregnant'],ans:[1],rationale:'The elderly with CKD and hepatic impairment have reduced drug metabolism AND reduced renal excretion. Both elimination pathways are compromised → drug accumulates → toxicity at standard doses.',pearl:'High toxicity risk: elderly (decreased metabolism), CKD (reduced excretion), hepatic disease (reduced metabolism), low albumin (more free drug), multiple drugs (polypharmacy interactions).'},
{id:'m2_35',mod:'m2',drug:true,type:'sata',q:'Which are correct teaching points for a patient starting lithium therapy? Select all that apply.',opts:['Maintain consistent sodium intake — do not suddenly restrict sodium','Monitor for tremors, nausea, polyuria as early toxicity signs','Increase fluid intake to 2-3 liters per day','Levels should be drawn as a peak 2 hours after dose','Report any signs of infection or fever immediately'],ans:[0,1,2,4],rationale:'Lithium: maintain consistent Na intake (low Na causes lithium retention and toxicity). Toxicity signs: tremor, nausea, polyuria, confusion. Adequate hydration essential. Levels = TROUGH (before next dose, not peak). Infections alter excretion.',pearl:'Lithium therapeutic window: 0.6-1.2 mEq/L. Toxicity > 1.5 mEq/L. Trough level (not peak) is monitored. Low Na diet = lithium toxicity. NSAIDs and ACE inhibitors INCREASE lithium levels.'},
{id:'m3_26',mod:'m3',drug:false,type:'mc',q:'The innate immune system differs from adaptive immunity in that it:',opts:['Produces antibodies against specific antigens','Has immunological memory from prior exposures','Responds immediately (within minutes to hours) with non-specific defenses','Requires T and B lymphocyte activation'],ans:[2],rationale:'Innate immunity = immediate, non-specific, no memory. Includes physical barriers (skin), phagocytes (neutrophils, macrophages), complement, NK cells, inflammation. Adaptive immunity = specific, has memory, slower (days).',pearl:'Innate = born with it, fast, non-specific. Adaptive = develops over time, slow (days), specific, memory. Vaccinations build ADAPTIVE immunity (immunological memory). First line of defense = innate.'},
{id:'m3_27',mod:'m3',drug:false,type:'mc',q:'A patient is prescribed prednisone long-term. Which lab value change would the nurse expect from chronic corticosteroid therapy?',opts:['Decreased white blood cell count (leukopenia)','Elevated blood glucose and decreased potassium','Decreased platelet count and bruising','Hyponatremia and hyperkalemia'],ans:[1],rationale:'Chronic corticosteroids: hyperglycemia (increase gluconeogenesis), hypokalemia (mineralocorticoid effect — promotes Na retention and K+ excretion), also: weight gain, HTN, osteoporosis, immunosuppression.',pearl:'Steroid side effects: CUSHINGOID — Cataracts, Ulcers, Skin changes (thin, bruising), Hypertension, Infection risk, Necrosis (avascular), Growth suppression, Osteoporosis, Increased glucose, Decreased K+.'},
{id:'m3_28',mod:'m3',drug:false,type:'sata',q:'Which are components of STANDARD precautions in infection control? Select all that apply.',opts:['Hand hygiene before and after patient contact','Gloves when handling blood or body fluids','N95 respirator for all patient interactions','Eye protection when splashing is anticipated','Proper disposal of sharps'],ans:[0,1,3,4],rationale:'Standard precautions apply to ALL patients regardless of diagnosis: hand hygiene, gloves for body fluids, eye protection when splashing risk, safe sharps disposal. N95 respirator = airborne precautions (TB, varicella, measles) — NOT standard for all patients.',pearl:'Standard precautions = every patient, every time. Transmission-based: Contact (MRSA), Droplet (flu, meningitis), Airborne (TB, measles, varicella — MAGIC: Measles, Anthrax, GEMS [chickenpox], Influenza [novel], COVID, TB).'},
{id:'m4_24',mod:'m4',drug:false,type:'mc',q:'A patient with iron-deficiency anemia would most likely exhibit which set of findings?',opts:['Microcytic hypochromic RBCs, low serum ferritin, pallor, fatigue','Macrocytic megaloblastic RBCs, tingling in extremities, elevated MCV','Target cells, Heinz bodies, and hemolytic jaundice','Sickle-shaped RBCs, vaso-occlusive pain, and elevated LDH'],ans:[0],rationale:'IDA: microcytic (small MCV) hypochromic (low MCHC/pale) RBCs, low serum ferritin (most specific test), pallor (low Hgb), fatigue, brittle nails, angular stomatitis, pica, glossitis.',pearl:'IDA = most common anemia worldwide. Classic: pale, tired patient with koilonychia (spoon nails), pica (eating ice/clay), angular stomatitis. Serum ferritin = most sensitive early marker. Treat with ferrous sulfate + Vitamin C.'},
{id:'m4_25',mod:'m4',drug:false,type:'mc',q:'A patient with B12 deficiency anemia presents with tingling and numbness in the feet. This neurological symptom occurs because:',opts:['Low RBCs reduce oxygen to peripheral nerves causing ischemia','B12 is required for myelin sheath synthesis — deficiency causes demyelination','Elevated homocysteine from B12 deficiency deposits in nerves','Macrocytic RBCs mechanically compress peripheral nerves'],ans:[1],rationale:'Vitamin B12 (cobalamin) is essential for myelin synthesis. Deficiency causes subacute combined degeneration of the spinal cord — demyelination of posterior and lateral columns → paresthesias, ataxia, cognitive impairment. This neurological damage can be IRREVERSIBLE if untreated.',pearl:'B12 deficiency: anemia + NEURO symptoms (tingling, ataxia, cognitive decline). Folate deficiency: anemia only — no neuro symptoms. Key NCLEX differentiator. B12 sources = animal products. Risk: strict vegans, elderly (atrophic gastritis), pernicious anemia (intrinsic factor deficiency).'},
{id:'m4_26',mod:'m4',drug:false,type:'mc',q:'Which type of shock is caused by an overwhelming systemic infection triggering a massive inflammatory response?',opts:['Hypovolemic shock','Cardiogenic shock','Septic shock (distributive)','Neurogenic shock'],ans:[2],rationale:'Septic shock = distributive shock. Massive vasodilation from systemic inflammatory mediators (cytokines) → decreased SVR → hypotension despite normal or elevated CO (early). Gram-negative bacteria most common cause.',pearl:'Distributive shock = massive vasodilation (vessels dilate while heart pumps). Classic sign: warm, flushed skin (early septic shock) vs. cold, clammy skin (hypovolemic/cardiogenic). Sepsis 3: life-threatening organ dysfunction from dysregulated host response to infection.'},
{id:'m4_27',mod:'m4',drug:false,type:'sata',q:'Which are classic findings in DIC (Disseminated Intravascular Coagulation)? Select all that apply.',opts:['Simultaneous widespread clotting AND bleeding','Elevated PT and PTT','Elevated D-dimer','Decreased fibrinogen','Thrombocytosis (elevated platelets)'],ans:[0,1,2,3],rationale:'DIC = paradoxical: clots form everywhere consuming clotting factors and platelets → coagulation factors depleted → bleeding. Labs: elevated PT/PTT (factor depletion), elevated D-dimer (clots being lysed), decreased fibrinogen, THROMBOCYTOPENIA (not thrombocytosis).',pearl:'DIC = "Death Is Coming" in its severe form. Triggers: sepsis, trauma, obstetric emergencies, cancer, burns. Treat the UNDERLYING CAUSE first. Classic triad: bleeding from multiple sites + organ failure + abnormal coag labs.'},
{id:'m4_28',mod:'m4',drug:true,type:'mc',q:'A patient on heparin therapy has an aPTT of 180 seconds (therapeutic range 60-100). The nurse\'s priority action is:',opts:['Continue the infusion — this is within therapeutic range','Decrease the heparin infusion rate and notify the provider','Stop the infusion, prepare protamine sulfate, and notify provider immediately','Administer vitamin K and draw repeat aPTT in 4 hours'],ans:[2],rationale:'aPTT of 180 seconds is dangerously supratherapeutic (> 100 seconds = above therapeutic range). Risk of serious hemorrhage. Stop heparin, notify provider. Protamine sulfate is the antidote for heparin.',pearl:'Heparin monitoring: aPTT target 60-100 sec (1.5-2.5x normal). If aPTT > 100 (some say >120): hold infusion and notify provider. Antidote = protamine sulfate. LMWH (enoxaparin) monitored by anti-Xa level, not aPTT.'},
{id:'m4_29',mod:'m4',drug:false,type:'mc',q:'Which lab value is the BEST indicator of bone marrow recovery after chemotherapy?',opts:['Hemoglobin level','Platelet count','Absolute Neutrophil Count (ANC)','White blood cell count'],ans:[2],rationale:'ANC = best indicator of infection risk and bone marrow recovery. ANC < 500 = severe neutropenia = highest infection risk. ANC > 1000 = bone marrow recovering. ANC = (WBC × % neutrophils/100).',pearl:'ANC < 500 = profoundly neutropenic = near-total immunosuppression. Patients may NOT mount fever despite serious infection. Any temp > 38°C (100.4°F) = neutropenic fever = treat as emergency.'},
{id:'m4_30',mod:'m4',drug:false,type:'mc',q:'A patient with polycythemia vera (PCV) is at greatest risk for which complication?',opts:['Anemia and fatigue from excessive RBC destruction','Thrombosis (DVT, stroke, MI) from hyperviscosity of blood','Hemorrhage from platelet destruction','Infection from impaired neutrophil function'],ans:[1],rationale:'Polycythemia vera = excessive RBC production → hyperviscosity of blood → sluggish blood flow → thrombosis. Paradoxically, patients also have bleeding risk (dysfunctional platelets). The primary danger is arterial and venous thrombosis.',pearl:'PCV triad: elevated Hgb/Hct, elevated WBC, elevated platelets = panmyelosis. Classic presentation: ruddy complexion, aquagenic pruritus (itching after hot shower), splenomegaly. Phlebotomy (therapeutic bloodletting) is primary treatment.'},
{id:'m4_31',mod:'m4',drug:false,type:'mc',q:'During a blood transfusion, a patient develops sudden fever of 38.8°C, chills, and rigors. The nurse\'s FIRST action is:',opts:['Continue the transfusion but slow the rate','Administer antipyretics and continue monitoring','STOP the transfusion immediately and keep IV open with normal saline','Administer diphenhydramine and resume transfusion'],ans:[2],rationale:'Any acute transfusion reaction = STOP TRANSFUSION IMMEDIATELY. Keep IV patent with NS (new tubing). Notify provider. Send blood unit and patient blood samples to blood bank. Document and monitor vital signs.',pearl:'Transfusion reaction = STOP STOP STOP. Most reactions occur in first 15 minutes — nurse must be present. Febrile non-hemolytic reaction = most common. Hemolytic reaction = most dangerous (chills, back pain, hematuria). Both require stopping the transfusion first.'},
{id:'m4_32',mod:'m4',drug:true,type:'mc',q:'A patient on low-molecular-weight heparin (enoxaparin) needs reversal for emergency surgery. The nurse prepares:',opts:['Vitamin K IV infusion','Protamine sulfate (partial reversal)','Fresh frozen plasma','Andexanet alfa'],ans:[1],rationale:'Protamine sulfate partially (approximately 60%) reverses LMWH. It fully reverses unfractionated heparin. Full reversal of LMWH is not achievable with protamine alone — surgical urgency and timing guide decisions.',pearl:'Heparin (UFH) → Protamine sulfate (full reversal). LMWH → Protamine (partial reversal only). Direct oral anticoagulants: Apixaban/rivaroxaban → Andexanet alfa. Dabigatran → Idarucizumab.'},
{id:'m4_33',mod:'m4',drug:false,type:'mc',q:'A patient with pernicious anemia needs B12 supplementation. The nurse understands B12 must be given parenterally because:',opts:['Oral B12 is too rapidly excreted by the kidneys','Intrinsic factor (produced by gastric parietal cells) is absent preventing B12 absorption','Pernicious anemia causes GI bleeding impairing absorption','Oral B12 is inactivated by stomach acid'],ans:[1],rationale:'Pernicious anemia = autoimmune destruction of gastric parietal cells → loss of intrinsic factor (IF) → B12 cannot be absorbed in the ileum without IF → deficiency despite adequate dietary intake.',pearl:'Intrinsic factor = made by parietal cells in stomach → binds B12 → absorbed in terminal ileum. Without IF, oral B12 cannot be absorbed. Treatment: IM B12 (cyanocobalamin/hydroxocobalamin) monthly.'},
{id:'m4_34',mod:'m4',drug:false,type:'sata',q:'Which patients require blood transfusion precautions for an acute hemolytic transfusion reaction? Select all that apply.',opts:['Patient reporting sudden lower back or flank pain','Hemoglobinuria (dark/cola-colored urine)','Patient with mild itching only','New-onset hypotension and tachycardia','Fever and chills after 500 mL transfused'],ans:[0,1,3,4],rationale:'Hemolytic transfusion reaction: back/flank pain (from RBC hemolysis products), hemoglobinuria (dark urine), hypotension, tachycardia, fever, chills. Mild isolated itching alone = allergic reaction (slow infusion, give antihistamine). Hemolytic reaction = STOP transfusion, IV fluids, monitor renal function.',pearl:'Hemolytic reaction = most DANGEROUS transfusion reaction. Caused by ABO incompatibility. Can cause renal failure and DIC. Prevent by double-checking patient ID and blood label with TWO nurses before hanging any blood product.'},
{id:'m5_26',mod:'m5',drug:false,type:'mc',q:'A patient presents with sudden onset severe headache described as "the worst headache of my life," neck stiffness, and photophobia. The priority concern is:',opts:['Migraine with aura','Cluster headache','Subarachnoid hemorrhage','Tension headache'],ans:[2],rationale:'"Worst headache of life" (thunderclap headache) + meningeal signs (neck stiffness, photophobia) = subarachnoid hemorrhage until proven otherwise. Non-contrast CT first, then lumbar puncture if CT negative.',pearl:'"Worst headache of my life" = SAH until proven otherwise. Due to aneurysm rupture. Sentinel headache may precede major SAH. Immediate CT scan is the first diagnostic step.'},
{id:'m5_27',mod:'m5',drug:true,type:'mc',q:'A patient with Parkinson\'s disease is prescribed carbidopa-levodopa. The nurse explains this combination is used because carbidopa:',opts:['Crosses the blood-brain barrier and converts to dopamine','Prevents levodopa from being converted to dopamine in the periphery (outside the brain)','Acts as a separate dopamine agonist to complement levodopa','Blocks the breakdown of dopamine in the brain'],ans:[1],rationale:'Carbidopa inhibits peripheral decarboxylase, preventing levodopa from being converted to dopamine outside the brain. This reduces peripheral side effects (nausea, cardiac effects) and allows more levodopa to cross the BBB and convert to dopamine where it is needed.',pearl:'Carbidopa = peripheral blocker. Levodopa = the drug that actually works. Together = Sinemet. More effective with smaller doses. High-protein meals compete with levodopa for absorption — give before meals or with low-protein meal.'},
{id:'m5_28',mod:'m5',drug:false,type:'mc',q:'A patient has a Glasgow Coma Scale score of 7. This score indicates:',opts:['Mild brain injury — patient is confused but oriented','Moderate brain injury — follow-up in 24 hours','Severe brain injury — intubation is typically indicated','Brain dead — no further intervention'],ans:[2],rationale:'GCS 3-8 = Severe brain injury. GCS ≤ 8 is the threshold for intubation (cannot protect airway). GCS 9-12 = moderate. GCS 13-15 = mild.',pearl:'GCS ≤ 8 = Intubate. Maximum GCS = 15 (full consciousness). Minimum = 3 (even in comatose patients). Three components: Eyes (max 4), Verbal (max 5), Motor (max 6). Motor response is the most prognostically significant.'},
{id:'m5_29',mod:'m5',drug:false,type:'mc',q:'A patient with a spinal cord injury at T4 develops a sudden pounding headache, flushing above the injury, and BP of 210/110. This is:',opts:['Hypertensive crisis unrelated to the injury','Autonomic Dysreflexia','Neurogenic shock','Epidural hematoma'],ans:[1],rationale:'Autonomic Dysreflexia is a medical emergency caused by a noxious stimulus below the injury level (full bladder, fecal impaction, skin breakdown). Massive unregulated sympathetic response → hypertension above 20 mmHg from baseline.',pearl:'AD = Sit patient UP first (lower BP), find and REMOVE the trigger (check Foley, check bowel), then medications if needed. Most common trigger = full bladder. Occurs in injuries at T6 and above.'},
{id:'m5_30',mod:'m5',drug:true,type:'mc',q:'A patient with epilepsy has been on phenytoin (Dilantin) for 5 years. Which assessment finding requires immediate follow-up?',opts:['Mild gingival hyperplasia','Therapeutic phenytoin level of 12 mcg/mL','Nystagmus and ataxia at phenytoin level of 25 mcg/mL','Mild drowsiness in the first week of therapy'],ans:[2],rationale:'Phenytoin toxicity signs: SLAP — Sedation, Lethargy/nystagmus, Ataxia, Psychomotor slowing. Toxic level > 20 mcg/mL (therapeutic range 10-20 mcg/mL). Nystagmus = first sign of toxicity.',pearl:'Phenytoin toxic > 20 mcg/mL: Nystagmus (20-30), Ataxia and slurred speech (30-40), Seizures and cardiac arrhythmias (>40). Also: gingival hyperplasia (expected), hirsutism, teratogenic (fetal hydantoin syndrome). Therapeutic range = 10-20 mcg/mL.'},
{id:'m5_31',mod:'m5',drug:false,type:'mc',q:'During a tonic-clonic seizure, the nurse\'s PRIORITY intervention is:',opts:['Restrain the patient to prevent injury','Insert an oral airway to prevent tongue swallowing','Protect the patient from injury and maintain airway positioning','Give IV lorazepam immediately regardless of duration'],ans:[2],rationale:'Priority: protect from injury (pad side rails, remove objects), position on side (recovery/lateral position to maintain airway and prevent aspiration). Do NOT restrain (can cause fractures). Do NOT put anything in mouth.',pearl:'During seizure: NEVER restrain, NEVER insert anything in mouth. After seizure: lateral recovery position, suction if needed, protect from injury. IV benzodiazepines after 5 minutes or for status epilepticus (seizure > 5 minutes).'},
{id:'m5_32',mod:'m5',drug:false,type:'mc',q:'A patient presents with FAST stroke symptoms. CT scan is NEGATIVE for hemorrhage. The patient is 2 hours from symptom onset and eligible for tPA. Which assessment finding would CONTRAINDICATE tPA?',opts:['Blood pressure of 150/90','Blood glucose of 140 mg/dL','Recent ischemic stroke 2 months ago','Age 55'],ans:[2],rationale:'Recent stroke (within 3 months) is an absolute contraindication for IV tPA. Other contraindications: active bleeding, BP > 185/110 (must be controlled first), INR > 1.7, platelets < 100,000, recent surgery.',pearl:'tPA window = 3-4.5 hours from symptom onset for ischemic stroke. Absolute contraindications: hemorrhage on CT, BP > 185/110, active bleeding, recent surgery/trauma, prior stroke within 3 months. tPA = powerful thrombolytic — clears the clot.'},
{id:'m5_33',mod:'m5',drug:false,type:'mc',q:'A patient with increased intracranial pressure (ICP) demonstrates Cushing\'s Triad. Which set of findings describes this?',opts:['Tachycardia, hypotension, and rapid shallow breathing','Hypertension with widening pulse pressure, bradycardia, and irregular respirations','Fever, hypotension, and tachypnea','Pupil dilation, photophobia, and neck rigidity'],ans:[1],rationale:'Cushing\'s Triad = hypertension (widening pulse pressure) + bradycardia + irregular (Cheyne-Stokes) respirations. It is a LATE sign of severely elevated ICP indicating brainstem compression — a neurological emergency.',pearl:'Cushing\'s Triad = late sign = EMERGENCY = herniation imminent. Wide pulse pressure (SBP high, DBP low) + bradycardia = baroreceptor response to extreme hypertension. Notify provider IMMEDIATELY. Prepare for mannitol, hyperventilation, possible surgery.'},
{id:'m5_34',mod:'m5',drug:true,type:'mc',q:'A patient is prescribed gabapentin (Neurontin) for neuropathic pain. The nurse should monitor for which COMMON side effects?',opts:['Hepatotoxicity and elevated liver enzymes','Dizziness, somnolence, and peripheral edema','Bradycardia and AV block','Nephrotoxicity and decreased urine output'],ans:[1],rationale:'Gabapentin CNS side effects: dizziness, sedation/somnolence, ataxia. Peripheral edema is common. These effects are dose-related. Can cause respiratory depression, especially when combined with opioids or benzodiazepines.',pearl:'Gabapentin (Neurontin) = also used for seizures. Common: DIZZY, SLEEPY, SWOLLEN ankles. CAUTION: with opioids → additive respiratory depression. New black box warning for respiratory depression risk. Taper slowly — do not stop abruptly.'},
{id:'m5_35',mod:'m5',drug:false,type:'sata',q:'Which are classic features of Alzheimer\'s disease? Select all that apply.',opts:['Short-term memory loss as an early feature','Personality and behavioral changes','Rapid fluctuating level of consciousness','Progressive and irreversible cognitive decline','Lewy bodies found on brain autopsy'],ans:[0,1,3],rationale:'Alzheimer\'s: gradual short-term memory loss first, personality changes, progressive decline. Rapid fluctuating LOC = Lewy body dementia. Lewy bodies = Lewy body dementia or Parkinson\'s disease dementia, NOT Alzheimer\'s. Alzheimer\'s = amyloid plaques + neurofibrillary tangles.',pearl:'Alzheimer\'s = most common dementia. Hallmarks: amyloid plaques + tau neurofibrillary tangles. EARLY: short-term memory loss. LATE: cannot care for self. Fluctuating LOC = think Lewy body dementia. Step-wise decline = vascular dementia.'},
{id:'m5_36',mod:'m5',drug:false,type:'mc',q:'A nurse assesses a patient for meningeal irritation. The nurse flexes the patient\'s neck toward the chest. The patient reflexively flexes both knees and hips. This positive sign is called:',opts:['Kernig\'s sign','Brudzinski\'s sign','Babinski\'s sign','Romberg\'s sign'],ans:[1],rationale:'Brudzinski\'s sign = passive neck flexion → involuntary knee/hip flexion (the patient "curls up"). Positive = meningeal irritation (meningitis, SAH). Kernig\'s = cannot extend knee when hip is flexed 90° (also meningeal irritation).',pearl:'Meningeal signs: Brudzinski = neck BENDS → both knees bend (B for Both). Kernig = hip flexed → Knee won\'t extend (K for Knee). Both = meningitis. Also assess for photophobia, phonophobia, and nuchal rigidity.'},
{id:'m5_37',mod:'m5',drug:true,type:'mc',q:'A patient with multiple sclerosis (MS) is started on interferon beta-1a (Avonex). The nurse includes which teaching?',opts:['This medication cures MS and can be discontinued after 2 years','Flu-like symptoms are common after injections and usually improve over time','Avoid all sun exposure during treatment','Report constipation as this is a common dangerous side effect'],ans:[1],rationale:'Interferon beta-1a (Avonex) is a disease-modifying therapy for MS. Common side effect: flu-like symptoms (fever, myalgias, chills) especially after initial injections, usually resolving over weeks. Taking before bed can help. Injection site reactions also common.',pearl:'MS disease-modifying drugs reduce relapse frequency but do not cure MS. Interferons (Avonex, Rebif, Betaseron) and glatiramer acetate (Copaxone) are first-line. Teach: flu-like symptoms are EXPECTED and manageable. Monitor for depression (IFN beta can worsen).'},
{id:'m5_38',mod:'m5',drug:false,type:'mc',q:'Which deficit would the nurse expect in a patient with a right-hemisphere stroke?',opts:['Aphasia (difficulty speaking/understanding language)','Left-sided hemiplegia and spatial/perceptual deficits','Right-sided weakness and Broca\'s aphasia','Difficulty reading and writing only'],ans:[1],rationale:'Right hemisphere controls: left side of body (motor/sensory), spatial perception, visuospatial processing, left neglect. Right hemisphere stroke = LEFT-sided deficits + spatial problems + impulsive behavior. Left hemisphere stroke = RIGHT-sided deficits + aphasia.',pearl:'Brain crossover: Right brain → controls Left side. Left brain → controls Right side + LANGUAGE. LMNOP for left hemisphere: Language, Math, Numbers, Order, Processing. Right hemisphere: spatial, artistic, body image. Left hemistrokes = speech therapy. Right hemistrokes = safety supervision.'},
{id:'m5_39',mod:'m5',drug:false,type:'mc',q:'A patient with myasthenia gravis (MG) has difficulty swallowing and labored breathing. The nurse\'s priority action is:',opts:['Administer pyridostigmine (Mestinon) per protocol','Ensure patient can swallow safely before giving any oral medications','Notify the provider and prepare for potential myasthenic crisis/intubation','Obtain a swallowing study as an outpatient'],ans:[2],rationale:'Dysphagia + respiratory difficulty in MG = impending myasthenic crisis. Respiratory failure can develop rapidly. Priority: notify provider, prepare for mechanical ventilation, have emergency airway at bedside.',pearl:'Myasthenic crisis = too little acetylcholine at NMJ → muscle paralysis → respiratory failure. Cholinergic crisis = too much AChE inhibitor → SLUDGE (salivation, lacrimation, urination, defecation, GI cramps, emesis) + weakness. Distinguish with Edrophonium (Tensilon) test.'},
{id:'m5_40',mod:'m5',drug:false,type:'mc',q:'A nurse is caring for a patient following craniotomy. Which ICP monitoring value requires immediate notification of the provider?',opts:['ICP of 12 mmHg','ICP of 18 mmHg with patient actively coughing','ICP of 25 mmHg persisting for more than 5 minutes','ICP of 10 mmHg after repositioning'],ans:[2],rationale:'Normal ICP = 5-15 mmHg. ICP > 20-22 mmHg is the treatment threshold. ICP > 25 mmHg persistently = significant risk of herniation and requires immediate intervention (osmotic therapy, hyperventilation, positioning).',pearl:'ICP > 20-22 = treatment threshold. Normal CPP = 60-100 mmHg. CPP = MAP - ICP. If ICP rises and MAP stays the same, CPP falls → brain ischemia. Interventions: HOB 30°, avoid Valsalva, quiet environment, mannitol or hypertonic saline.'},
{id:'m6_24',mod:'m6',drug:false,type:'mc',q:'A patient with acute MI presents with ST elevation in leads II, III, and aVF. Which coronary artery is most likely affected?',opts:['Left anterior descending (LAD)','Left circumflex','Right coronary artery (RCA)','Left main coronary artery'],ans:[2],rationale:'Inferior wall MI (ST elevation in II, III, aVF) = Right Coronary Artery (RCA). Anterior MI (V1-V4) = LAD. Lateral MI (I, aVL, V5-V6) = Circumflex. Knowing territory helps predict complications.',pearl:'RCA supplies inferior wall + right ventricle + SA node + AV node. RCA MI: inferior ST elevation + bradycardia/heart blocks. LAD = "widow maker" (anterior MI = largest territory).'},
{id:'m6_25',mod:'m6',drug:true,type:'mc',q:'A patient is prescribed lisinopril for heart failure. The nurse explains the mechanism of action is:',opts:['Blocks beta-1 receptors reducing heart rate and contractility','Inhibits ACE preventing conversion of angiotensin I to II → vasodilation + decreased aldosterone','Blocks calcium channels reducing afterload and cardiac oxygen demand','Directly blocks aldosterone receptors reducing sodium retention'],ans:[1],rationale:'ACE inhibitors block conversion of Angiotensin I → Angiotensin II. Effects: vasodilation (decreased afterload/preload), reduced aldosterone (less Na+ and water retention), and reduced ventricular remodeling. First-line for HFrEF.',pearl:'ACE inhibitors end in -pril. Side effect: dry cough (bradykinin accumulation) — switch to ARB (sartans) if intolerable. Contraindicated in pregnancy. Monitor K+ (hyperkalemia). Monitor Cr (can cause acute kidney injury in bilateral renal artery stenosis).'},
{id:'m6_26',mod:'m6',drug:false,type:'mc',q:'A patient with heart failure has a BNP of 920 pg/mL. The nurse interprets this as indicating:',opts:['Normal finding — BNP is not clinically significant','Mild cardiac stress','Significant ventricular volume overload and stretching','Acute myocardial infarction'],ans:[2],rationale:'BNP (B-type natriuretic peptide) is released by ventricular myocytes when they are stretched from volume/pressure overload. Normal BNP < 100 pg/mL. BNP > 400 = significant heart failure. BNP > 900 = severe.',pearl:'BNP = "Bad News Peptide" = heart is being stretched. Helps distinguish cardiac from pulmonary dyspnea. BNP guides heart failure treatment decisions. Higher BNP = worse prognosis.'},
{id:'m6_27',mod:'m6',drug:false,type:'mc',q:'Which finding distinguishes right-sided heart failure from left-sided heart failure?',opts:['Pulmonary edema (crackles)','Orthopnea and PND','Jugular vein distension and peripheral edema','S3 heart sound on auscultation'],ans:[2],rationale:'Right-sided HF causes SYSTEMIC congestion (blood backs up into venous system): JVD, hepatomegaly, peripheral edema, ascites. Left-sided HF causes PULMONARY congestion: crackles, orthopnea, PND, S3.',pearl:'Right = Body backs up (JVD, belly, ankles). Left = Lungs fill up (crackles, dyspnea). Think: "Right side fills right side of body, left side fills left (lungs)." Both sides can fail simultaneously.'},
{id:'m6_28',mod:'m6',drug:true,type:'mc',q:'A patient is prescribed digoxin for atrial fibrillation with rapid ventricular response. Before administering the dose, the nurse checks the apical pulse for one full minute and finds it to be 52 bpm. The nurse should:',opts:['Administer as ordered — this is expected with digoxin','Hold the dose and notify the provider — heart rate < 60 is a parameter to hold','Give half the dose — bradycardia means digoxin is working','Administer atropine first then give the dose'],ans:[1],rationale:'Standard parameter: hold digoxin if HR < 60 and notify provider. Digoxin slows AV conduction (rate control in A-fib). A resting rate < 60 with digoxin on board risks severe bradycardia and heart block.',pearl:'Digoxin parameters: HR < 60 = hold and notify. Also hold if: K+ < 3.5 (hypokalemia potentiates toxicity), digoxin level > 2.0 ng/mL. Digoxin toxicity: N/V, yellow-green halos, bradycardia, V-tach/V-fib. Narrow therapeutic window = 0.5-2.0 ng/mL.'},
{id:'m6_29',mod:'m6',drug:false,type:'mc',q:'Which type of angina is described as occurring at rest, often in the early morning, caused by coronary artery vasospasm?',opts:['Stable angina','Unstable angina','Variant (Prinzmetal\'s) angina','Microvascular angina'],ans:[2],rationale:'Variant (Prinzmetal\'s) angina: caused by coronary artery spasm (NOT fixed plaque obstruction). Occurs at rest, cyclic pattern, often in early morning. ST ELEVATION during episodes (unlike stable angina). Responds to calcium channel blockers and nitrates.',pearl:'Variant angina = vasospasm. ST elevation during pain (transient). Diagnosed with coronary angiography showing no fixed stenosis. Treat with CCB + nitrates. Avoid beta-blockers (can worsen vasospasm).'},
{id:'m6_30',mod:'m6',drug:true,type:'mc',q:'A patient with hypertension is started on amlodipine (a calcium channel blocker). Which side effect should the nurse include in teaching?',opts:['Dry cough','Hyperkalemia','Peripheral edema and flushing','Bradycardia and AV block'],ans:[2],rationale:'Dihydropyridine CCBs (amlodipine, nifedipine, felodipine — "-dipine" suffix) primarily act on vascular smooth muscle → vasodilation → peripheral edema (ankle swelling) and flushing/headache. Minimal cardiac depression.',pearl:'Dihydropyridine CCBs (-dipines): vascular effects = edema, flushing. Non-dihydropyridines (verapamil, diltiazem): cardiac effects = bradycardia, AV block, constipation. Remember: dipines = vasodilators (edema).'},
{id:'m6_31',mod:'m6',drug:false,type:'mc',q:'A patient with acute MI develops cardiogenic shock. Which hemodynamic profile is expected?',opts:['Low BP, high HR, low PCWP, low SVR','Low BP, high HR, HIGH PCWP, HIGH SVR','Normal BP, low HR, low SVR, high CO','High BP, low HR, normal PCWP, low SVR'],ans:[1],rationale:'Cardiogenic shock = pump failure. Decreased CO → baroreceptors activate SNS → high HR, high SVR (vasoconstriction). Failing pump → backup of fluid → high PCWP (pulmonary congestion). Classic: cold/clammy skin (high SVR), pulmonary edema.',pearl:'Cardiogenic shock hemodynamics: Low CO + High SVR + High PCWP. Treat: inotropes (dobutamine), IABP, possible revascularization. OPPOSITE of septic shock (high CO + low SVR + low PCWP early).'},
{id:'m6_32',mod:'m6',drug:false,type:'sata',q:'Which are modifiable risk factors for coronary artery disease (CAD)? Select all that apply.',opts:['Hypertension','Family history (first-degree relative with early CAD)','Cigarette smoking','Type 2 diabetes mellitus','Age > 45 in men'],ans:[0,2,3],rationale:'Modifiable CAD risk factors (can be changed): hypertension, smoking, dyslipidemia, diabetes, obesity, physical inactivity, diet, stress. Non-modifiable: age, sex, family history/genetics, race.',pearl:'Modifiable = what we can change with lifestyle/meds. Non-modifiable = genetic givens. NCLEX frequently asks this distinction. Hypertension is the #1 modifiable risk factor for both CAD AND stroke.'},
{id:'m6_33',mod:'m6',drug:true,type:'mc',q:'A patient prescribed nitroglycerin for angina asks about storage and use. Which instruction is CORRECT?',opts:['Store in clear plastic containers on the bedside table for easy access','Take up to 5 sublingual tablets within 15 minutes before calling for help','Take 1 sublingual tablet, rest, and call 911 if not relieved in 5 minutes — may repeat up to 3 tablets','Take nitroglycerin after meals to enhance absorption'],ans:[2],rationale:'NTG protocol: ONE SL tablet/spray, rest, call 911 if no relief in 5 minutes (or immediately if first episode). May repeat every 5 minutes × 3 total. If no relief after 3 doses, it is likely an MI.',pearl:'NTG: store in dark glass container (light-sensitive), room temperature, replace every 6 months. Expected side effects: headache (vasodilation), flushing, hypotension, dizziness. Sit or lie down when taking.'},
{id:'m6_34',mod:'m6',drug:false,type:'mc',q:'A patient with atrial fibrillation is on long-term anticoagulation. The primary reason for anticoagulation in A-fib is to:',opts:['Restore normal sinus rhythm','Prevent clot formation in the left atrial appendage that could cause stroke','Improve cardiac output by slowing ventricular rate','Prevent fluid overload from right heart failure'],ans:[1],rationale:'A-fib causes turbulent, non-coordinated atrial contraction → blood pools in left atrial appendage → thrombus forms → embolizes → ischemic stroke. Anticoagulation prevents thrombus formation, not rhythm conversion.',pearl:'A-fib stroke risk: CHADS2 score used to guide anticoagulation. Warfarin (INR 2-3) or direct oral anticoagulants (DOACs). A-fib = #1 cause of cardioembolic stroke. 5x increased stroke risk.'},
{id:'m6_35',mod:'m6',drug:false,type:'mc',q:'Cardiac tamponade presents with Beck\'s Triad. Which three findings make up Beck\'s Triad?',opts:['Hypertension, bradycardia, and absent breath sounds','Hypotension, muffled heart sounds, and distended neck veins (JVD)','Tachycardia, pulmonary edema, and S3 heart sound','Fever, pleuritic chest pain, and pericardial friction rub'],ans:[1],rationale:'Beck\'s Triad = pericardial tamponade: (1) Hypotension (decreased CO from compressed heart), (2) Muffled/distant heart sounds (fluid around heart), (3) JVD/distended neck veins (obstructed venous return). Also: pulsus paradoxus > 10 mmHg.',pearl:'Beck\'s Triad: "Muffled, Hypotensive, and Distended." Pericardial tamponade = fluid compresses the heart. Treatment: emergent pericardiocentesis. Also seen after chest trauma, cancer, cardiac surgery.'},
{id:'m6_36',mod:'m6',drug:false,type:'mc',q:'An ECG shows a prolonged PR interval of 0.24 seconds with a normal QRS complex following each P wave. This is:',opts:['Normal sinus rhythm','First-degree AV block','Second-degree AV block Mobitz I','Third-degree (complete) AV block'],ans:[1],rationale:'First-degree AV block: PR interval > 0.20 seconds (normal 0.12-0.20) but EVERY P wave is followed by a QRS. Generally benign. Monitor. Usually no treatment needed.',pearl:'AV block degrees: 1st = prolonged PR, every P has QRS. 2nd Mobitz I (Wenckebach) = progressively longer PR until QRS drops. 2nd Mobitz II = random dropped QRS. 3rd degree = complete dissociation (P and QRS independent) = EMERGENCY pacemaker.'},
{id:'m6_37',mod:'m6',drug:false,type:'mc',q:'A patient is in ventricular fibrillation (V-fib). The nurse\'s immediate action is:',opts:['Administer atropine 0.5 mg IV push','Begin CPR and prepare for defibrillation immediately','Cardiovert synchronized at 100 joules','Administer amiodarone IV and reassess rhythm'],ans:[1],rationale:'V-fib = no organized cardiac activity = no pulse = cardiac arrest. ACLS protocol: CPR immediately + defibrillation as soon as available. Early defibrillation is the ONLY definitive treatment for V-fib.',pearl:'V-fib = DEFIB (unsynchronized). V-tach with pulse = synchronized cardioversion. V-tach without pulse = defib. NEVER give amiodarone before defibrillating. CPR first while defibrillator charges.'},
{id:'m6_38',mod:'m6',drug:true,type:'mc',q:'A patient on warfarin has an INR of 1.2 (therapeutic range 2.0-3.0 for A-fib). The nurse anticipates:',opts:['The patient is over-anticoagulated and at risk for bleeding','The patient is sub-therapeutic and at risk for clotting/stroke','The INR is within a slightly low therapeutic range — continue current dose','No action needed — all values below 2 are acceptable for A-fib'],ans:[1],rationale:'INR < 2.0 for a patient with A-fib = sub-therapeutic anticoagulation. The patient is at increased risk for thrombus formation and stroke. Notify provider to assess need for dose adjustment.',pearl:'INR targets: A-fib and DVT/PE = 2-3. Mechanical heart valve = 2.5-3.5. Below target = clot risk. Above target = bleed risk. Monitor INR weekly when initiating, then monthly when stable.'},
{id:'m7_24',mod:'m7',drug:false,type:'mc',q:'A patient with COPD has a "barrel chest." The pathophysiology is:',opts:['Overdeveloped chest muscles from labored breathing','Air trapping and alveolar hyperinflation increasing AP diameter','Fluid accumulation in the pleural space','Chronic bacterial infection destroying lung architecture'],ans:[1],rationale:'COPD (especially emphysema): destruction of alveolar walls + loss of elastic recoil → air trapping on expiration → alveoli hyperinflate → increased AP (anteroposterior) diameter = barrel chest.',pearl:'COPD emphysema = "Pink Puffer" = pursed-lip breathing, barrel chest, using accessory muscles. Chronic bronchitis = "Blue Bloater" = cyanotic, productive cough, edema. Most patients have mix of both.'},
{id:'m7_25',mod:'m7',drug:true,type:'mc',q:'A COPD patient is started on tiotropium (Spiriva). The nurse explains this long-acting anticholinergic bronchodilator:',opts:['Is a rescue inhaler for acute bronchospasm','Is a daily maintenance medication to prevent bronchospasm','Contains corticosteroids to reduce airway inflammation','Should be used before every physical exertion'],ans:[1],rationale:'Tiotropium (Spiriva) = LAMA (Long-Acting Muscarinic Antagonist). Once-daily maintenance bronchodilator. NOT for acute bronchospasm. Blocks M3 receptors → bronchodilation + reduced mucus secretion.',pearl:'COPD inhalers: SABA (albuterol) = rescue, fast. LABA (salmeterol) = maintenance. LAMA (tiotropium) = maintenance. ICS (fluticasone) = for frequent exacerbations. Start with LAMA or LABA for stable COPD.'},
{id:'m7_26',mod:'m7',drug:false,type:'mc',q:'A patient with asthma has a PEF (peak expiratory flow) of 48% of their personal best. Which zone does this represent?',opts:['Green zone (80-100%) — normal, continue treatment plan','Yellow zone (50-79%) — caution, follow action plan','Red zone (<50%) — emergency, seek immediate medical attention','Blue zone — measurement not applicable to asthma management'],ans:[2],rationale:'PEF < 50% of personal best = RED ZONE = severe obstruction = emergency. Patient needs immediate bronchodilator AND emergent medical evaluation. PEF zones guide self-management.',pearl:'PEF traffic light: Green (80-100%) = go, stay on maintenance. Yellow (50-79%) = caution, increase rescue inhaler. Red (<50%) = stop, go to emergency department. Track PEF twice daily to detect deterioration.'},
{id:'m7_27',mod:'m7',drug:false,type:'mc',q:'Which ABG result indicates uncompensated respiratory acidosis?',opts:['pH 7.50, PaCO2 30, HCO3 24','pH 7.30, PaCO2 58, HCO3 24','pH 7.32, PaCO2 45, HCO3 18','pH 7.48, HCO3 32, PaCO2 44'],ans:[1],rationale:'Respiratory acidosis: pH < 7.35 + elevated PaCO2 (respiratory cause). HCO3 normal (24) = uncompensated (kidneys have not compensated yet). Causes: hypoventilation, COPD, respiratory failure, opioid overdose.',pearl:'ABG steps: (1) pH normal? (2) CO2 or HCO3 abnormal? (3) Which matches pH? (4) Compensated? ROME: Respiratory = Opposite (CO2 high, pH low = acidosis). Metabolic = Equal (HCO3 low, pH low = acidosis).'},
{id:'m7_28',mod:'m7',drug:false,type:'mc',q:'A patient develops sudden pleuritic chest pain and dyspnea following a femur fracture. CT pulmonary angiography confirms pulmonary embolism. The PRIORITY intervention is:',opts:['Begin oral anticoagulation with warfarin','Prepare for emergency embolectomy','Administer oxygen and initiate anticoagulation with IV unfractionated heparin or LMWH','Position patient supine with legs elevated'],ans:[2],rationale:'PE management: OXYGEN (treat hypoxia), ANTICOAGULATION (heparin IV UFH or LMWH — prevents new clots, treats existing clot). Massive PE with hemodynamic instability → thrombolytics or embolectomy.',pearl:'PE triad: dyspnea, tachycardia, pleuritic chest pain. Risk factors: Virchow\'s triad (stasis, hypercoagulability, vessel injury). D-dimer elevated. CT-PA = diagnostic gold standard. Anticoagulate ASAP.'},
{id:'m7_29',mod:'m7',drug:false,type:'mc',q:'A patient is intubated and mechanically ventilated. The high pressure alarm sounds. The nurse\'s FIRST action is:',opts:['Sedate the patient to stop "fighting the vent"','Disconnect from the ventilator and manually ventilate while assessing the cause','Increase the tidal volume setting to overcome the resistance','Suction the ET tube immediately'],ans:[1],rationale:'High pressure alarm = resistance to airflow. FIRST: manually ventilate (bag) the patient to ensure adequate ventilation while identifying the cause. Causes: secretions (most common), biting ET tube, kinking, pneumothorax, bronchospasm.',pearl:'High pressure alarm causes: DOPE — Displacement (ET tube), Obstruction (secretions — suction), Pneumothorax (needle decompress), Equipment failure. LOW pressure alarm = disconnection = reconnect immediately.'},
{id:'m7_30',mod:'m7',drug:false,type:'mc',q:'A patient has pneumonia in the right lower lobe. In which position does the nurse place the patient for maximum gas exchange?',opts:['Right side-lying (affected side down)','Left side-lying (good lung down)','Prone position','Supine with HOB flat'],ans:[1],rationale:'Good lung DOWN principle: blood flow (perfusion) is gravity-dependent. Placing the good (non-affected) lung down maximizes V/Q matching. Better-perfused lung = better-ventilated lung = improved O2 exchange.',pearl:'"Good lung down" = best oxygenation. Exception: after pneumonectomy, place on the OPERATIVE side (to prevent mediastinal shift). After thoracotomy, good lung down unless provider orders otherwise.'},
{id:'m7_31',mod:'m7',drug:false,type:'mc',q:'Which finding is MOST consistent with tension pneumothorax?',opts:['Bilateral crackles and JVD with normal trachea position','Absent breath sounds on ONE side, JVD, hypotension, and tracheal deviation AWAY from the affected side','Dullness to percussion bilaterally with decreased fremitus','Crackles and egophony at the right base'],ans:[1],rationale:'Tension pneumothorax: air accumulates under pressure in the pleural space → shifts mediastinum → trachea deviates AWAY from pneumothorax. Compresses great vessels → hypotension + JVD. Life-threatening → immediate needle decompression (2nd ICS, MCL).',pearl:'Tension pneumo: absent breath sounds + tracheal deviation AWAY + JVD + hypotension. NEVER wait for chest X-ray if patient is hemodynamically unstable. Needle decompression FIRST (2nd intercostal space, midclavicular line).'},
{id:'m7_32',mod:'m7',drug:false,type:'sata',q:'Which are appropriate care interventions for a patient with chest tubes? Select all that apply.',opts:['Keep drainage system BELOW the patient\'s chest level','Milk (strip) the chest tube routinely to prevent clots','Tape all connections securely','Keep one rubber-tipped clamp at the bedside','Encourage coughing and deep breathing to improve drainage'],ans:[0,2,3,4],rationale:'Chest tube care: keep drainage below chest (gravity drainage). Do NOT routinely milk/strip (increases negative pressure, damages tissue). Tape connections. Keep clamp at bedside for emergency (accidental disconnection). Encourage C&DB.',pearl:'Chest tube management: water-seal chamber = oscillates with breathing (tidaling) = normal. Continuous bubbling in water seal = air leak. No tidaling = tube kinked or lung re-expanded. Clamp ONLY: accidental disconnection or changing drainage system.'},
{id:'m7_33',mod:'m7',drug:true,type:'mc',q:'A patient in status asthmaticus is not responding to albuterol. The nurse prepares which medication as the NEXT priority?',opts:['Salmeterol (Serevent) inhaled','IV or oral methylprednisolone (corticosteroids)','Theophylline IV loading dose','Montelukast oral tablet'],ans:[1],rationale:'Status asthmaticus not responding to SABA → IV/oral corticosteroids are the next priority to reduce airway inflammation. Steroids take 4-6 hours for full effect. Inhaled beta-2 agonists continue. Consider IV magnesium sulfate for severe refractory cases.',pearl:'Asthma stepwise: SABA (rescue) → add ICS → add LABA + ICS → add oral steroids. Status asthmaticus: SABA + O2 + systemic steroids. Intubation = last resort (very high risk in asthma).'},
{id:'m7_34',mod:'m7',drug:false,type:'mc',q:'A patient is admitted with respiratory failure and requires high-flow oxygen. A non-rebreather mask (NRB) can deliver approximately what FiO2?',opts:['24-40%','40-60%','60-90%','95-100%'],ans:[2],rationale:'Non-rebreather mask with reservoir bag (adequate flow) delivers approximately 60-90% FiO2 (some sources cite up to 90-95% with tight seal). Simple face mask: 40-60%. Nasal cannula: 24-44%.',pearl:'O2 delivery FiO2: NC (1-6 L/min) = 24-44%. Simple mask = 40-60%. Partial rebreather = 50-60%. NRB with reservoir = 60-90%. Venturi mask = precise FiO2 (important for COPD). High-flow NC (Optiflow) = up to 100%.'},
{id:'m7_35',mod:'m7',drug:false,type:'mc',q:'A nurse is caring for a patient who received a Mantoux (PPD) skin test for TB. The test should be read:',opts:['Immediately after injection and again at 24 hours','At 48-72 hours after injection by measuring the INDURATION (raised area)','At 24 hours, measuring the redness (erythema) diameter','At 7 days — earlier readings are unreliable'],ans:[1],rationale:'PPD skin test: read at 48-72 hours. Measure the INDURATION (palpable raised hardness), NOT erythema. Induration ≥ 15 mm = positive in general population. ≥ 10 mm = positive in high-risk. ≥ 5 mm = positive in immunocompromised.',pearl:'PPD: measure induration NOT redness. ≥5 mm = positive in HIV/immunocompromised. ≥10 mm = positive in healthcare workers/immigrants. ≥15 mm = positive in general population. Positive PPD = latent TB exposure. Confirm with chest X-ray and sputum culture.'},
{id:'m8_23',mod:'m8',drug:false,type:'mc',q:'A patient is in the oliguric phase of acute kidney injury (AKI). Which electrolyte abnormality is the nurse\'s PRIORITY concern?',opts:['Hypokalemia','Hyperkalemia','Hyponatremia','Hypercalcemia'],ans:[1],rationale:'In oliguria, the kidneys fail to excrete potassium → hyperkalemia → peaked T waves → wide QRS → ventricular fibrillation. Hyperkalemia is the primary life-threatening emergency in AKI.',pearl:'AKI oliguria: K+ rises (cannot excrete), PO4 rises, Mg rises, Ca drops, Na drops. Monitor ECG for hyperkalemia: peaked T waves are the FIRST sign. Treat: IV calcium gluconate (membrane stabilizer), insulin + dextrose (shift K+ into cells).'},
{id:'m8_24',mod:'m8',drug:true,type:'mc',q:'Which medication is most likely to cause intra-renal (ATN) injury?',opts:['Lisinopril (ACE inhibitor)','Furosemide (loop diuretic)','Gentamicin (aminoglycoside)','Metoprolol (beta-blocker)'],ans:[2],rationale:'Aminoglycosides (gentamicin, tobramycin) are directly nephrotoxic to proximal renal tubules, causing acute tubular necrosis (ATN). This is intra-renal AKI. Risk increases with prolonged use, dehydration, and combined nephrotoxins.',pearl:'Nephrotoxic drug mnemonic AAANV: Aminoglycosides, ACE inhibitors (in renal artery stenosis), NSAIDS, Contrast dye, Vancomycin. Always check BUN/Cr before giving nephrotoxins.'},
{id:'m8_25',mod:'m8',drug:false,type:'mc',q:'A patient with CKD stage 4 has a hemoglobin of 8.2 g/dL. The most likely cause is:',opts:['Iron deficiency from poor diet','Decreased erythropoietin production by the damaged kidneys','Chronic GI bleeding from uremia','Vitamin B12 deficiency'],ans:[1],rationale:'Kidneys produce erythropoietin (EPO) which stimulates RBC production in bone marrow. Kidney damage → decreased EPO → normocytic/normochromic anemia. This is anemia of CKD (renal anemia).',pearl:'CKD anemia = normocytic, normochromic (unlike IDA = microcytic). Treat with epoetin alfa (Epogen) or darbepoetin + supplemental iron. Target Hgb 10-11 g/dL (not higher — increased thrombosis risk).'},
{id:'m8_26',mod:'m8',drug:false,type:'mc',q:'A patient is being evaluated for pre-renal AKI. Which finding would support this diagnosis?',opts:['BUN:Creatinine ratio < 10:1','Urine sodium > 40 mEq/L','BUN:Creatinine ratio > 20:1 with concentrated urine','RBC casts in urine sediment'],ans:[2],rationale:'Pre-renal AKI: kidneys are intact but underperfused → kidneys CONSERVE everything. BUN rises disproportionately (urea reabsorbed along with water). BUN:Cr > 20:1 + urine Na < 20 (conserving Na) + concentrated urine (high specific gravity) = pre-renal.',pearl:'Pre-renal: BUN:Cr > 20:1, urine Na < 20, urine SG > 1.020 (concentrated). Intrinsic renal: BUN:Cr = 10-15:1, urine Na > 40 (can\'t conserve), SG ~1.010 (isosthenuria). RBC casts = glomerulonephritis.'},
{id:'m8_27',mod:'m8',drug:false,type:'mc',q:'A patient with chronic kidney disease is placed on a renal diet. Which dietary restriction is MOST important to prevent life-threatening complications?',opts:['Restricting fluid intake to prevent dehydration','Limiting potassium intake to prevent hyperkalemia and cardiac arrhythmias','Increasing protein intake to prevent muscle wasting','Supplementing calcium only — no dietary restrictions needed'],ans:[1],rationale:'Potassium restriction is critical in CKD because hyperkalemia can cause fatal cardiac dysrhythmias (V-fib). Other CKD diet restrictions: phosphorus (hyperphosphatemia), sodium (fluid retention/HTN), and possibly protein and fluid.',pearl:'CKD diet: low K+ (bananas, oranges, potatoes are HIGH K+ — restrict). Low PO4 (dairy, nuts). Low Na. Fluid restriction depends on output. Avoid salt substitutes (contain KCl). CKD diet is complex — dietitian referral essential.'},
{id:'m8_28',mod:'m8',drug:false,type:'mc',q:'After a renal transplant, a patient is prescribed cyclosporine to prevent organ rejection. The nurse monitors for which PRIMARY complication of cyclosporine?',opts:['Bone marrow suppression causing pancytopenia','Nephrotoxicity causing elevated BUN and creatinine','Pulmonary fibrosis causing decreased breath sounds','Hepatotoxicity causing elevated liver enzymes'],ans:[1],rationale:'Cyclosporine is a calcineurin inhibitor that prevents T-cell activation. Its primary dose-limiting toxicity is NEPHROTOXICITY. Ironic — the drug used to prevent rejection damages the transplanted kidney. Also causes HTN, hirsutism, gingival hyperplasia.',pearl:'Cyclosporine toxicity: nephrotoxicity (creatinine), HTN, neurotoxicity, gingival hyperplasia, hirsutism. Monitor levels (trough). Drug interactions: azole antifungals and macrolides INCREASE levels. Rifampin and phenytoin DECREASE levels.'},
{id:'m8_29',mod:'m8',drug:false,type:'sata',q:'Which are expected findings in a patient with nephrotic syndrome? Select all that apply.',opts:['Massive proteinuria (>3.5 g/day)','Hematuria and RBC casts','Hypoalbuminemia','Peripheral edema and ascites','Hyperlipidemia'],ans:[0,2,3,4],rationale:'Nephrotic syndrome: heavy proteinuria → albumin leaks into urine → hypoalbuminemia → decreased oncotic pressure → edema (periorbital, peripheral, ascites) + hyperlipidemia (liver compensates by making lipoproteins). RBC casts = nephritic syndrome (inflammatory).',pearl:'Nephrotic = "tic protein leaking": massive Proteinuria, edema, hypoAlbuminemia, hyperLipidemia, lipiduria. Nephritic = inflammatory (hematuria, RBC casts, HTN, oliguria, mild proteinuria). "Otic" = leaky. "Itic" = inflamed.'},
{id:'m8_30',mod:'m8',drug:false,type:'mc',q:'A patient is undergoing hemodialysis. During the procedure, the patient suddenly becomes hypotensive and lightheaded. The nurse\'s FIRST action is:',opts:['Stop the dialysis immediately','Decrease the ultrafiltration rate (fluid removal rate) and administer normal saline bolus','Increase the blood flow rate','Position patient in reverse Trendelenburg'],ans:[1],rationale:'Intradialytic hypotension = most common dialysis complication. Cause: too-rapid fluid removal. Management: decrease ultrafiltration rate, NS bolus, position supine with legs elevated. Stop dialysis only if refractory.',pearl:'Intradialytic hypotension: decrease UF rate + NS bolus + Trendelenburg. Prevention: avoid eating immediately before dialysis, limit intradialytic weight gain < 2-3 kg between sessions.'},
{id:'m8_31',mod:'m8',drug:false,type:'mc',q:'A patient with benign prostatic hyperplasia (BPH) reports nocturia, hesitancy, and weak stream. Which assessment finding would indicate urinary retention requiring urgent intervention?',opts:['Post-void residual of 50 mL','Post-void residual of 350 mL with suprapubic distension and discomfort','A voiding frequency of every 3 hours','Mild nocturia (once per night)'],ans:[1],rationale:'Post-void residual (PVR) > 300 mL with symptoms of urinary retention (suprapubic pain/distension, inability to void) = acute urinary retention = urgent catheterization needed. PVR > 200 mL is significant.',pearl:'BPH management: alpha-blockers (tamsulosin, prazosin) relax smooth muscle = faster onset. 5-alpha reductase inhibitors (finasteride) shrink the prostate = slower onset (3-6 months). Together = most effective. Caution: tamsulosin causes orthostatic hypotension (first-dose effect).'},
{id:'m8_32',mod:'m8',drug:false,type:'mc',q:'A patient with a UTI is prescribed trimethoprim-sulfamethoxazole (TMP-SMX). The nurse\'s teaching includes:',opts:['Take on an empty stomach for best absorption','Drink 8+ glasses of water daily and avoid excessive sun exposure','Limit physical activity until antibiotics are complete','Take antacids if GI upset occurs'],ans:[1],rationale:'TMP-SMX: hydration (prevents crystalluria — sulfonamide crystals can form in concentrated urine), photosensitivity (sulfonamide class causes sun sensitivity — use sunscreen/protective clothing).',pearl:'Sulfonamide (TMP-SMX) side effects: photosensitivity, crystalluria (hydrate!), bone marrow suppression (monitor CBC), allergic reactions (sulfa allergy is common), Stevens-Johnson syndrome. Monitor renal function. Contraindicated in pregnancy near term.'},
{id:'m8_33',mod:'m8',drug:false,type:'mc',q:'Which lab finding is the MOST sensitive early indicator of declining renal function?',opts:['Elevated BUN','Elevated serum creatinine','Decreased GFR (calculated from creatinine)','Decreased urine specific gravity'],ans:[2],rationale:'Calculated GFR (eGFR using CKD-EPI or MDRD formula) is more sensitive than serum creatinine alone because it accounts for age, sex, and race. GFR < 60 mL/min/1.73m² = CKD. Creatinine may appear normal until 50% of nephrons are lost.',pearl:'GFR is the gold standard for kidney function. CKD stages by GFR: Stage 1 (≥90), 2 (60-89), 3a (45-59), 3b (30-44), 4 (15-29), 5 (<15 = kidney failure, dialysis). Serum Cr rises only when >50% nephrons are damaged.'},
{id:'m8_34',mod:'m8',drug:false,type:'mc',q:'A female patient with recurrent UTIs receives education. Which teaching is MOST effective for prevention?',opts:['Take prophylactic antibiotics every day permanently','Void immediately after intercourse, wipe front to back, increase fluid intake','Use antibacterial soap in the perineal area daily','Limit fluid intake to reduce urine production and bladder irritation'],ans:[1],rationale:'UTI prevention: void after intercourse (flushes bacteria), wipe front to back (prevents fecal bacteria from entering urethra), increase fluid intake (dilutes urine and flushes bacteria), wear cotton underwear, avoid prolonged use of diaphragms/spermicide.',pearl:'UTI prevention pearls: front to back, void after sex, hydrate, cotton underwear, showers > baths. Most UTIs = E. coli from GI flora. Women: short urethra = easier ascent. Post-menopausal women = use vaginal estrogen cream (atrophic changes increase UTI risk).'},
{id:'m8_35',mod:'m8',drug:false,type:'mc',q:'A patient with polycystic kidney disease (PKD) asks what the most common complications are. The nurse accurately states:',opts:['Nephrotic syndrome and massive proteinuria are the primary concerns','Hypertension, pain from cyst expansion, and progression to kidney failure','Recurrent kidney stones are the primary complication','Urinary incontinence from bladder compression'],ans:[1],rationale:'PKD (autosomal dominant = most common): bilateral cysts → gradually destroy normal kidney tissue → HTN (from RAAS activation) + flank/abdominal pain from cyst enlargement + progressive CKD → ESRD (average ~50-60 years of age).',pearl:'PKD: cysts can also develop in the LIVER and intracranial aneurysms (berry aneurysms) are associated. Screen family members. No cure — manage HTN aggressively (tolvaptan slows progression). ESRD in ~50% by age 60.'},
{id:'m8_36',mod:'m8',drug:false,type:'mc',q:'Which is the MOST important nursing assessment before inserting a urinary catheter?',opts:['Vital signs and allergies (including latex allergy)','Blood type and cross-match','Previous surgical history','Dietary intake in the past 24 hours'],ans:[0],rationale:'Before catheter insertion: vital signs (baseline), allergies including LATEX (Foley catheters have latex components — use silicone for latex allergy). Also assess indication (CAUTI prevention — only catheterize when necessary).',pearl:'CAUTI prevention (catheter-associated UTI): insert only when necessary, use sterile technique, maintain closed system, daily hygiene, assess need for removal daily, remove as soon as possible. CAUTIs are largely preventable hospital-acquired infections.'},
{id:'m8_37',mod:'m8',drug:false,type:'mc',q:'A patient post-kidney transplant has a sudden rise in serum creatinine. The nurse understands this may indicate:',opts:['Normal post-operative changes that resolve spontaneously','Acute rejection — T-cell mediated attack on the transplanted kidney','Urinary tract infection limited to the bladder','Cyclosporine reaching therapeutic levels'],ans:[1],rationale:'Rising creatinine post-transplant = acute rejection until proven otherwise. Acute cellular rejection occurs days to months post-transplant. Treatment: high-dose IV methylprednisolone (pulse corticosteroids).',pearl:'Transplant rejection types: Hyperacute (hours, pre-formed antibodies) — Acute (days-months, T-cell mediated, most common) — Chronic (months-years, slow scarring). Rising Cr = concern. Graft tenderness + oliguria + fever = classic acute rejection presentation.'},
{id:'m9_24',mod:'m9',drug:false,type:'mc',q:'A patient with type 1 diabetes develops diaphoresis, tremors, confusion, and a blood glucose of 42 mg/dL. The priority intervention for this CONSCIOUS patient is:',opts:['Administer 1 mg glucagon IM','Give 15-20 grams of fast-acting carbohydrate (Rule of 15)','Establish IV access and run D50W','Call the provider and await orders'],ans:[1],rationale:'Conscious patient with hypoglycemia = Rule of 15: 15g fast-acting carbs (4 oz juice, glucose tablets, regular soda), wait 15 minutes, recheck glucose. If still < 70, repeat. If unconscious/can\'t swallow = glucagon IM or IV dextrose.',pearl:'Rule of 15: 15g carbs → wait 15 min → check glucose. Conscious = oral glucose. Unconscious = IV D50W or glucagon IM. After glucose corrects, give a small snack (protein + complex carb) to prevent rebound.'},
{id:'m9_25',mod:'m9',drug:false,type:'mc',q:'A patient with type 2 diabetes is in diabetic ketoacidosis (DKA). Which finding confirms DKA rather than Hyperglycemic Hyperosmolar State (HHS)?',opts:['Blood glucose > 600 mg/dL','Absence of ketonemia and ketonuria','Anion gap metabolic acidosis with ketones','Severe dehydration without acidosis'],ans:[2],rationale:'DKA: anion gap metabolic acidosis (pH < 7.3, HCO3 < 18) + KETONES (ketonemia, ketonuria, fruity breath). Glucose usually 250-500. HHS: glucose > 600, severe dehydration, hyperosmolarity, but NO significant ketosis or acidosis.',pearl:'DKA = KETONES + ACIDOSIS (mainly in T1DM). HHS = NO KETONES + extreme hyperglycemia + severe dehydration (mainly in T2DM elderly). Both: IV fluids first, then insulin. HHS mortality higher due to thrombosis from hyperviscosity.'},
{id:'m9_26',mod:'m9',drug:true,type:'mc',q:'A patient on insulin glargine (Lantus) asks why they cannot mix it with other insulins. The nurse explains:',opts:['Glargine must be warmed before injection and mixing would cause precipitation','Glargine is formulated at an acidic pH; mixing with other insulins alters its pH and changes its pharmacokinetics (extended release lost)','Glargine contains a preservative that inactivates short-acting insulins','FDA regulations prohibit mixing any two insulins in the same syringe'],ans:[1],rationale:'Insulin glargine (Lantus) is a clear, acidic (pH ~4) solution. Its long-acting profile depends on its pH — when injected subcutaneously, the low pH causes microprecipitation, releasing insulin slowly over 24 hours. Mixing with other insulins (pH ~7) neutralizes this and destroys the extended release mechanism.',pearl:'Glargine = NEVER mix. Clear but NOT rapid-acting. Onset: 1-2 hrs, Peak: NONE (flat), Duration: 24 hrs. Given at same time each day. Can cause hypoglycemia — injection sites should be rotated. Cloudy insulin = NPH (intermediate) or premixed = roll don\'t shake.'},
{id:'m9_27',mod:'m9',drug:false,type:'mc',q:'A patient with Cushing\'s syndrome presents for care. Which cluster of findings is MOST characteristic?',opts:['Weight loss, exophthalmos, and heat intolerance','Central obesity, moon face, buffalo hump, purple striae, and hyperglycemia','Hypotension, hyponatremia, and hyperpigmentation','Low blood pressure, fatigue, and hypoglycemia'],ans:[1],rationale:'Cushing\'s syndrome: excess cortisol. Classic features: central (truncal) obesity, moon face (facial fat redistribution), buffalo hump (interscapular fat), purple striae (skin thinning), hyperglycemia, HTN, hypokalemia, osteoporosis, immunosuppression.',pearl:'Cushingoid = excess cortisol. Mnemonic CUSHINGS: Central obesity, Ulcers, Striae/Skin changes, Hypertension, Infection susceptibility, Neuropsychiatric, Glucose elevated, Sugar/Steroids. Compare to Addison\'s (opposite — deficiency).'},
{id:'m9_28',mod:'m9',drug:false,type:'mc',q:'A patient with Addison\'s disease is brought to the ED in adrenal crisis. Which intervention is the PRIORITY?',opts:['IV hydrocortisone and normal saline resuscitation','Oral prednisone administration','Fludrocortisone oral supplement','ACTH stimulation test before treatment'],ans:[0],rationale:'Adrenal crisis = life-threatening: profound hypotension, hyponatremia, hyperkalemia, hypoglycemia. Priority: IV hydrocortisone (provides both glucocorticoid AND mineralocorticoid activity) + IV NS (volume resuscitation). Do NOT delay treatment for diagnostic tests.',pearl:'Adrenal crisis = Addisonian crisis. Classic presentation: hemodynamic collapse, hyponatremia, hyperkalemia, hypoglycemia, hyperpigmentation (ACTH is elevated). Stress dosing: patients with adrenal insufficiency need increased steroid doses during illness/surgery.'},
{id:'m9_29',mod:'m9',drug:false,type:'mc',q:'A patient is diagnosed with SIADH (Syndrome of Inappropriate ADH). Which laboratory findings are expected?',opts:['Hypernatremia, elevated serum osmolality, and concentrated urine','Hyponatremia, LOW serum osmolality, and CONCENTRATED urine (high urine osmolality)','Hyponatremia, elevated serum osmolality, and dilute urine','Hypernatremia, low serum osmolality, and dilute urine'],ans:[1],rationale:'SIADH: ADH is secreted inappropriately (despite normal/low osmolality). ADH causes water retention → dilutional hyponatremia + low serum osmolality. Kidneys continue to concentrate urine (following ADH signal) despite dilute serum.',pearl:'SIADH: serum low (diluted) + urine concentrated (kidneys following ADH). The paradox: serum is dilute but urine is concentrated. Treatment: fluid restriction (1000-1500 mL/day). Hypertonic saline for severe hyponatremia with symptoms. Tolvaptan (vasopressin antagonist) for resistant cases.'},
{id:'m9_30',mod:'m9',drug:false,type:'mc',q:'A patient with hyperthyroidism is scheduled for a thyroidectomy. Which pre-operative medication is given to reduce vascularity of the thyroid?',opts:['Propylthiouracil (PTU)','Lugol\'s solution (potassium iodide)','Levothyroxine','Propranolol'],ans:[1],rationale:'Lugol\'s solution (potassium iodide) is given 7-14 days before thyroidectomy to reduce thyroid vascularity and size (Wolff-Chaikoff effect = high iodine temporarily suppresses thyroid function). Reduces surgical bleeding risk.',pearl:'Pre-op thyroidectomy prep: Antithyroid drug (PTU or methimazole) to make euthyroid + Lugol\'s iodide (reduce vascularity) + Propranolol (control tachycardia/symptoms). Post-op monitor: hypocalcemia (parathyroid injury), laryngeal nerve injury (hoarseness), airway obstruction (bleeding/hematoma).'},
{id:'m9_31',mod:'m9',drug:false,type:'mc',q:'A patient with diabetes insipidus (DI) is assessed. Which finding is MOST expected?',opts:['Edema, hyponatremia, and urine specific gravity of 1.035','Polyuria (large volume dilute urine), polydipsia, and hypernatremia if fluid intake is inadequate','Weight gain from fluid retention and concentrated dark urine','Decreased urine output and normal electrolytes'],ans:[1],rationale:'DI: insufficient ADH (central DI) or renal resistance to ADH (nephrogenic DI). Result: kidneys CANNOT concentrate urine → massive dilute urine output (polyuria), intense thirst (polydipsia). If unable to drink: hypernatremia + dehydration.',pearl:'DI: serum high (concentrated, hypernatremia) + urine dilute (low SG < 1.005). OPPOSITE of SIADH. Treat central DI: desmopressin (DDAVP). Nephrogenic DI: low-sodium diet + thiazide diuretics (paradoxically reduce urine output).'},
{id:'m9_32',mod:'m9',drug:true,type:'mc',q:'A patient with hypothyroidism is prescribed levothyroxine (Synthroid). Which teaching is MOST important?',opts:['Take at bedtime to coincide with overnight hormone production','Take the same time each morning on an empty stomach, 30-60 minutes before food','Take with breakfast to prevent GI upset','Take every other day — daily dosing causes toxicity'],ans:[1],rationale:'Levothyroxine: take consistently on an empty stomach in the morning (30-60 min before food/other meds). Calcium, antacids, iron, soy products significantly reduce absorption. Consistent timing maintains stable thyroid levels.',pearl:'Levothyroxine: empty stomach AM, 30 min before food. Separate from calcium/antacids/iron by 4 hours. Overdose = hyperthyroidism symptoms (palpitations, tremor, anxiety, weight loss). Annual TSH check to monitor therapy.'},
