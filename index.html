<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRSG 2350 – Pathopharmacology Exam Prep</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fa;--surface:#fff;--surface2:#f1f3f5;--border:#dee2e6;--border2:#adb5bd;
  --text:#212529;--muted:#6c757d;--hint:#adb5bd;
  --blue:#1971c2;--blue-bg:#e7f5ff;--blue-border:#74c0fc;
  --green:#2f9e44;--green-bg:#ebfbee;--green-border:#8ce99a;
  --red:#c92a2a;--red-bg:#fff5f5;--red-border:#ffa8a8;
  --yellow:#e67700;--yellow-bg:#fff9db;--yellow-border:#ffd43b;
  --gray-bg:#f8f9fa;--radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
h1{font-size:22px;font-weight:600}
h2{font-size:18px;font-weight:600}
h3{font-size:16px;font-weight:600}
p{line-height:1.7}
.wrap{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-sm{padding:1rem 1.25rem}
button{font-family:inherit;font-size:14px;cursor:pointer;border-radius:var(--radius);padding:8px 16px;border:1px solid var(--border2);background:var(--surface);color:var(--text);transition:all .15s}
button:hover{background:var(--surface2);border-color:var(--text)}
button:active{transform:scale(.98)}
button:disabled{opacity:.4;cursor:default;transform:none}
.btn-primary{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue);font-weight:500}
.btn-primary:hover{background:#d0ebff;border-color:var(--blue)}
.btn-success{background:var(--green-bg);border-color:var(--green-border);color:var(--green);font-weight:500}
.btn-danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red);font-weight:500}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.badge-gray{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.muted{color:var(--muted);font-size:14px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.metric{background:var(--surface2);border-radius:var(--radius);padding:.9rem;text-align:center}
.metric .val{font-size:24px;font-weight:600;color:var(--text)}
.metric .lbl{font-size:12px;color:var(--muted);margin-top:2px}
input[type=number],input[type=text]{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--surface);color:var(--text);font-family:inherit}
input[type=number]:focus,input[type=text]:focus{outline:none;border-color:var(--blue)}
.progress{height:5px;background:var(--surface2);border-radius:3px;margin-bottom:1.25rem;overflow:hidden}
.progress .fill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:8px;font-size:14px;line-height:1.6;transition:all .12s}
.opt:hover{border-color:var(--blue-border);background:var(--blue-bg)}
.opt.selected{border-color:var(--blue-border);background:var(--blue-bg)}
.opt.correct{border-color:var(--green-border);background:var(--green-bg)}
.opt.incorrect{border-color:var(--red-border);background:var(--red-bg)}
.opt.missed{border-color:var(--yellow-border);background:var(--yellow-bg)}
.opt .letter{min-width:22px;font-weight:600;color:var(--muted);flex-shrink:0}
.opt input[type=checkbox]{margin-top:3px;flex-shrink:0;accent-color:var(--blue)}
.rationale{background:var(--surface2);border-left:3px solid var(--blue-border);border-radius:0 var(--radius) var(--radius) 0;padding:1rem 1.1rem;margin-top:1rem}
.rationale .ans-lbl{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:.5rem}
.rationale .ans-lbl.correct{color:var(--green)}
.rationale .ans-lbl.incorrect{color:var(--red)}
.rationale .ans-lbl.partial{color:var(--yellow)}
.rationale p{font-size:14px;line-height:1.7}
.pearl{margin-top:.75rem;padding:.75rem;background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:var(--radius)}
.pearl .pearl-title{font-size:11px;font-weight:600;color:var(--yellow);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}
.pearl p{font-size:13px;color:var(--text)}
.fill-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.fill-row input{max-width:280px;flex:1}
.nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:1.25rem}
.nav .spacer{margin-left:auto}
.mod-row{display:grid;grid-template-columns:1fr 70px 70px;gap:8px;align-items:center;margin-bottom:8px}
.mod-row label{font-size:13px;color:var(--text)}
.mod-row input{width:100%}
.section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:1.25rem 0 .5rem}
.score-ring{width:88px;height:88px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.score-ring.good{border:4px solid var(--green-border);background:var(--green-bg)}
.score-ring.ok{border:4px solid var(--yellow-border);background:var(--yellow-bg)}
.score-ring.low{border:4px solid var(--red-border);background:var(--red-bg)}
.score-ring .pct{font-size:22px;font-weight:700}
.score-ring.good .pct{color:var(--green)}
.score-ring.ok .pct{color:var(--yellow)}
.score-ring.low .pct{color:var(--red)}
.score-ring .lbl{font-size:10px;color:var(--muted)}
.review-item{border-left:3px solid var(--border2);padding:8px 12px;margin-bottom:8px;font-size:13px;line-height:1.6}
.review-item.wrong{border-left-color:var(--red)}
.review-item.right{border-left-color:var(--green)}
.review-item .q-text{font-weight:500;margin-bottom:2px;color:var(--text)}
.review-item .q-mod{color:var(--muted)}
hr{border:none;border-top:1px solid var(--border);margin:1rem 0}
.warn-box{background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:var(--radius);padding:.75rem 1rem;font-size:13px;color:var(--yellow);margin-bottom:1rem}
.info-box{background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:var(--radius);padding:.75rem 1rem;font-size:13px;color:var(--blue);margin-bottom:1rem}
.correct-ans{font-size:13px;font-weight:500;color:var(--green);margin:.5rem 0}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}.mod-row{grid-template-columns:1fr 60px 60px}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
// ============================================================
// NRSG 2350 PATHOPHARMACOLOGY EXAM PREP
// All 8 modules per syllabus + comprehensive question bank
// ============================================================

const MODULES=[
  {id:'m1',label:'Module 1 – Introduction to Pathophysiology'},
  {id:'m2',label:'Module 2 – Introduction to Pharmacology'},
  {id:'m3',label:'Module 3 – Immunology'},
  {id:'m4',label:'Module 4 – Hematology'},
  {id:'m5',label:'Module 5 – Neurology'},
  {id:'m6',label:'Module 6 – Cardiovascular'},
  {id:'m7',label:'Module 7 – Respiratory'},
  {id:'m8',label:'Module 8 – Renal & Reproductive'},
  {id:'m9',label:'Module 9 – Endocrine'},
  {id:'m10',label:'Module 10 – Gastrointestinal'},
  {id:'m11',label:'Module 11 – Musculoskeletal'},
];

// ============================================================
// QUESTION BANK — 160+ questions across all 11 modules
// type: 'mc'=multiple choice, 'sata'=select all, 'fill'=fill blank
// drug: true = pharmacology-focused question
// ============================================================
const ALL_Q=[
// ===== MODULE 1: INTRODUCTION TO PATHOPHYSIOLOGY =====
{id:'m1_1',mod:'m1',drug:false,type:'mc',q:'A patient develops cellular swelling after prolonged hypotension. Which cellular process is most likely impaired?',opts:['Exocytosis','Active transport (Na+/K+ pump)','Osmosis','Facilitated diffusion'],ans:[1],rationale:'The Na+/K+ pump requires ATP. Hypotension reduces O2 delivery → anaerobic metabolism → decreased ATP → pump failure → Na+ and water accumulate in cell causing swelling.',pearl:'No O2 = no Krebs cycle = no ATP = active transport fails first. This is why ischemia causes cellular edema so rapidly.'},
{id:'m1_2',mod:'m1',drug:false,type:'mc',q:'Chronic smoking causes columnar bronchial epithelial cells to be replaced by squamous cells. This adaptive change is called:',opts:['Atrophy','Hypertrophy','Dysplasia','Metaplasia'],ans:[3],rationale:'Metaplasia is replacement of one cell type with another. Chronic irritation causes columnar cells to be replaced by more resilient squamous cells. While reversible, it increases cancer risk.',pearl:'Metaplasia = type switch (reversible). Dysplasia = abnormal form of same cell (premalignant). Neoplasia = abnormal new growth (cancer). Metaplasia → Dysplasia → Neoplasia is the cancer progression pathway.'},
{id:'m1_3',mod:'m1',drug:false,type:'sata',q:'Which adaptive cellular changes describe an INCREASE in cell size OR number? Select all that apply.',opts:['Atrophy','Hypertrophy','Hyperplasia','Metaplasia','Dysplasia'],ans:[1,2],rationale:'Hypertrophy = increase in cell SIZE. Hyperplasia = increase in cell NUMBER. Atrophy = decrease in size. Metaplasia = cell type replacement. Dysplasia = abnormal morphology.',pearl:'-trophy = size (hyper=big, a=shrink). -plasia = formation/number. Know all 5 adaptive changes and their clinical examples for NCLEX.'},
{id:'m1_4',mod:'m1',drug:false,type:'mc',q:'Which epidemiological term refers to the number of NEW cases of a disease occurring in a population over a specific time period?',opts:['Prevalence','Morbidity','Incidence','Mortality'],ans:[2],rationale:'Incidence = new cases over time. Best for tracking infectious disease outbreaks. Prevalence = all existing cases at a given time. Best for chronic disease burden (e.g., diabetes prevalence).',pearl:'I = Incident = Infectious (new). P = Prevalent = Persistent (already there). Incidence tracks outbreaks; prevalence tracks burden.'},
{id:'m1_5',mod:'m1',drug:false,type:'mc',q:'Total body water is approximately 60% of body weight. The largest proportion is found in which compartment?',opts:['Plasma (5%)','Interstitial fluid (14%)','Intracellular fluid (40%)','Transcellular fluid (1%)'],ans:[2],rationale:'ICF = 40% of body weight = two-thirds of total body water. ECF (interstitial + plasma + transcellular) = 20% body weight.',pearl:'60-40-20 rule: TBW=60%, ICF=40%, ECF=20%. Cells hold the most water. Two-thirds of TBW is intracellular.'},
{id:'m1_6',mod:'m1',drug:false,type:'mc',q:'A patient has serum sodium of 128 mEq/L. Which finding would the nurse expect?',opts:['Dry mucous membranes and intense thirst','Muscle cramps, confusion, and possible seizures','Flushed skin and elevated blood pressure','Markedly increased urine output'],ans:[1],rationale:'Hyponatremia (<135 mEq/L) causes water to shift INTO cells causing cerebral swelling → muscle cramps, weakness, nausea, confusion, lethargy, seizures, coma.',pearl:'Low Na+ = water into cells = cerebral edema = neuro symptoms. Serum Na < 120 = high seizure risk. Na+ controls water distribution — where sodium goes, water follows.'},
{id:'m1_7',mod:'m1',drug:false,type:'mc',q:'A patient receives 0.45% NaCl (half normal saline) IV. What effect will this have on cells?',opts:['Water moves OUT of cells; cells shrink','No fluid shift occurs','Water moves INTO cells; cells swell','Potassium shifts out of cells into ECF'],ans:[2],rationale:'0.45% NaCl is hypotonic — less concentrated than ECF. Water moves from ECF into ICF (higher concentration) causing cells to swell. Indicated for cellular dehydration.',pearl:'Hypotonic = water INTO cells. Hypertonic = water OUT of cells. Isotonic = no shift. 0.9% NS = isotonic. 0.45% NS = hypotonic. 3% NS = hypertonic (only for severe symptomatic hyponatremia — given SLOWLY).'},
{id:'m1_8',mod:'m1',drug:false,type:'mc',q:'A patient with CHF has bilateral pitting edema. The PRIMARY mechanism is:',opts:['Decreased capillary permeability','Increased capillary filtration pressure from elevated venous pressure','Increased capillary colloid osmotic pressure','Obstruction of lymphatic vessels'],ans:[1],rationale:'In CHF, fluid backs up behind the failing ventricle → increased venous and capillary hydrostatic (filtration) pressure → fluid forced into interstitium = edema.',pearl:'Four edema mechanisms: (1) Increased filtration pressure (CHF/HTN), (2) Decreased osmotic pressure (low albumin/liver failure), (3) Increased capillary permeability (inflammation/burns), (4) Lymphatic obstruction (lymphedema/cancer).'},
{id:'m1_9',mod:'m1',drug:false,type:'mc',q:'Lab values show elevated BUN, elevated hematocrit, elevated serum osmolality, decreased urine output, and elevated urine specific gravity. This indicates:',opts:['Fluid volume overload','Fluid volume deficit','Hypernatremia alone','SIADH'],ans:[1],rationale:'All values reflect hemoconcentration. Elevated BUN (less GFR), elevated Hct (more RBCs per volume), elevated osmolality, concentrated urine (high specific gravity, low output) = fluid deficit.',pearl:'Fluid deficit = all ELEVATED: Na, BUN, Hct, osmolality, urine specific gravity. Fluid overload = all DECREASED. Think: deficit = blood thickens like soup; overload = blood is diluted like weak broth.'},
{id:'m1_10',mod:'m1',drug:false,type:'mc',q:'A patient with liver failure develops ascites. Which two mechanisms contribute most?',opts:['Decreased albumin reducing capillary osmotic pressure AND increased portal hypertension','Increased renal excretion of sodium and water','Increased ADH secretion AND decreased portal pressure','Decreased capillary permeability AND lymphatic obstruction'],ans:[0],rationale:'Liver failure = (1) decreased albumin production reducing capillary osmotic pressure (less fluid pulled back into vessels) + (2) portal hypertension increasing vascular pressure. Both forces push fluid into peritoneal space = ascites.',pearl:'Ascites = classic third-space shift. Double hit: low albumin + portal hypertension. Treatment: salt restriction, diuretics (spironolactone first-line in cirrhosis), paracentesis for large-volume ascites.'},
{id:'m1_11',mod:'m1',drug:false,type:'fill',q:'___________ is the normal, programmed, controlled cell death essential for development and tissue homeostasis that differs from necrosis in that it does NOT cause inflammation.',ans:['apoptosis'],rationale:'Apoptosis = programmed cell death. Cells self-destruct in an orderly way. Normal and essential. Necrosis = pathological, uncontrolled, causes inflammation and scar tissue.',pearl:'Apoptosis = normal, no inflammation (e.g., tadpole tail disappearing, finger development). Necrosis = pathological, inflammatory (e.g., MI, gangrene). Cancer cells disable apoptosis — they refuse to die. Understanding this drives many cancer therapies.'},
{id:'m1_12',mod:'m1',drug:false,type:'mc',q:'A nurse explains the difference between a sign and a symptom. Which example is a SIGN?',opts:['Patient reports feeling dizzy','Patient states chest feels tight','Nurse observes jugular vein distension','Patient describes fatigue for 3 weeks'],ans:[2],rationale:'A sign is objective and observable by the examiner (JVD, fever, rash, abnormal lab value). A symptom is subjective — reported by the patient (dizziness, chest tightness, fatigue, pain).',pearl:'Symptom = Subjective (patient says). Sign = Seen/objective (nurse/provider detects). Syndrome = cluster of signs AND symptoms. A classic NCLEX distinction tested repeatedly.'},
{id:'m1_13',mod:'m1',drug:false,type:'sata',q:'Which findings are clinical manifestations of fluid volume DEFICIT? Select all that apply.',opts:['Flat neck veins','Bounding pulse','Orthostatic hypotension','Decreased skin turgor','Dry mucous membranes','Decreased urine output'],ans:[0,2,3,4,5],rationale:'Fluid volume deficit: flat/collapsed neck veins (less venous return), orthostatic hypotension (BP drops on standing), decreased skin turgor (tenting), dry mucous membranes, decreased urine output (kidneys conserving fluid). Bounding pulse = fluid overload.',pearl:'Fluid deficit = FLAT: Flat veins, Low BP (orthostatic), Altered skin turgor, Thirst, cracked lips. Fluid overload = FULL: Full/bounding pulse, Urine output increased initially, Lung crackles, Leg edema.'},
{id:'m1_14',mod:'m1',drug:false,type:'mc',q:'Hypernatremia (Na+ 158 mEq/L) is being treated. The nurse knows sodium should be lowered:',opts:['As rapidly as possible to prevent seizures','Gradually over 24-48 hours to prevent cerebral edema','With hypertonic saline infusion','With fluid restriction only'],ans:[1],rationale:'Rapid correction of hypernatremia causes water to suddenly shift back into brain cells causing cerebral edema, herniation, and death. Maximum correction rate is approximately 0.5 mEq/L per hour.',pearl:'Both hypo- and hypernatremia must be corrected SLOWLY. Rapid hyponatremia correction = osmotic demyelination syndrome (ODS). Rapid hypernatremia correction = cerebral edema. The brain needs time to adapt — chemistry of the nervous system is delicate.'},
{id:'m1_15',mod:'m1',drug:false,type:'mc',q:'A patient with kidney disease has potassium of 6.2 mEq/L. Which ECG change would the nurse anticipate first?',opts:['Flattened T waves','Peaked (tall, narrow) T waves','Wide QRS complex','Absent P waves'],ans:[1],rationale:'Hyperkalemia causes characteristic peaked (tall, narrow, tent-shaped) T waves as the first ECG change. As K+ rises further: wide QRS, prolonged PR interval, loss of P waves, and ultimately sine-wave pattern and cardiac arrest.',pearl:'Hyper-K+ ECG progression: Peaked T waves → Prolonged PR → Wide QRS → Loss of P waves → Sine wave → V-fib → Asystole. Hypo-K+ ECG: Flattened T waves + U waves. Both extremes are cardiac emergencies.'},

// ===== MODULE 2: INTRODUCTION TO PHARMACOLOGY =====
{id:'m2_1',mod:'m2',drug:true,type:'mc',q:'Grapefruit juice interacts with many medications because it:',opts:['Stimulates CYP450 enzymes accelerating drug metabolism','Inhibits CYP3A4 enzymes causing drug levels to rise and risk toxicity','Increases renal excretion of drugs','Binds to albumin displacing drug molecules'],ans:[1],rationale:'Grapefruit juice inhibits CYP3A4 enzymes in the gut wall → drug is not metabolized before entering systemic circulation → higher drug levels → toxicity risk.',pearl:'Inhibitors INCREASE drug levels (enzyme blocked, drug builds up). Inducers DECREASE drug levels (enzyme accelerated, drug broken down faster). Grapefruit = classic inhibitor. Rifampin, St. John\'s Wort = classic inducers.'},
{id:'m2_2',mod:'m2',drug:true,type:'mc',q:'A patient taking warfarin begins rifampin therapy. The nurse anticipates:',opts:['Increased warfarin levels and bleeding risk','Decreased warfarin levels and reduced anticoagulation effect','No clinically significant interaction','Increased risk of liver toxicity only'],ans:[1],rationale:'Rifampin is a potent CYP enzyme INDUCER. It speeds up warfarin metabolism → lower warfarin blood levels → reduced anticoagulation → clotting risk. Monitor INR closely.',pearl:'Rifampin RIPS through drugs. It induces CYP2C9 and CYP3A — many drugs lose efficacy. Always check INR when adding/removing enzyme inducers or inhibitors with warfarin. This is a high-yield NCLEX interaction.'},
{id:'m2_3',mod:'m2',drug:false,type:'mc',q:'A drug with a LOW therapeutic index (TI) requires which nursing action?',opts:['No monitoring needed — it has a wide safety margin','Close monitoring — small dose changes can lead to toxicity or sub-therapeutic levels','Monitoring only at initiation — levels stabilize after 5 half-lives','Dose escalation to maximize effectiveness'],ans:[1],rationale:'Low TI = toxic dose close to effective dose = narrow safety margin. Examples: warfarin, digoxin, lithium, phenytoin, aminoglycosides. All require therapeutic drug monitoring (TDM).',pearl:'Low TI drugs = "tightrope dosing." High TI = safer (penicillin — you can give large doses safely). Low TI = must monitor levels (digoxin levels, lithium levels, vancomycin troughs). NCLEX loves asking about TI and monitoring.'},
{id:'m2_4',mod:'m2',drug:true,type:'mc',q:'A patient on OxyContin (extended-release oxycodone) crushes and takes the pill. Why is this dangerous?',opts:['It bypasses first-pass metabolism only','It destroys the controlled-release mechanism delivering the full dose at once','It converts the drug to a toxic metabolite','It causes the drug to be excreted through the skin'],ans:[1],rationale:'Extended-release formulations release drug slowly over time. Crushing destroys the matrix → dose dumping → entire dose released at once → severe overdose and respiratory depression.',pearl:'NEVER crush: LA (long-acting), SR (sustained-release), XL (extended-release), -contin suffix, EC (enteric-coated) tablets. Critical patient safety education. Dose dumping with opioids can be fatal.'},
{id:'m2_5',mod:'m2',drug:false,type:'sata',q:'Which of the following are drug ALLERGY reaction types? Select all that apply.',opts:['Anaphylaxis (Type I IgE-mediated)','Blood dyscrasia','Serum sickness','Cytotoxic reaction (Type II)','Delayed allergic reaction (Type IV)'],ans:[0,2,3,4],rationale:'Four drug allergy types: Anaphylaxis (immediate IgE-mediated), Cytotoxic (antibody + cell destruction, decreased CBC), Serum sickness (antibody deposition, fever, joints, 1+ week after), Delayed (T-cell mediated, hours to days). Blood dyscrasia is a drug-induced organ effect, not an allergy.',pearl:'Allergy timelines: Anaphylaxis = minutes. Delayed = hours to days. Serum sickness = 1-3 weeks. Cytotoxic = variable. Patients with anaphylaxis to a drug should NEVER receive that drug again.'},
{id:'m2_6',mod:'m2',drug:false,type:'fill',q:'When an orally taken drug is extensively metabolized by the liver before reaching systemic circulation, this is called the _____________ effect.',ans:['first-pass','first pass'],rationale:'First-pass (presystemic) metabolism: oral drugs are absorbed from GI tract → portal vein → liver metabolizes a significant portion → only fraction reaches systemic circulation = reduced bioavailability.',pearl:'First-pass explains why IV morphine doses are much lower than PO doses. Sublingual, transdermal, rectal, and IV routes bypass first-pass. High first-pass drugs: nitroglycerin, morphine, lidocaine, propranolol.'},
{id:'m2_7',mod:'m2',drug:true,type:'mc',q:'Buprenorphine is described as a partial agonist. This means it:',opts:['Fully activates the opioid receptor at all doses','Blocks the receptor preventing any activation','Partially activates AND blocks full agonists from binding','Requires naloxone to produce its effect'],ans:[2],rationale:'A partial agonist binds to a receptor producing submaximal response. By occupying the receptor, it also blocks full agonists from binding. Buprenorphine at the opioid mu receptor provides partial activation while blocking heroin.',pearl:'Buprenorphine (Subutex/Suboxone) = partial opioid agonist. Foundation of MAT (medication-assisted treatment) for opioid use disorder. Ceiling effect makes it safer than full agonists — less respiratory depression risk.'},
{id:'m2_8',mod:'m2',drug:false,type:'mc',q:'Which pharmacokinetic process is primarily responsible for drug ELIMINATION from the body?',opts:['Absorption through the GI tract','Distribution from blood into tissues','Hepatic metabolism (biotransformation)','Renal excretion via urine'],ans:[3],rationale:'The kidneys are the primary organ of drug EXCRETION. Most drugs (or their metabolites) are eliminated in the urine. The liver metabolizes drugs; the kidneys excrete them. Both organs must be assessed before dosing many medications.',pearl:'ADME = Absorption, Distribution, Metabolism, Excretion. Liver = Metabolism. Kidneys = Excretion. Renal failure → drugs accumulate → toxicity. Always check BUN and creatinine before giving nephrotoxic drugs.'},
{id:'m2_9',mod:'m2',drug:false,type:'mc',q:'The term "loading dose" describes:',opts:['The lowest dose needed to produce a therapeutic effect','A higher initial dose to rapidly achieve therapeutic drug levels','The dose adjustment made for renal impairment','The amount of drug excreted per day'],ans:[1],rationale:'A loading dose is a higher initial dose given to rapidly reach therapeutic plasma concentration (critical concentration). Without it, drugs with long half-lives would take too long to reach effective levels.',pearl:'Loading dose = faster to therapeutic level. Then maintenance doses keep it there. Used for: digoxin, phenytoin, vancomycin, amiodarone, warfarin (heparin bridge). Without a loading dose, it takes 5 half-lives to reach steady state.'},
{id:'m2_10',mod:'m2',drug:false,type:'mc',q:'Drug-induced hepatotoxicity would present with which cluster of findings?',opts:['Tinnitus, dizziness, and hearing loss','Fever, nausea/vomiting, jaundice, and elevated liver enzymes','Petechiae, low platelet count, and bruising','Confusion, urinary retention, and dry mucous membranes'],ans:[1],rationale:'Hepatotoxicity: fever (systemic inflammatory response), N/V (liver cannot process toxins), jaundice (bilirubin backs up into blood), elevated ALT/AST (liver cell damage). Drug must be discontinued.',pearl:'Drug-induced organ damage patterns: Liver = elevated LFTs + jaundice. Kidneys = elevated BUN/Cr + urine output changes. Ears = tinnitus + hearing loss (aminoglycosides). Blood = CBC changes (bone marrow suppression). Know which drugs damage which organs.'},
{id:'m2_11',mod:'m2',drug:true,type:'sata',q:'Which drugs are CYP450 INHIBITORS (increase levels of co-administered drugs)? Select all that apply.',opts:['Ciprofloxacin','Rifampin','Fluconazole (azole antifungals)','St. John\'s Wort','Grapefruit juice','Macrolide antibiotics (erythromycin, clarithromycin)'],ans:[0,2,4,5],rationale:'Inhibitors (increase levels): Ciprofloxacin (CYP1A2), Fluconazole/azole antifungals (CYP2C9, CYP3A4), Grapefruit juice (CYP3A4), Macrolides (CYP3A4). Inducers (decrease levels): Rifampin and St. John\'s Wort.',pearl:'Inhibitor mnemonic CAAG-M: Ciprofloxacin, Azoles, Amiodarone, Grapefruit, Macrolides. Inducer mnemonic RIPS-C: Rifampin, Isoniazid, Phenytoin, St. John\'s Wort, Carbamazepine.'},
{id:'m2_12',mod:'m2',drug:false,type:'mc',q:'A patient taking a highly protein-bound drug is started on another highly protein-bound medication. The concern is:',opts:['Increased renal excretion of both drugs','Drug displacement — free (active) drug levels increase raising toxicity risk','Decreased GI absorption of both drugs','Reduced hepatic first-pass metabolism'],ans:[1],rationale:'Two highly protein-bound drugs compete for albumin binding sites. One drug displaces the other → more free (active) drug in plasma = elevated effect and toxicity risk. Classic example: warfarin + aspirin.',pearl:'Only FREE (unbound) drug is pharmacologically active. Low albumin (liver disease, malnutrition) = more free drug = increased effect/toxicity at standard doses. Always check albumin levels in critically ill patients.'},
{id:'m2_13',mod:'m2',drug:false,type:'mc',q:'A patient anaphylaxis develops stridor and bronchospasm. Which nursing action is the PRIORITY?',opts:['Administer diphenhydramine IV','Administer epinephrine IM in the vastus lateralis immediately','Position patient in high Fowler\'s and apply oxygen','Obtain IV access and run normal saline rapidly'],ans:[1],rationale:'Anaphylaxis with airway involvement requires EPINEPHRINE IM IMMEDIATELY. Epinephrine causes bronchodilation, vasoconstriction (raises BP), and inhibits further mast cell degranulation. It is the only drug that treats all components of anaphylaxis simultaneously.',pearl:'For anaphylaxis: Epinephrine FIRST — then antihistamines and steroids as adjuncts (they don\'t treat the airway or shock). Give IM in vastus lateralis for fastest absorption. Repeat every 3-5 minutes as needed.'},
{id:'m2_14',mod:'m2',drug:false,type:'mc',q:'Which pharmacodynamic term describes the MINIMUM drug concentration needed to produce a therapeutic response?',opts:['Loading dose','Half-life','Critical concentration','Therapeutic index'],ans:[2],rationale:'Critical concentration = minimum amount needed for a therapeutic effect. Drugs below this level fail to produce the desired response. Loading doses are used to rapidly reach critical concentration. Maintenance doses keep the level above critical concentration.',pearl:'Critical concentration = the floor. Toxic concentration = the ceiling. Therapeutic window = the space between them. Low TI drugs have a very narrow window. This concept underlies all monitoring of drug therapy.'},

// ===== MODULE 3: IMMUNOLOGY =====
{id:'m3_1',mod:'m3',drug:false,type:'mc',q:'A patient presents with urticaria, angioedema, bronchospasm, and hypotension after eating peanuts. The FIRST intervention is:',opts:['Diphenhydramine IV','Corticosteroids IV','Epinephrine IM in the vastus lateralis','Albuterol nebulizer treatment'],ans:[2],rationale:'Anaphylaxis is a life-threatening emergency. Epinephrine is first and most critical — it causes bronchodilation, vasoconstriction (raises BP), and inhibits further mediator release. IM in vastus lateralis for fastest absorption.',pearl:'Epinephrine FIRST for anaphylaxis. Antihistamines and steroids are adjuncts but do NOT treat the life-threatening airway or shock components. Delay = death. Epi-pen = vastus lateralis, not deltoid.'},
{id:'m3_2',mod:'m3',drug:false,type:'mc',q:'Which hypersensitivity reaction type causes contact dermatitis from poison ivy?',opts:['Type I – Anaphylactic (IgE-mediated)','Type II – Cytotoxic (IgG/IgM-mediated)','Type III – Immune Complex','Type IV – Cell-Mediated (Delayed)'],ans:[3],rationale:'Type IV (delayed) hypersensitivity is T-cell mediated. Sensitized TH1 cells activate macrophages → tissue damage. Onset hours to days after exposure. Poison ivy, TB skin test (PPD), and transplant rejection are classic Type IV examples.',pearl:'Type IV = 4-Day delay — no antibodies involved, purely T-cell mediated. Classic examples: poison ivy (48-72 hrs), PPD skin test (48-72 hrs), transplant rejection. This is also why organ rejection is treated with T-cell suppressors like cyclosporine.'},
{id:'m3_3',mod:'m3',drug:false,type:'mc',q:'A patient with rheumatoid arthritis has a positive Rheumatoid Factor (RF). The nurse understands this test detects:',opts:['Elevated uric acid levels in blood','An autoantibody typically found in RA','T-cell destruction of joint synovium','Antinuclear antibodies associated with lupus'],ans:[1],rationale:'Rheumatoid Factor is an autoantibody (usually IgM against IgG) found in approximately 80% of RA patients. It is detected via serology to support diagnosis of RA.',pearl:'RA = RF positive + symmetric joint involvement. SLE = ANA positive + butterfly rash. These are different autoimmune diseases with different diagnostic tests. RA is Type III hypersensitivity (immune complex deposition in joints).'},
{id:'m3_4',mod:'m3',drug:false,type:'mc',q:'Which cells are the PRIMARY antigen-presenting cells that activate T lymphocytes?',opts:['Neutrophils','Basophils','Dendritic cells and macrophages','Natural killer cells'],ans:[2],rationale:'Dendritic cells and macrophages are the primary APCs (antigen-presenting cells). They phagocytose pathogens, process antigens, and present them on MHC II molecules to activate CD4 helper T cells, bridging innate and adaptive immunity.',pearl:'APC → T cell activation → adaptive immune response. Dendritic cells = most potent APCs. Macrophages = phagocytosis + APC + cytokine release. Without APCs, T cells cannot "see" the enemy. This is why HIV (destroying CD4 cells) = collapse of adaptive immunity.'},
{id:'m3_5',mod:'m3',drug:true,type:'mc',q:'A patient receiving filgrastim (Neupogen) for chemo-induced neutropenia reports severe bone pain. The nurse should:',opts:['Stop medication immediately and call the provider','Administer analgesics and reassure this is an expected side effect','Assess for signs of sepsis and draw blood cultures','Withhold the next dose and document'],ans:[1],rationale:'Bone pain is the most common and expected side effect of colony-stimulating factors like filgrastim. It is caused by rapid bone marrow stimulation and increased WBC production. Manageable with analgesics.',pearl:'Filgrastim (Neupogen) stimulates bone marrow to produce neutrophils. Peak effect at 2 hours, duration 4 days. Bone pain = expected. NCLEX tip: If you see "bone pain" + "neutropenia treatment," the answer is filgrastim.'},
{id:'m3_6',mod:'m3',drug:true,type:'mc',q:'Ciprofloxacin has a black box warning for which serious adverse effect?',opts:['Ototoxicity and nephrotoxicity','Tendinitis, tendon rupture, and peripheral neuropathy','Bone and teeth discoloration in children','Stevens-Johnson syndrome'],ans:[1],rationale:'Fluoroquinolones (-floxacin suffix) carry a black box warning for: tendinitis/tendon rupture (especially Achilles), peripheral neuropathy, CNS effects, QT prolongation, C. diff, and liver toxicity. Risk is highest in patients >60 on corticosteroids.',pearl:'-floxacin = fluoroquinolone. Black box = tendon rupture + peripheral neuropathy. Patients should stop and report any tendon pain immediately. Avoid in children (affects developing cartilage) and the elderly on steroids.'},
{id:'m3_7',mod:'m3',drug:true,type:'sata',q:'Which assessments are critical for a patient receiving aminoglycosides (gentamicin)? Select all that apply.',opts:['Tinnitus and hearing loss (ototoxicity)','Serum BUN and creatinine (nephrotoxicity)','Liver function tests','Urine output','Gingival hyperplasia'],ans:[0,1,3],rationale:'Aminoglycosides have two primary toxicities: OTOTOXICITY (CN VIII damage — tinnitus, dizziness, hearing loss — irreversible) and NEPHROTOXICITY (elevated BUN/Cr, decreased urine output). Monitor peak and trough levels. Hepatotoxicity and gingival hyperplasia are not primary concerns.',pearl:'Amino = A Mighty Oto-Nephro toxicity. Monitor: tinnitus (ototoxic), urine output and BUN/Cr (nephrotoxic), drug peak/trough levels. Always assess baseline hearing before starting. Ototoxicity can be permanent — report immediately.'},
{id:'m3_8',mod:'m3',drug:true,type:'mc',q:'A pregnant patient asks about fluconazole for a vaginal yeast infection. The nurse correctly responds:',opts:['It is safe in all trimesters','Fluconazole is preferred over topical agents in pregnancy','Fluconazole is teratogenic and contraindicated — topical clotrimazole is preferred','It is safe only in the third trimester'],ans:[2],rationale:'Fluconazole (systemic azole antifungal) is teratogenic and contraindicated in pregnancy. Topical antifungals such as clotrimazole are safe — minimal to no systemic absorption.',pearl:'Fluconazole = systemic, teratogenic, CYP450 inhibitor. Clotrimazole (Lotrimin) = topical, safe in pregnancy. The "-azole" suffix is shared but systemic vs. topical matters enormously. Always ask about pregnancy before prescribing systemic antifungals.'},
{id:'m3_9',mod:'m3',drug:false,type:'mc',q:'A patient with HIV has a CD4 count of 150 cells/μL and develops Pneumocystis pneumonia. The nurse understands this patient\'s immune deficiency is classified as:',opts:['Primary immune deficiency','Secondary immune deficiency','Type II hypersensitivity','Autoimmune disease'],ans:[1],rationale:'HIV causes secondary immune deficiency — an external agent (the virus) that destroys CD4 T-helper cells. Primary immune deficiency is congenital/genetic (e.g., DiGeorge syndrome). CD4 < 200 = AIDS definition.',pearl:'HIV depletes CD4 (helper T) cells. Without helper T cells, neither humoral nor cell-mediated immunity functions properly. CD4 < 200 = AIDS. PCP (Pneumocystis pneumonia) is the most common AIDS-defining illness in adults.'},
{id:'m3_10',mod:'m3',drug:false,type:'mc',q:'Which type of hypersensitivity reaction is responsible for a hemolytic transfusion reaction (blood type mismatch)?',opts:['Type I – IgE-mediated (anaphylaxis)','Type II – Cytotoxic (IgG/IgM-mediated)','Type III – Immune complex','Type IV – Delayed cell-mediated'],ans:[1],rationale:'Type II (cytotoxic) hypersensitivity: IgG or IgM antibodies bind to antigens on cell surfaces → complement activation → cell lysis. Blood transfusion reactions (ABO incompatibility) are the classic example. Also: Myasthenia gravis, Goodpasture syndrome.',pearl:'Type II = antibody + cell surface antigen = cell destruction. Classic examples: ABO incompatibility (transfusion reaction), Rh incompatibility (hemolytic disease of newborn), Myasthenia gravis (antibodies block acetylcholine receptors). Monitor for transfusion reactions during first 15 minutes.'},
{id:'m3_11',mod:'m3',drug:false,type:'mc',q:'Autoimmune diseases disproportionately affect which population?',opts:['Children under age 5','Men over age 50','Women (2x more likely than men)','Immunocompromised elderly patients'],ans:[2],rationale:'Women are approximately twice as likely as men to develop autoimmune diseases. SLE affects women 9:1 over men. Hormonal, genetic, and environmental factors contribute. Most autoimmune diseases have no cure — treatment focuses on symptom management.',pearl:'Women + autoimmune = high-yield NCLEX association. SLE = women, especially African American women (9:1 ratio). RA = women (3:1). Graves\' disease = women. Remember: estrogen is thought to enhance immune responsiveness.'},
{id:'m3_12',mod:'m3',drug:false,type:'mc',q:'A patient receiving IV vancomycin develops sudden facial flushing, erythema on the neck and chest, and hypotension during infusion. This is MOST likely:',opts:['Type I IgE-mediated anaphylaxis','Red Man Syndrome — an infusion rate-related reaction','Type IV delayed hypersensitivity','Cytotoxic drug allergy'],ans:[1],rationale:'Red Man Syndrome is a common infusion-related reaction to vancomycin caused by histamine release — NOT a true allergy. It is rate-dependent. Slowing infusion rate and pre-medicating with diphenhydramine prevents it.',pearl:'Red Man Syndrome ≠ true allergy. Management: slow infusion (give over ≥60 min) + diphenhydramine pre-medication. NOT a contraindication to future vancomycin use (unlike true anaphylaxis). The rash spreads from the upper body = classic presentation.'},

// ===== MODULE 4: HEMATOLOGY =====
{id:'m4_1',mod:'m4',drug:false,type:'mc',q:'A 35-year-old with sickle cell disease presents with severe joint and chest pain. The nurse understands this is caused by:',opts:['Hypercalcemia causing bone fragility','Vaso-occlusive crisis — sickled RBCs blocking small vessels causing ischemia','Autoimmune destruction of joint cartilage','Excess uric acid crystals depositing in joints'],ans:[1],rationale:'Sickle cell vaso-occlusive crisis: sickled RBCs obstruct small blood vessels → ischemia → severe pain. Common triggers: infection, dehydration, stress, physical exertion, hypoxia.',pearl:'Sickle cell crisis = ischemic pain from vascular occlusion. Hydroxyurea (Droxia) is used prophylactically to increase fetal hemoglobin (HbF), which dilutes HbS and reduces sickling frequency.'},
{id:'m4_2',mod:'m4',drug:true,type:'mc',q:'A patient taking ferrous sulfate for iron deficiency anemia reports dark/black stools. The nurse should:',opts:['Hold the next dose and notify the provider immediately','Assess for GI bleeding — this indicates a complication','Reassure the patient this is an expected side effect of iron therapy','Order a stool guaiac test'],ans:[2],rationale:'Dark or black stools are a NORMAL expected side effect of oral iron (ferrous sulfate). Patients need education to avoid confusing this with GI bleeding (melena). True GI bleeding would have other accompanying symptoms.',pearl:'Iron side effects: constipation (#1), GI upset, tooth staining, DARK stools (expected). Give with vitamin C to enhance absorption. Avoid antacids/dairy (reduce absorption). Stains teeth — take through a straw. Constipation: drink more fluids, fiber.'},
{id:'m4_3',mod:'m4',drug:false,type:'mc',q:'A patient presents with petechiae on lower extremities, frequent nosebleeds, and a platelet count of 42,000/μL. The nurse recognizes:',opts:['Hemophilia A','Thrombocytopenia','Hypercoagulable state','Von Willebrand disease'],ans:[1],rationale:'Thrombocytopenia = low platelet count (<150,000). Manifestations: petechiae (pinpoint purplish-red spots), purpura (bruising), mucous membrane bleeding (nosebleeds, gum bleeding). Normal platelet count = 150,000-400,000.',pearl:'Petechiae + low platelets = thrombocytopenia. Hemophilia = factor deficiency (deep joint/tissue bleeds). Von Willebrand = platelet adhesion problem (mucosal/surface bleeding). Petechiae are characteristic of platelet disorders, NOT factor deficiency disorders.'},
{id:'m4_4',mod:'m4',drug:true,type:'mc',q:'A patient on warfarin has an INR of 6.2 and is actively bleeding. The priority intervention is:',opts:['Administer extra warfarin to stabilize the INR','Give IV Vitamin K to reverse warfarin anticoagulation','Administer protamine sulfate IV','Give fresh frozen plasma only — no antidote exists'],ans:[1],rationale:'Vitamin K is the antidote for warfarin. Emergent reversal: IV Vitamin K (works within 4-6 hours) ± Fresh Frozen Plasma (FFP) for immediate factor replacement. PO Vitamin K used for non-emergent over-anticoagulation.',pearl:'Antidotes: Warfarin → Vitamin K. Heparin → Protamine sulfate. Opioids → Naloxone. Benzodiazepines → Flumazenil. Acetaminophen → Acetylcysteine. Direct oral anticoagulants (apixaban, rivaroxaban) → Andexanet alfa. Memorize ALL of these.'},
{id:'m4_5',mod:'m4',drug:true,type:'mc',q:'A patient who received heparin for 7 days has a platelet count that dropped from 280,000 to 65,000. The nurse recognizes this as:',opts:['Expected response to heparin therapy','Heparin-Induced Thrombocytopenia (HIT) — which paradoxically INCREASES clotting risk','Warfarin-induced thrombocytopenia requiring dose reduction','Aplastic anemia from bone marrow suppression'],ans:[1],rationale:'HIT: immune-mediated complication 5-10 days after heparin. Paradoxically INCREASES clotting risk despite low platelets (platelet activation by HIT antibodies). Heparin must be stopped IMMEDIATELY and alternative anticoagulation used.',pearl:'HIT = low platelets + CLOTTING (paradox!). Onset 5-10 days. Stop ALL heparin including flushes and LMWH. Switch to direct thrombin inhibitors (argatroban, bivalirudin). Do NOT give warfarin until platelets >150,000.'},
{id:'m4_6',mod:'m4',drug:false,type:'sata',q:'A patient is diagnosed with aplastic anemia. Which CBC findings are expected? Select all that apply.',opts:['Decreased RBC count (anemia)','Decreased WBC count (leukopenia)','Decreased platelet count (thrombocytopenia)','Elevated hemoglobin','Elevated eosinophils'],ans:[0,1,2],rationale:'Aplastic anemia = bone marrow failure → PANCYTOPENIA = decreased RBC (anemia), decreased WBC (infection risk), decreased platelets (bleeding risk). All three cell lines are suppressed.',pearl:'Pancytopenia = ALL THREE cell lines decreased. Causes: radiation, chemo, certain drugs, viruses (hepatitis, EBV). Distinguish from leukemia where WBC is dramatically elevated. Treatment: bone marrow transplant or immunosuppression.'},
{id:'m4_7',mod:'m4',drug:true,type:'mc',q:'The nurse is about to administer alteplase (tPA) to a patient with acute ischemic stroke. Which finding is an absolute CONTRAINDICATION?',opts:['Blood pressure of 148/88 mmHg','Onset of symptoms 3 hours ago','History of hemorrhagic stroke 2 months ago','Age over 65'],ans:[2],rationale:'Absolute contraindications to thrombolytics: active internal bleeding, prior intracranial hemorrhage, stroke or serious head trauma within past 3 months, recent major surgery, severe uncontrolled HTN.',pearl:'tPA window for ischemic stroke = <4.5 hours from symptom onset. Key CIs: prior hemorrhagic stroke, recent trauma/surgery, active bleeding, severe HTN. Always screen carefully — thrombolytics can cause fatal intracranial hemorrhage.'},
{id:'m4_8',mod:'m4',drug:false,type:'mc',q:'Virchow\'s Triad describes the three conditions predisposing to venous thrombosis. Which set is CORRECT?',opts:['Hypertension, hyperlipidemia, smoking','Venous stasis, hypercoagulability, vascular injury','Atrial fibrillation, obesity, male gender','Tachycardia, low platelet count, decreased fibrinogen'],ans:[1],rationale:'Virchow\'s Triad: (1) Venous stasis — blood pooling (immobility, A-fib), (2) Hypercoagulability — increased clotting tendency (cancer, pregnancy, Factor V Leiden), (3) Vascular injury — damaged endothelium (surgery, trauma, IV catheter).',pearl:'DVT/PE prevention = address Virchow\'s Triad: Mobilize patients early (stasis), Anticoagulate high-risk patients (hypercoagulability), Use proper IV technique (vascular injury). Virchow\'s Triad = high-yield NCLEX topic.'},
{id:'m4_9',mod:'m4',drug:true,type:'mc',q:'A patient on clopidogrel (Plavix) is scheduled for CABG in one week. What action should the nurse take?',opts:['Continue clopidogrel — stopping it increases MI risk','Notify the provider — clopidogrel should be discontinued at least 5 days before surgery','Switch to warfarin immediately','Reduce the dose by half 3 days before surgery'],ans:[1],rationale:'Clopidogrel irreversibly inhibits platelet ADP receptors for the life of the platelet (~5-7 days). Continuing through surgery greatly increases bleeding risk. Guidelines recommend discontinuing at least 5 days (often 7) before elective surgery.',pearl:'Clopidogrel irreversibly inhibits platelets — effect lasts the platelet\'s lifespan (~5 days). After PCI/stent placement, NEVER stop antiplatelet therapy prematurely — risk of stent thrombosis. Always coordinate with the surgical and cardiology teams.'},
{id:'m4_10',mod:'m4',drug:false,type:'mc',q:'A patient with megaloblastic anemia lacks intrinsic factor. The underlying disorder is:',opts:['Iron deficiency anemia','Sickle cell disease','Pernicious anemia','Aplastic anemia'],ans:[2],rationale:'Pernicious anemia = failure to produce intrinsic factor (IF) needed to absorb vitamin B12 in the terminal ileum. Without B12, RBCs are large and abnormal (megaloblastic). B12 also required for myelin sheath synthesis → neurological symptoms.',pearl:'Pernicious anemia: no intrinsic factor → no B12 absorption → megaloblastic RBCs + neurological changes (subacute combined degeneration). Treatment: B12 injections IM monthly (oral B12 also may work in high doses). Cannot give oral B12 if no intrinsic factor.'},
{id:'m4_11',mod:'m4',drug:false,type:'mc',q:'A patient with chronic kidney disease develops anemia. The underlying mechanism is:',opts:['Blood loss through the dialysis circuit','Bone marrow suppression from uremic toxins only','Impaired synthesis of erythropoietin by the kidneys','Autoimmune destruction of red blood cells'],ans:[2],rationale:'In chronic renal failure, damaged kidneys cannot produce adequate erythropoietin (EPO). EPO normally stimulates bone marrow to produce RBCs. Less EPO = less RBC production = anemia of chronic kidney disease.',pearl:'CKD anemia = reduced EPO. Treatment: Epoetin alfa (Epogen) or darbepoetin = synthetic EPO that stimulates bone marrow. Monitor: Hgb/Hct (avoid Hgb > 11 g/dL — increases clotting risk). Iron supplementation often needed simultaneously.'},

// ===== MODULE 5: NEUROLOGY =====
{id:'m5_1',mod:'m5',drug:false,type:'mc',q:'A patient taking phenytoin (Dilantin) develops gum overgrowth. The nurse recognizes this as:',opts:['A sign of toxicity requiring dose reduction','An expected side effect called gingival hyperplasia','An allergic reaction requiring immediate drug discontinuation','Stevens-Johnson syndrome'],ans:[1],rationale:'Gingival hyperplasia (gum overgrowth) is a well-known expected side effect of phenytoin. Not life-threatening but requires good oral hygiene. Phenytoin toxicity signs are different: ataxia, nystagmus, slurred speech.',pearl:'Phenytoin pearls: gingival hyperplasia (teach dental hygiene), teratogenic (use birth control), give IV slowly (prevents cardiac dysrhythmias), tube feedings reduce absorption (separate by 2 hrs), toxicity = ataxia + nystagmus. Low TI drug — monitor levels.'},
{id:'m5_2',mod:'m5',drug:false,type:'mc',q:'A right-sided stroke patient would most likely exhibit which set of deficits?',opts:['Aphasia, right-sided hemiplegia, and awareness of deficits','Left-sided hemiplegia, left neglect, and impulsive behavior','Right-sided hemiplegia, impaired math skills, and slow cautious behavior','Bilateral weakness and loss of bladder control'],ans:[1],rationale:'Right brain stroke → LEFT-sided deficits (contralateral control). Right brain also controls spatial perception and impulse control. Patients tend to deny/minimize deficits and may be impulsive, creating safety risks.',pearl:'Right brain stroke = Left body problems + impulsive + denies deficits (safety risk). Left brain stroke = Right body problems + aphasia + aware of deficits → depression. Brain side = opposite body side. Denial of deficits = high fall risk.'},
{id:'m5_3',mod:'m5',drug:true,type:'mc',q:'A patient with Parkinson\'s disease asks why carbidopa is combined with levodopa in Sinemet. The nurse explains:',opts:['Carbidopa directly treats tremors while levodopa treats rigidity','Carbidopa inhibits peripheral metabolism of levodopa reducing N/V and enhancing CNS delivery','Carbidopa is added to prevent tolerance to levodopa','Carbidopa replaces the dopamine that levodopa cannot produce'],ans:[1],rationale:'Levodopa is metabolized peripherally causing N/V and CV side effects; only a small amount crosses the BBB. Carbidopa inhibits DOPA decarboxylase peripherally → more levodopa reaches the brain, lower doses needed, fewer side effects.',pearl:'Sinemet = Levodopa + Carbidopa. Carbidopa does nothing alone. Result: lower levodopa doses needed, reduced N/V and postural hypotension, more drug reaches the brain. Most effective drug for Parkinson\'s motor symptoms.'},
{id:'m5_4',mod:'m5',drug:true,type:'mc',q:'A patient in status epilepticus arrives in the ED. The FIRST-LINE drug class is:',opts:['Phenytoin IV loading dose','Phenobarbital IV','Benzodiazepines (diazepam or lorazepam)','Valproic acid infusion'],ans:[2],rationale:'Benzodiazepines (diazepam, lorazepam, midazolam) are first-line for acute seizures and status epilepticus — rapid onset, enhance GABA inhibition, stabilize neuronal membrane.',pearl:'Status epilepticus = seizure >5 min or repeated seizures without recovery → medical emergency → brain damage. Treatment ladder: BZDs first → phenytoin/fosphenytoin → phenobarbital → anesthesia (propofol/ketamine). Early treatment = better outcomes.'},
{id:'m5_5',mod:'m5',drug:true,type:'mc',q:'A patient on chronic opioid therapy asks which side effect will NOT improve over time. The nurse correctly identifies:',opts:['Nausea and vomiting','Sedation','Constipation','Pruritus (itching)'],ans:[2],rationale:'Constipation is the most persistent opioid side effect — tolerance does NOT develop to opioid-induced constipation (OIC). Unlike nausea and sedation which improve with time, OIC requires prophylactic bowel regimen from day one.',pearl:'Every opioid patient on chronic therapy needs a bowel regimen (stool softener + stimulant laxative from day 1). Tolerance develops to: sedation, nausea, euphoria. Tolerance does NOT develop to: constipation, miosis. Respiratory depression is the most dangerous acute side effect.'},
{id:'m5_6',mod:'m5',drug:true,type:'mc',q:'The nurse explains donepezil\'s (Aricept) mechanism of action to a patient with Alzheimer\'s disease. Which statement is correct?',opts:['It replaces lost dopamine in the basal ganglia','It inhibits acetylcholinesterase slowing ACh breakdown in the synaptic cleft','It stimulates new neuron growth in the hippocampus','It blocks glutamate receptors to prevent excitotoxicity'],ans:[1],rationale:'In Alzheimer\'s, cholinergic neuron loss → decreased ACh. Donepezil inhibits acetylcholinesterase (the enzyme that breaks down ACh) → more ACh remains at the synapse → improved cholinergic transmission.',pearl:'Donepezil = cholinesterase inhibitor. Helps ~30% of mild-moderate AD patients. Does NOT stop disease progression — slows symptoms only. Side effects: GI upset (N/V/D) from increased ACh. Memantine (Namenda) = NMDA receptor antagonist used for moderate-severe AD.'},
{id:'m5_7',mod:'m5',drug:true,type:'mc',q:'A patient overdoses on a benzodiazepine. The reversal agent is:',opts:['Naloxone (Narcan)','Acetylcysteine','Flumazenil','Protamine sulfate'],ans:[2],rationale:'Flumazenil is the specific reversal agent for benzodiazepine overdose. It competitively antagonizes the GABA-benzodiazepine receptor. It has a SHORT half-life — re-sedation can occur and repeated doses may be needed.',pearl:'Antidote pairs: Opioids → Naloxone (30-60 min duration). Benzodiazepines → Flumazenil (short half-life — re-sedation risk). Warfarin → Vitamin K. Heparin → Protamine sulfate. Acetaminophen → Acetylcysteine (N-acetylcysteine). Memorize ALL.'},
{id:'m5_8',mod:'m5',drug:false,type:'sata',q:'Which are MODIFIABLE risk factors for stroke? Select all that apply.',opts:['Age','Hypertension','Atrial fibrillation','Ethnicity','Smoking','Obesity'],ans:[1,2,4,5],rationale:'Modifiable: HTN (#1 modifiable RF), A-fib, smoking, obesity, diabetes, atherosclerosis, oral contraceptives. Non-modifiable: age, gender, ethnicity, genetics.',pearl:'HTN is the #1 modifiable risk factor for stroke. A-fib greatly increases embolic stroke risk — anticoagulation (warfarin, apixaban) is indicated. Hemorrhagic stroke #1 RF = HTN. Control blood pressure = most important stroke prevention strategy.'},
{id:'m5_9',mod:'m5',drug:true,type:'mc',q:'Which seizure medication is FIRST-LINE specifically for absence seizures?',opts:['Phenytoin (Dilantin)','Carbamazepine (Tegretol)','Ethosuximide (Zarontin)','Phenobarbital'],ans:[2],rationale:'Ethosuximide (succinimide class) is first-line specifically for absence seizures. It suppresses abnormal calcium channel activity in the thalamus. Phenytoin and carbamazepine are NOT effective for absence seizures — they can worsen them.',pearl:'Absence seizure = blank stare, seconds long, up to 100x/day, immediate recovery (no post-ictal confusion). Drug: Ethosuximide = #1. Valproic acid also effective for absence. NEVER give phenytoin or carbamazepine for absence seizures.'},
{id:'m5_10',mod:'m5',drug:false,type:'fill',q:'In Parkinson\'s disease, loss of dopaminergic neurons in the substantia nigra creates an imbalance between __________ (inhibitory) and acetylcholine (excitatory) neurotransmitters.',ans:['dopamine'],rationale:'PD = loss of dopaminergic neurons → decreased dopamine → ACh is now relatively dominant → excitatory control goes unchecked → tremor, rigidity, bradykinesia. Treatment: increase dopamine OR decrease ACh.',pearl:'PD treatment strategies: Levodopa/carbidopa (increase dopamine synthesis), dopamine agonists (stimulate receptors directly), MAO-B inhibitors (block dopamine breakdown), COMT inhibitors (slow peripheral metabolism), anticholinergics (decrease ACh — especially for tremor).'},
{id:'m5_11',mod:'m5',drug:false,type:'mc',q:'Multiple sclerosis causes progressive neurological symptoms because of:',opts:['Loss of dopaminergic neurons in the substantia nigra','Autoimmune demyelination of CNS white matter disrupting nerve conduction','Excess acetylcholine at neuromuscular junctions','Amyloid plaque deposition in the cerebral cortex'],ans:[1],rationale:'MS = autoimmune demyelination of CNS white matter. Myelin allows rapid saltatory conduction. Loss of myelin → slowed, disrupted, or blocked nerve conduction → diverse symptoms depending on which tracts are affected.',pearl:'MS: autoimmune, CNS demyelination, ages 20-40, remitting-relapsing pattern. Triggers: heat (Uhthoff phenomenon — heat worsens symptoms), stress, infection. Treatment: DMARDs (interferon beta, natalizumab) and symptom management.'},
{id:'m5_12',mod:'m5',drug:false,type:'mc',q:'A patient with acute hemorrhagic stroke arrives in the ED. The nurse knows the priority treatment is:',opts:['Administer tPA immediately','Stop the bleeding, reduce ICP, and provide supportive care','Start anticoagulation with heparin infusion','Administer aspirin and clopidogrel'],ans:[1],rationale:'Hemorrhagic stroke treatment: stop the bleeding (surgical intervention if needed), reduce/treat increased ICP (head of bed elevation, osmotic diuretics like mannitol), and supportive care. Anticoagulants and tPA are absolutely CONTRAINDICATED in hemorrhagic stroke.',pearl:'Ischemic stroke treatment = tPA (within 4.5 hours). Hemorrhagic stroke treatment = blood pressure control, reduce ICP, possibly surgery. NEVER give tPA or anticoagulants for hemorrhagic stroke — it will worsen bleeding. Knowing the TYPE of stroke is essential before treatment.'},

// ===== MODULE 6: CARDIOVASCULAR =====
{id:'m6_1',mod:'m6',drug:false,type:'mc',q:'A patient has a BP of 158/95 mmHg on two separate occasions. This is classified as:',opts:['Normal blood pressure','Pre-hypertension','Stage 1 hypertension','Stage 2 hypertension'],ans:[2],rationale:'JNC staging: Normal <120/<80. Pre-HTN 120-139/80-89. Stage 1 HTN 140-159/90-99. Stage 2 HTN ≥160/≥100. HTN Crisis >180/>120. Two readings on separate occasions confirm diagnosis.',pearl:'HTN = "silent killer" — usually asymptomatic for years until complications develop (MI, stroke, kidney disease, heart failure). Diagnosis requires TWO elevated readings on separate occasions. Stage 2 typically requires two medications.'},
{id:'m6_2',mod:'m6',drug:false,type:'mc',q:'The RAAS system regulates blood pressure. Which is the correct sequence of the cascade?',opts:['Kidney → renin → angiotensin II → ACE → aldosterone','Kidney → renin → angiotensinogen → angiotensin I → ACE → angiotensin II → aldosterone','Pituitary → ACTH → angiotensin → aldosterone','Adrenal cortex → renin → angiotensin I → aldosterone'],ans:[1],rationale:'RAAS: Low renal perfusion → kidney releases renin → renin converts angiotensinogen to angiotensin I → ACE (in lungs) converts angiotensin I → angiotensin II → stimulates aldosterone release → Na+/water retention.',pearl:'RAAS = Renin-Angiotensin-Aldosterone System. Remember: Renin converts angiotensinogen (liver) → Angiotensin I. ACE converts I → II. Angiotensin II = powerful vasoconstrictor + stimulates aldosterone. ACE inhibitors block this cascade.'},
{id:'m6_3',mod:'m6',drug:true,type:'mc',q:'A patient taking lisinopril (ACE inhibitor) develops a persistent dry cough. The nurse should:',opts:['Reassure the patient this will resolve in 2-3 days','Instruct the patient to take the medication at bedtime to minimize cough','Notify the provider — this is a classic side effect; switching to an ARB is an option','Hold the medication and assess for anaphylaxis'],ans:[2],rationale:'Dry, persistent cough is the most common side effect of ACE inhibitors, caused by accumulation of bradykinin. It does NOT go away and can be very bothersome. ARBs (losartan, valsartan) provide the same blood pressure control without causing cough.',pearl:'ACE inhibitor cough = bradykinin buildup. ARBs do NOT cause cough (they don\'t affect bradykinin). Both are contraindicated in pregnancy. If a patient cannot tolerate ACE inhibitor due to cough → switch to ARB. Angioedema (rare but serious) = contraindicate all RAAS agents.'},
{id:'m6_4',mod:'m6',drug:false,type:'mc',q:'Which type of heart failure is described as having a REDUCED ejection fraction (HFrEF)?',opts:['Diastolic heart failure — stiff ventricle cannot fill','Systolic heart failure — weakened ventricle cannot squeeze and eject blood adequately','Right-sided heart failure from pulmonary disease','Heart failure from valvular regurgitation only'],ans:[1],rationale:'Systolic HF (HFrEF) = weakened myocardium cannot contract effectively → reduced ejection fraction (<40%). Diastolic HF (HFpEF) = stiff, non-compliant ventricle cannot fill normally → normal EF but low filling.',pearl:'HFrEF = reduced EF = systolic failure = pump problem = responds to inotropes and neurohormonal blockade (ACE inhibitors, beta blockers, spironolactone). HFpEF = preserved EF = diastolic failure = filling problem = harder to treat.'},
{id:'m6_5',mod:'m6',drug:true,type:'mc',q:'Digoxin (Lanoxin) is administered for heart failure and atrial fibrillation. Which assessment must be done BEFORE administration?',opts:['Blood pressure — hold if systolic <90 mmHg','Apical pulse for a full minute — hold if <60 bpm','Serum sodium level — hold if >140 mEq/L','Respiratory rate — hold if >20 breaths/min'],ans:[1],rationale:'Digoxin slows conduction through the AV node (negative chronotropic effect). Check apical pulse for 1 full minute before each dose. Hold if HR <60 bpm (bradycardia). Digoxin toxicity: N/V, visual disturbances (yellow-green halos), arrhythmias.',pearl:'Digoxin pearls: Check apical pulse 1 full minute (hold if <60). Low potassium INCREASES digoxin toxicity. Therapeutic level 0.5-2 ng/mL. Toxicity signs: visual changes (yellow-green), N/V, bradycardia, dysrhythmias. Antidote: Digibind (digoxin immune Fab).'},
{id:'m6_6',mod:'m6',drug:false,type:'sata',q:'Left-sided heart failure (DROWNING mnemonic) manifests with which clinical findings? Select all that apply.',opts:['Dyspnea and orthopnea','Jugular venous distension (JVD)','Crackles (rales) in lung bases','Dependent pitting edema of legs','S3 gallop heart sound','Paroxysmal nocturnal dyspnea'],ans:[0,2,4,5],rationale:'Left-sided HF = pulmonary congestion: dyspnea, orthopnea, crackles (from fluid in alveoli), S3 gallop (ventricular filling), paroxysmal nocturnal dyspnea. JVD and pitting leg edema = RIGHT-sided HF (systemic venous congestion).',pearl:'Left HF = LUNGS (pulmonary congestion). Right HF = BODY (systemic venous congestion = JVD, liver enlargement, peripheral edema, ascites). Most right HF is caused by chronic left HF — left side fails → backs up into lungs → pulmonary HTN → right side fails.'},
{id:'m6_7',mod:'m6',drug:false,type:'mc',q:'Atherosclerosis progression begins with which initial event?',opts:['Formation of a fibrous cap over a lipid core','Endothelial injury allowing lipid accumulation','Calcification of the arterial wall','Platelet aggregation forming an acute thrombus'],ans:[1],rationale:'Atherosclerosis progression: (1) Endothelial injury (from HTN, smoking, hyperlipidemia, hyperglycemia), (2) Monocytes/macrophages infiltrate intima → foam cells, (3) Fatty streak → fibrous plaque → complicated lesion with calcification and thrombosis risk.',pearl:'Atherosclerosis = chronic inflammatory process starting with endothelial injury. Key risk factors: HTN (shear stress), smoking (endothelial toxin), hyperlipidemia (lipid infiltration), diabetes (AGEs damage endothelium). Plaque rupture → thrombus → MI or stroke.'},
{id:'m6_8',mod:'m6',drug:true,type:'mc',q:'Atorvastatin (Lipitor) is prescribed. A patient reports new muscle pain and weakness. The nurse should:',opts:['Reassure the patient — muscle aches are expected and will resolve','Hold the medication and report to provider — assess for rhabdomyolysis','Advise the patient to take the medication with food to prevent this','Recommend increasing dietary intake of potassium'],ans:[1],rationale:'Statins can cause myopathy and rhabdomyolysis — serious complications. New muscle pain or weakness requires immediate assessment of CK (creatinine kinase) levels. If CK is markedly elevated, the drug must be stopped to prevent acute renal failure.',pearl:'Statin myopathy: mild muscle aches (common) vs. rhabdomyolysis (rare but serious — check CK). Risk increased with: concomitant fibrates, niacin, CYP3A4 inhibitors (macrolides, azole antifungals). Grapefruit juice with statins = increased statin levels = increased myopathy risk.'},
{id:'m6_9',mod:'m6',drug:false,type:'mc',q:'Unstable angina differs from stable angina in that it:',opts:['Occurs predictably with exertion and is relieved by rest','Occurs at rest or with minimal activity, is unresponsive to nitroglycerin, and may represent impending MI','Is always caused by coronary artery vasospasm (Prinzmetal)','Causes ST elevation on ECG consistently'],ans:[1],rationale:'Unstable angina: occurs at rest or minimal activity, >15 minutes, UNRESPONSIVE to nitroglycerin — key distinction. Represents ruptured plaque with thrombus. It is a medical emergency requiring immediate hospitalization.',pearl:'Stable angina = predictable with exertion, relieved by rest/nitro. Unstable angina = unpredictable, at rest, NOT relieved by nitro → EMERGENCY (ACS). Prinzmetal/variant angina = vasospasm, responds to CCBs. NTG not working = call 911.'},
{id:'m6_10',mod:'m6',drug:false,type:'mc',q:'A patient develops atrial fibrillation. The nurse understands the most significant complication is:',opts:['Pulmonary embolism from right-sided thrombus','Ischemic stroke from left atrial thrombus embolization','Complete heart block requiring pacemaker','Sudden cardiac death from V-fib'],ans:[1],rationale:'A-fib: the atria quiver rather than contract effectively → blood stagnates in the left atrial appendage → thrombus forms → embolizes to the brain = ischemic stroke. This is why anticoagulation is the cornerstone of A-fib management.',pearl:'A-fib + no anticoagulation = 5x increased stroke risk. Anticoagulation options: warfarin (INR 2-3), or DOACs (apixaban, rivaroxaban). Rate control (beta blockers, CCBs) or rhythm control (antiarrhythmics). CHA2DS2-VASc score determines anticoagulation risk-benefit.'},

// ===== MODULE 7: RESPIRATORY =====
{id:'m7_1',mod:'m7',drug:false,type:'mc',q:'A COPD patient with chronic hypercapnia is receiving oxygen therapy. The nurse is cautious about giving too much O2 because:',opts:['High O2 damages alveolar surfactant','COPD patients rely on hypoxic drive to breathe — high O2 suppresses respiratory drive','High O2 causes coronary artery vasospasm','O2 toxicity causes hepatic dysfunction in COPD'],ans:[1],rationale:'COPD patients are chronically hypercapnic — their chemoreceptors become desensitized to high CO2. Their drive to breathe shifts to LOW O2 (hypoxic drive). Giving too much O2 removes this drive → respiratory depression.',pearl:'Normal patients: CO2 drives breathing. COPD patients: O2 drives breathing. Target SpO2 88-92% in most COPD patients (NOT 95-100% as in normal patients). This is one of the most tested NCLEX respiratory concepts.'},
{id:'m7_2',mod:'m7',drug:false,type:'mc',q:'Which findings distinguish emphysema (Pink Puffer) from chronic bronchitis (Blue Bloater)?',opts:['Emphysema: cyanosis, edema, and productive cough; Bronchitis: thin, barrel chest, severe dyspnea','Emphysema: thin, barrel chest, severe dyspnea, pursed-lip breathing; Bronchitis: cyanosis, edema, productive cough','Emphysema: fever and consolidation on CXR; Bronchitis: hyperinflation on CXR','Emphysema responds to bronchodilators; Bronchitis does not'],ans:[1],rationale:'Emphysema (Pink Puffer): alveolar destruction → air trapping → barrel chest, severe dyspnea, pursed-lip breathing, hyperventilation, thin/weight loss, less cyanosis. Chronic Bronchitis (Blue Bloater): mucus hypersecretion → cyanosis, overweight, edema, productive cough, rhonchi.',pearl:'Pink Puffer vs Blue Bloater: Pink = pursed lips, Pink skin (not cyanotic), Puffing with every breath. Blue = Blue/cyanotic, Bloated/edematous, Barrel chest + Blue. Both have FEV1/FVC <70% (obstructive pattern on spirometry).'},
{id:'m7_3',mod:'m7',drug:false,type:'mc',q:'A patient with asthma has a peak flow of 42% of personal best. This reading places them in which zone?',opts:['Green zone — continue current plan','Yellow zone — add rescue medications','Red zone — seek emergency care immediately','No action needed — this is normal variation'],ans:[2],rationale:'Peak flow zones: Green 80-100% = good control. Yellow 50-80% = caution, add rescue medications. Red <50% = emergency, seek immediate care. At 42%, this patient needs emergency medical attention.',pearl:'Peak flow = objective measure of airway obstruction. Green = Go (continue). Yellow = Caution (add rescue inhaler, may need oral steroids). Red = STOP and get emergency help. Teach patients their personal best and the three zones as part of asthma action plan education.'},
{id:'m7_4',mod:'m7',drug:true,type:'mc',q:'A patient using a corticosteroid inhaler (fluticasone) develops white patches in their mouth. The nurse recognizes this as:',opts:['A systemic side effect of the corticosteroid','Oral candidiasis (thrush) from local steroid deposition','An allergic reaction to the propellant','A sign of steroid toxicity requiring dose reduction'],ans:[1],rationale:'Oral candidiasis (thrush) is a LOCAL side effect of inhaled corticosteroids. Corticosteroid deposits in the mouth and throat suppress local immune defenses allowing Candida to overgrow.',pearl:'ICS (inhaled corticosteroids) side effect: oral candidiasis. Prevention: RINSE MOUTH AND GARGLE after every use. If using a bronchodilator and ICS: bronchodilator FIRST (opens airways), wait 5 minutes, THEN ICS (B before C). Teach this sequence every time.'},
{id:'m7_5',mod:'m7',drug:true,type:'mc',q:'What distinguishes SABAs from LABAs in asthma treatment?',opts:['SABAs (albuterol) are for rescue/acute relief; LABAs (salmeterol) are for maintenance — NOT acute attacks','LABAs are for acute attacks; SABAs are for maintenance only','Both can be used interchangeably for acute or maintenance therapy','SABAs are inhaled; LABAs are oral only'],ans:[0],rationale:'SABAs (short-acting beta-2 agonists like albuterol) = quick relief for acute bronchospasm, onset 5-15 minutes. LABAs (salmeterol) = long-acting maintenance, NEVER for acute attacks, always used WITH inhaled corticosteroids.',pearl:'Albuterol = Acute (SABA). Salmeterol = Slow and Steady (LABA). LABAs alone (without ICS) increase asthma mortality — always pair with ICS. Suffix -terol = beta-2 agonist. If using SABA >2x/week = poorly controlled asthma, step up therapy.'},
{id:'m7_6',mod:'m7',drug:false,type:'mc',q:'A patient presents with sudden severe dyspnea, pleuritic chest pain, tachycardia, and hemoptysis after a long flight. The nurse suspects:',opts:['Acute asthma exacerbation','Pulmonary embolism (PE)','Spontaneous pneumothorax','Community-acquired pneumonia'],ans:[1],rationale:'PE classic triad: sudden dyspnea + pleuritic chest pain + hemoptysis. Add tachycardia, tachypnea, hypoxemia. Risk factors: prolonged immobility (long flight), DVT, surgery, pregnancy, cancer, OCP, obesity.',pearl:'PE = V/Q mismatch (ventilation without perfusion = dead space). Diagnosis: CT pulmonary angiography (gold standard), V/Q scan, D-dimer (sensitive, less specific). Treatment: anticoagulation (heparin first, then warfarin or DOAC). PE is a medical emergency.'},
{id:'m7_7',mod:'m7',drug:false,type:'mc',q:'The FEV1/FVC ratio on spirometry is less than 70%. This pattern is consistent with which type of lung disease?',opts:['Restrictive lung disease (pulmonary fibrosis)','Obstructive lung disease (asthma, COPD)','Normal lung function','Mixed restrictive and obstructive pattern'],ans:[1],rationale:'FEV1/FVC <70% = OBSTRUCTIVE pattern (difficulty exhaling = asthma, COPD, bronchiectasis). In restrictive disease (fibrosis, obesity): FVC decreases, FEV1 decreases, but ratio is NORMAL or elevated because both decrease proportionally.',pearl:'Obstructive = can breathe IN but can\'t breathe OUT (FEV1/FVC <70%). Restrictive = can\'t breathe IN enough (FVC decreased, ratio normal). Obstructive examples: asthma, COPD. Restrictive: pulmonary fibrosis, obesity, kyphoscoliosis, neuromuscular disease.'},
{id:'m7_8',mod:'m7',drug:true,type:'mc',q:'A nurse is educating a patient about theophylline for asthma. Which statement about this drug is MOST important?',opts:['It can be taken with unlimited caffeine','It has a narrow therapeutic index requiring serum level monitoring (10-20 mcg/mL)','It is the first-line rescue medication for acute attacks','It has no significant drug interactions'],ans:[1],rationale:'Theophylline has a narrow therapeutic index. Therapeutic range: 10-20 mcg/mL. Levels >20 = toxicity: tachycardia, palpitations, ECG changes, nausea, seizures. Caffeine increases toxicity risk (same xanthine family).',pearl:'Theophylline = xanthine bronchodilator. Narrow TI = monitor levels. Toxicity signs: tachycardia, arrhythmias, nausea, headache, seizures. Caffeine = avoid (additive xanthine effects). Many drug interactions. Not first-line anymore — SABAs replaced it for rescue.'},
{id:'m7_9',mod:'m7',drug:false,type:'mc',q:'Post-operative atelectasis is BEST prevented by which nursing intervention?',opts:['Keeping the patient in bed for 24 hours post-surgery to conserve energy','Incentive spirometry use every 1-2 hours while awake','Administering supplemental oxygen continuously','Restricting fluid intake to prevent pulmonary edema'],ans:[1],rationale:'Incentive spirometry prevents atelectasis by promoting deep alveolar inflation (preventing collapse). Combined with coughing, deep breathing exercises, and early ambulation, it is the cornerstone of post-operative pulmonary care.',pearl:'Post-op atelectasis prevention: IS every 1-2 hours, deep breathing and coughing, early ambulation. If atelectasis occurs: bronchodilators, chest PT, positioning (affected lung UP), mucolytics, and bronchoscopy for mucus plugs. Teach IS BEFORE surgery for best compliance.'},
{id:'m7_10',mod:'m7',drug:false,type:'mc',q:'Community-acquired pneumonia (CAP) presents with which classic findings?',opts:['Progressive dyspnea, barrel chest, and pursed-lip breathing over years','Fever, chills, productive cough, pleuritic chest pain, and CXR consolidation','Intermittent wheezing attacks triggered by allergens','Gradual cough > 3 months with mucus production and recurrent infections'],ans:[1],rationale:'CAP: fever/chills (infection), productive cough with purulent sputum, pleuritic chest pain (inflammation of pleura), dyspnea, tachypnea, rhonchi, and CXR consolidation (lobar or patchy infiltrates).',pearl:'CAP most common cause: Streptococcus pneumoniae. In young adults: Mycoplasma (walking pneumonia — mild symptoms). In elderly: influenza + bacterial superinfection. HCAP (hospital-acquired) = often MDROs. Vaccines (pneumococcal, flu) prevent CAP.'},

// ===== MODULE 8: RENAL & REPRODUCTIVE =====
{id:'m8_1',mod:'m8',drug:false,type:'mc',q:'Which finding is MOST characteristic of acute kidney injury (AKI)?',opts:['Gradual increase in creatinine over 5 years','Sudden decrease in urine output (<400 mL/day) with rising BUN and creatinine','Proteinuria with normal creatinine for 3 months','Polyuria with low specific gravity for 2 weeks'],ans:[1],rationale:'AKI = sudden (hours to days) loss of renal function. Classic findings: oliguria (<400 mL/day), rising BUN and creatinine, electrolyte imbalances (hyperkalemia), metabolic acidosis. CKD is gradual over months/years.',pearl:'AKI vs CKD: AKI = sudden, often reversible. CKD = gradual, progressive, irreversible. Both can cause oliguria and electrolyte imbalances. Key AKI concern: hyperkalemia → cardiac dysrhythmias. Monitor ECG for peaked T waves.'},
{id:'m8_2',mod:'m8',drug:false,type:'mc',q:'Pre-renal AKI is caused by:',opts:['Direct damage to kidney tubules from nephrotoxic drugs','Obstruction of urine outflow from the bladder','Reduced blood flow (hypoperfusion) to the kidneys','Autoimmune destruction of glomeruli'],ans:[2],rationale:'Pre-renal AKI = kidneys are normal but are not receiving adequate blood flow (decreased perfusion). Causes: hypovolemia (hemorrhage, dehydration), cardiogenic shock (decreased CO), septic shock (vasodilation), NSAID use (decrease renal perfusion). Kidney function returns when perfusion is restored.',pearl:'AKI types: Pre-renal = hypoperfusion (fix the volume/flow). Intra-renal = kidney damage (ATN, glomerulonephritis, drug toxicity). Post-renal = obstruction (BPH, stones, tumor). Distinguishing type guides treatment. BUN/Cr ratio >20:1 = pre-renal (concentrated blood with less filtration).'},
{id:'m8_3',mod:'m8',drug:false,type:'mc',q:'A patient with CKD would be expected to have which hematologic finding and why?',opts:['Leukocytosis — because kidneys regulate WBC production','Anemia — because damaged kidneys cannot produce adequate erythropoietin','Thrombocytosis — because platelets accumulate in renal disease','Polycythemia — because kidneys produce excess EPO in CKD'],ans:[1],rationale:'CKD → damaged kidneys cannot produce adequate erythropoietin (EPO) → bone marrow cannot make enough RBCs → normocytic normochromic anemia. Treatment: epoetin alfa (synthetic EPO) + iron supplementation.',pearl:'CKD causes multiple complications: anemia (low EPO), hypertension (excess renin/aldosterone), hyperkalemia (can\'t excrete K+), metabolic acidosis (can\'t excrete H+), bone disease (can\'t activate Vitamin D → low calcium), fluid overload.'},
{id:'m8_4',mod:'m8',drug:false,type:'mc',q:'A male patient over 60 presents with urinary frequency, nocturia, and decreased urine stream. The MOST likely diagnosis is:',opts:['Renal calculi (kidney stones)','Urinary tract infection (UTI)','Benign prostatic hyperplasia (BPH)','Acute cystitis'],ans:[2],rationale:'BPH is overgrowth of the prostate pressing on the urethra → impedes urine flow. Classic: male >60, urinary frequency, nocturia (wakes at night to urinate), decreased stream force, feeling of incomplete emptying, urgency.',pearl:'BPH is HYPERPLASIA (increased cell number) NOT hypertrophy (increased cell size). Enzyme 5-alpha reductase converts testosterone → DHT → prostate cell proliferation. Treatment: 5-alpha reductase inhibitors (finasteride), alpha-blockers (tamsulosin), or TURP surgery.'},
{id:'m8_5',mod:'m8',drug:false,type:'mc',q:'A patient presents with sudden severe flank pain radiating to the groin, hematuria, and nausea. The MOST likely diagnosis is:',opts:['Appendicitis','Renal calculi (kidney stone)','Pyelonephritis','Ruptured ovarian cyst'],ans:[1],rationale:'Renal calculi classic presentation: sudden severe "colicky" flank pain (waves of extreme pain as stone passes through ureter), radiation to groin/genitalia, hematuria, nausea and vomiting. Pain is one of the most severe patients ever experience.',pearl:'Kidney stone pain = colicky (comes in waves) because the ureter peristaltically tries to move the stone. Most stones pass spontaneously with fluids. Calcium oxalate stones are most common. Uric acid stones: low purine diet + alkalinize urine. Struvite stones = UTI-related.'},
