{id:'m9_33',mod:'m9',drug:false,type:'mc',q:'Which clinical finding indicates a patient with hyperthyroidism is developing thyroid storm?',opts:['Bradycardia and weight gain','High fever (>38.5°C), extreme tachycardia, hypertension, and agitation/psychosis','Fatigue, hypothermia, and bradycardia','Goiter enlargement only'],ans:[1],rationale:'Thyroid storm = extreme hyperthyroidism. Triggers: surgery, infection, radioiodine, pregnancy. Classic: high fever, extreme HR > 140, hypertension, delirium/psychosis, vomiting, diarrhea. Life-threatening emergency.',pearl:'Thyroid storm management: BETA-blocker (propranolol — block peripheral effects), PTU (block thyroid hormone synthesis + peripheral conversion), Lugol\'s iodine (after PTU), Corticosteroids (reduce peripheral conversion), Cooling, IV fluids, TREAT the trigger.'},
{id:'m9_34',mod:'m9',drug:false,type:'mc',q:'A nurse assesses a patient post-thyroidectomy. Which finding requires IMMEDIATE intervention?',opts:['Mild sore throat and hoarse voice on day 1','Positive Trousseau\'s sign and tingling around the mouth','Temperature of 37.8°C (100°F) on post-op day 2','Serum calcium of 8.5 mg/dL'],ans:[1],rationale:'Positive Trousseau\'s sign (carpopedal spasm with BP cuff inflation) + perioral tingling = hypocalcemia from accidental parathyroid gland removal. Life-threatening hypocalcemia = laryngospasm, seizures, cardiac arrhythmias.',pearl:'Post-thyroidectomy hypocalcemia: check Chvostek\'s (facial tap) + Trousseau\'s (BP cuff). Monitor Ca++ every 6 hrs initially. Keep IV calcium gluconate at bedside. Permanent hypoparathyroidism requires lifelong calcium + vitamin D.'},
{id:'m9_35',mod:'m9',drug:false,type:'sata',q:'Which are classic manifestations of Cushing\'s syndrome? Select all that apply.',opts:['Moon face and facial rounding','Purple/red abdominal striae','Hypotension and hyponatremia','Truncal obesity with thin extremities','Hyperglycemia and easy bruising'],ans:[0,1,3,4],rationale:'Cushing\'s: moon face, purple striae, truncal obesity (thin extremities), hyperglycemia, easy bruising (skin thinning), HTN, hypokalemia, osteoporosis. Hypotension + hyponatremia = Addison\'s disease (deficiency), NOT Cushing\'s (excess cortisol raises BP and Na).',pearl:'Cushing\'s = excess cortisol = HIGH EVERYTHING (glucose, BP, Na, infections). Addison\'s = deficient cortisol = LOW EVERYTHING (glucose, BP, Na, energy). Two opposite extremes.'},
{id:'m9_36',mod:'m9',drug:false,type:'mc',q:'A patient with type 2 diabetes has a hemoglobin A1C of 9.8%. The nurse interprets this as:',opts:['Average blood glucose well-controlled over the past 3 months','Average blood glucose of approximately 235 mg/dL over the past 3 months — poorly controlled','Target range — no adjustment needed','Reflects only fasting glucose levels'],ans:[1],rationale:'HbA1C reflects average blood glucose over the past 2-3 months (lifespan of RBCs). A1C of 9.8% ≈ average glucose of ~235 mg/dL. Target for most diabetics: A1C < 7% (≈154 mg/dL average). A1C > 9% = significant hyperglycemia.',pearl:'A1C formula: A1C 6% ≈ 126 mg/dL. Each 1% rise ≈ 28-30 mg/dL increase in average glucose. A1C 7% ≈ 154. A1C 8% ≈ 183. A1C 9% ≈ 212. A1C 10% ≈ 240. Goal < 7% for most. Less strict (< 8%) for elderly/frail.'},
{id:'m9_37',mod:'m9',drug:true,type:'mc',q:'A patient with type 2 diabetes is started on metformin. The nurse includes which CRITICAL teaching?',opts:['Metformin can be taken freely even if the patient is fasting for tests','Hold metformin 48 hours before and after IV contrast procedures due to lactic acidosis risk','Metformin stimulates the pancreas to release insulin — give with meals only','Metformin can cause weight gain and fluid retention'],ans:[1],rationale:'Metformin + IV contrast + renal impairment = lactic acidosis risk. Contrast can cause acute kidney injury → metformin accumulates (renally excreted) → lactic acidosis (rare but life-threatening). Hold 48 hours around contrast.',pearl:'Metformin: most common first-line T2DM drug. Mechanism: reduces hepatic glucose production + improves insulin sensitivity. Does NOT cause hypoglycemia alone. GI side effects common. Contraindicated: eGFR < 30, IV contrast, liver failure, alcohol abuse. Lactic acidosis = rare but serious.'},
{id:'m9_38',mod:'m9',drug:false,type:'mc',q:'A patient with primary hyperparathyroidism has hypercalcemia. Which symptoms are associated with hypercalcemia?',opts:['Tetany, Chvostek\'s sign, and perioral tingling','Muscle weakness, constipation, polyuria, confusion, and shortened QT interval on ECG','Peaked T waves on ECG and muscle cramps','Laryngospasm and prolonged QT interval'],ans:[1],rationale:'Hypercalcemia: "Bones, Groans, Moans, and Psychic Overtones" — bone pain, kidney stones, N/V/constipation, weakness, polyuria, confusion/psychosis, shortened QT on ECG.',pearl:'Hypercalcemia mnemonic: BONES (pain, fractures), GROANS (GI: N/V, constipation, anorexia), MOANS (polyuria, polydipsia), PSYCHIC OVERTONES (confusion, depression, psychosis). Treat: IV saline hydration + furosemide to promote Ca++ excretion. Calcitonin. Bisphosphonates.'},
{id:'m10_21',mod:'m10',drug:false,type:'mc',q:'A patient with cirrhosis develops asterixis, confusion, and elevated ammonia. The nurse understands this is:',opts:['A normal finding in cirrhosis','Hepatic encephalopathy from ammonia neurotoxicity','Alcohol withdrawal delirium','Electrolyte imbalance from ascites treatment'],ans:[1],rationale:'Hepatic encephalopathy: failing liver cannot detoxify ammonia → ammonia crosses BBB → neurotoxicity → altered consciousness, asterixis (flapping tremor), confusion, coma. Treat with lactulose (traps ammonia in stool) ± rifaximin (reduces ammonia-producing GI bacteria).',pearl:'Asterixis = flapping tremor of outstretched hands = hepatic encephalopathy. Also in uremic encephalopathy. Lactulose goal: 2-3 soft stools/day (trapping and excreting ammonia). Restrict protein? Controversial — adequate protein still needed.'},
{id:'m10_22',mod:'m10',drug:true,type:'mc',q:'When should a proton pump inhibitor (e.g., omeprazole) be taken for maximum effectiveness?',opts:['At bedtime to suppress nocturnal acid production','With a fatty meal to increase absorption','30-60 minutes before the first meal of the day','Immediately after meals to reduce acid reflux symptoms'],ans:[2],rationale:'PPIs (omeprazole, pantoprazole, esomeprazole) require activated parietal cells (eating stimulates them). Taking 30-60 minutes before a meal maximizes the number of active pumps inhibited.',pearl:'PPIs: take 30-60 min before first meal. They are PRO-drugs — activated in acidic environment of parietal cells. Irreversible pump inhibition. Common side effects: headache, C. diff risk (long-term), hypomagnesemia, decreased calcium/vitamin B12 absorption long-term.'},
{id:'m10_23',mod:'m10',drug:false,type:'mc',q:'A patient with a peptic ulcer tests positive for H. pylori. What is the standard treatment?',opts:['Omeprazole alone for 8 weeks','Triple therapy: PPI + clarithromycin + amoxicillin for 14 days','Antacids for 6 months','IV antibiotics for 14 days'],ans:[1],rationale:'H. pylori eradication = triple therapy: PPI (omeprazole/pantoprazole) + clarithromycin + amoxicillin for 14 days. Alternative: quadruple therapy if local resistance is high. Test for eradication 4 weeks after completing therapy.',pearl:'H. pylori = most common cause of peptic ulcers worldwide. Triple therapy compliance is critical — taking all medications as prescribed ensures eradication. If penicillin allergy: replace amoxicillin with metronidazole.'},
{id:'m10_24',mod:'m10',drug:false,type:'mc',q:'A patient with Crohn\'s disease has "skip lesions" seen on colonoscopy. Which characteristic distinguishes Crohn\'s from ulcerative colitis?',opts:['UC can affect any part of the GI tract from mouth to anus','Crohn\'s causes only continuous mucosal inflammation limited to the colon','Crohn\'s has transmural (full-thickness) involvement with skip lesions anywhere in the GI tract','UC causes perianal fistulas and abscesses more than Crohn\'s'],ans:[2],rationale:'Crohn\'s disease: transmural inflammation (all layers), skip lesions, can affect ANYWHERE in GI (mouth to anus) — most commonly terminal ileum and colon. Creates fistulas, abscesses. UC = mucosal/submucosal, continuous, limited to colon and rectum.',pearl:'Crohn\'s vs UC: Crohn\'s = FULL thickness, SKIP lesions, ANYWHERE in GI, string sign on X-ray, fistulas/abscesses. UC = MUCOSA only, CONTINUOUS, COLON only, lead pipe colon on X-ray, high cancer risk after 10 years.'},
{id:'m10_25',mod:'m10',drug:false,type:'mc',q:'A patient with acute pancreatitis is admitted. Which nursing intervention is the PRIORITY?',opts:['Start oral clear liquids immediately to stimulate pancreatic enzymes','NPO status, IV fluid resuscitation, and pain management','Position patient supine to reduce pancreatic pressure','Administer oral pancreatic enzyme replacement'],ans:[1],rationale:'Acute pancreatitis: NPO (rest the pancreas, prevent further enzyme stimulation), aggressive IV fluid resuscitation (fluid third-spacing causes hypovolemia), pain management (opioids are appropriate — morphine concern is outdated).',pearl:'Pancreatitis management: NPO + IV fluids (Lactated Ringer\'s preferred over NS — less acidosis), pain control. Severity assessment: Ranson\'s criteria, APACHE II, CT. Complications: pseudocyst, necrotizing pancreatitis, ARDS, AKI.'},
{id:'m10_26',mod:'m10',drug:false,type:'mc',q:'A patient with cirrhosis has a large amount of ascites. Before performing a paracentesis, the nurse ensures:',opts:['Patient is supine with 2 large-bore IVs placed','Patient has voided (empty bladder) to reduce perforation risk','Patient has eaten a full meal within 2 hours','Coagulation studies are not needed for this bedside procedure'],ans:[1],rationale:'Before paracentesis: empty the bladder (reduces risk of bladder perforation during needle insertion). Also: informed consent, platelet/INR check, positioning (upright or side-lying).',pearl:'Paracentesis: drain ascitic fluid. Therapeutic = large volume paracentesis (LVP) > 5L — give albumin IV concurrently to prevent circulatory dysfunction. Diagnostic = small sample for cell count, protein, culture. Empty bladder = ESSENTIAL safety step.'},
{id:'m10_27',mod:'m10',drug:false,type:'mc',q:'A patient presents with right upper quadrant pain that radiates to the right shoulder, nausea, and low-grade fever. Murphy\'s sign is positive. These findings suggest:',opts:['Appendicitis','Peptic ulcer disease','Acute cholecystitis','Pancreatitis'],ans:[2],rationale:'Murphy\'s sign = pain and inspiratory arrest when examiner presses under right costal margin during deep inspiration (gallbladder is pressed against examiner\'s fingers). RUQ pain + Murphy\'s sign + nausea/fever = acute cholecystitis (gallbladder inflammation).',pearl:'Cholecystitis: "Fat, Forty, Female, Fertile, Fair" — risk factors (5 Fs). Murphy\'s sign = cholecystitis. McBurney\'s point = appendicitis (1/3 from ASIS to umbilicus). Cullen\'s = periumbilical ecchymosis (pancreatitis/intra-abdominal hemorrhage).'},
{id:'m10_28',mod:'m10',drug:false,type:'mc',q:'Following a liver biopsy, which position does the nurse place the patient to minimize bleeding?',opts:['Left lateral position','Right lateral decubitus (on the right side) for 1-2 hours','High Fowler\'s position','Prone position'],ans:[1],rationale:'Post-liver biopsy: right lateral position (right side down) applies pressure to the biopsy site → compresses the liver against the chest wall → tamponades bleeding. Maintain for at least 1-2 hours.',pearl:'After liver biopsy: right side-lying (pressure on liver = hemostasis). Monitor for: hemorrhage (hypotension, tachycardia), bile peritonitis (pain spreading to abdomen), pneumothorax (if intercostal approach). Vital signs every 15 min initially.'},
{id:'m10_29',mod:'m10',drug:false,type:'sata',q:'Which are classic signs and symptoms of bowel obstruction? Select all that apply.',opts:['Colicky abdominal pain','Absent or high-pitched bowel sounds','Abdominal distension','Passage of large amounts of loose stool','Nausea and vomiting (feculent if low obstruction)'],ans:[0,1,2,4],rationale:'Bowel obstruction: crampy/colicky pain (intermittent), high-pitched bowel sounds (early), absent sounds (late), distension, N/V (feculent with low obstruction). No stool or flatus passage (obstipation). Large loose stools = diarrhea, not obstruction.',pearl:'Bowel obstruction: "Colicky + Distended + Vomiting + No flatus." Diagnostic: upright/supine abdominal X-ray (air-fluid levels, stepladder pattern). Nasogastric tube for decompression. Never give metoclopramide (prokinetic) in obstruction — can cause perforation.'},
{id:'m10_30',mod:'m10',drug:false,type:'mc',q:'A patient with GERD receives education. Which lifestyle modification is MOST important to reduce nighttime symptoms?',opts:['Eat a large meal 1 hour before bedtime to dilute acid','Elevate the head of the bed 6-8 inches (use wedge or bed risers)','Exercise vigorously after meals to increase GI motility','Drink 16 oz of water immediately after meals'],ans:[1],rationale:'HOB elevation 6-8 inches (not just extra pillows) uses gravity to keep stomach contents below the LES during sleep. Most effective non-pharmacologic intervention for nocturnal GERD.',pearl:'GERD lifestyle: HOB elevation (gravity), avoid eating 2-3 hours before bed, avoid triggers (caffeine, alcohol, fatty/spicy foods, mint, chocolate, tomatoes), weight loss, avoid tight clothing, stop smoking.'},
{id:'m10_31',mod:'m10',drug:false,type:'mc',q:'A patient in the early post-operative period after bowel resection has hypoactive bowel sounds. The nurse understands this is:',opts:['An emergency requiring immediate nasogastric decompression','Normal post-operative ileus — expected for 24-72 hours after abdominal surgery','A sign of anastomotic leak requiring CT scan immediately','Indicative of bowel obstruction — surgeon must be notified'],ans:[1],rationale:'Post-operative ileus (POI) = temporary cessation of GI motility after abdominal surgery. Expected for 24-72 hours. Bowel sounds return in order: small bowel first, then stomach, then colon (last). Return of flatus and bowel sounds = GI motility returning.',pearl:'Post-op ileus: normal after abdominal surgery. Promoted by narcotics, immobility, fluid shifts. Reduce with: early ambulation, chewing gum (stimulates vagal response), alvimopan (mu-opioid antagonist), minimize opioids.'},
{id:'m10_32',mod:'m10',drug:false,type:'mc',q:'A patient with upper GI bleeding receives a blood transfusion. An elevated BUN out of proportion to creatinine in this patient suggests:',opts:['Pre-renal AKI from blood loss','Protein load from digested blood in the GI tract elevating BUN','Intrinsic renal damage from hemorrhagic shock','Post-renal obstruction from clots in the urinary tract'],ans:[1],rationale:'In upper GI bleeding, blood pools in the GI tract and is digested, producing large amounts of protein/urea → BUN rises significantly. Creatinine remains normal → BUN:Cr ratio > 20:1 without true renal failure.',pearl:'GI bleed + disproportionate BUN rise: protein from blood digested = BUN up. BUN:Cr > 20 in GI bleeding WITHOUT pre-renal AKI. However, blood loss CAN cause pre-renal AKI — assess clinical context.'},
{id:'m10_33',mod:'m10',drug:true,type:'mc',q:'A patient with chronic liver disease is prescribed spironolactone for ascites. The nurse monitors for which specific electrolyte imbalance?',opts:['Hypokalemia — spironolactone promotes potassium excretion','Hyperkalemia — spironolactone is a potassium-sparing diuretic','Hypernatremia — spironolactone causes sodium retention','Hypocalcemia — spironolactone binds calcium in the GI tract'],ans:[1],rationale:'Spironolactone is an aldosterone ANTAGONIST (potassium-sparing diuretic). It blocks aldosterone receptors in the distal tubule → sodium excretion + potassium RETENTION → hyperkalemia risk. Monitor K+ closely.',pearl:'Spironolactone = K+-sparing (saves potassium). Use in cirrhosis to reduce ascites (blocks aldosterone activated by RAAS in cirrhosis). Combine with furosemide (typical ratio: 100:40 mg) to balance electrolytes. Side effect: gynecomastia in men.'},
{id:'m10_34',mod:'m10',drug:false,type:'mc',q:'A patient with ulcerative colitis develops toxic megacolon. Which finding is MOST consistent with this life-threatening complication?',opts:['Mild abdominal cramping with increased frequency of small stools','Massive colonic dilation >6 cm, fever >38.6°C, tachycardia, and sepsis','Bloody diarrhea alone without systemic symptoms','Moderate abdominal pain relieved by defecation'],ans:[1],rationale:'Toxic megacolon: severe life-threatening dilation of the colon (>6 cm) with systemic toxicity (fever, tachycardia, leukocytosis, hypotension). Risk of perforation and peritonitis. Emergency: bowel rest, IV steroids, IV antibiotics, surgical consultation.',pearl:'Toxic megacolon = UC emergency. Signs: DISTENDED silent abdomen (no bowel sounds) + SEPSIS. NEVER give antidiarrheal agents in severe UC — can precipitate toxic megacolon. Surgery (colectomy) may be life-saving.'},
{id:'m10_35',mod:'m10',drug:false,type:'mc',q:'A patient with Hepatitis B (HBsAg positive, HBeAg positive) has been asymptomatic. The nurse understands HBeAg positivity indicates:',opts:['Immunity from past infection','Active viral replication with high infectivity','Recent vaccination response','Cleared infection with minimal contagion risk'],ans:[1],rationale:'HBeAg (e antigen) = marker of active viral replication and HIGH infectivity. HBsAg = surface antigen (infected or carrier). Anti-HBs = immunity (vaccination or recovery). HBeAg positive = highly contagious.',pearl:'Hepatitis B markers: HBsAg = infected. Anti-HBs = immune. HBeAg = actively replicating (very contagious). Anti-HBe = beginning to clear. HBcAb IgM = acute. HBcAb IgG = past infection or carrier. "Window period" = no HBsAg but positive core antibody.'},
{id:'m11_21',mod:'m11',drug:false,type:'mc',q:'A patient is admitted with a femur fracture. Two hours later, they become confused, tachypneic, and develop petechiae on the chest. What is the priority concern?',opts:['Hypovolemic shock from blood loss','Fat Embolism Syndrome','Pulmonary Embolism','Compartment Syndrome'],ans:[1],rationale:'Fat embolism syndrome (FES): 24-72 hours after long-bone or pelvic fracture, fat droplets from bone marrow enter bloodstream → lodge in pulmonary and cerebral capillaries → hypoxemia + confusion. Classic differentiator: petechial rash on chest/axillae.',pearl:'Fat embolism: Classic triad = Respiratory (hypoxemia) + Neurological (confusion) + Petechial rash. Not to be confused with PE. FES petechiae = pinpoint blood spots from fat plugging dermal capillaries. Early fracture stabilization PREVENTS FES.'},
{id:'m11_22',mod:'m11',drug:false,type:'mc',q:'Which clinical finding is the EARLIEST and most reliable sign of Compartment Syndrome?',opts:['Pulselessness','Paralysis','Pain disproportionate to the injury — worsened by passive stretch','Pallor'],ans:[2],rationale:'The earliest sign of compartment syndrome is PAIN out of proportion to the injury, especially worsened with passive stretch of muscles in the compartment. Pulselessness, pallor, paralysis = LATE signs indicating tissue death.',pearl:'6 Ps of compartment syndrome: Pain (earliest — disproportionate), Pressure (tense compartment), Paresthesia, Pallor, Pulselessness, Paralysis. PAIN is first. Pulselessness = ischemia progressing to tissue death. Fasciotomy = definitive treatment.'},
{id:'m11_23',mod:'m11',drug:false,type:'mc',q:'A patient has a full-thickness burn covering 36% of the body surface area. In the first 24 hours (emergent phase), which electrolyte abnormality is expected?',opts:['Hypokalemia','Hyperkalemia','Hypernatremia','Hypercalcemia'],ans:[1],rationale:'Burn emergent phase: massive cellular destruction → potassium released from intracellular space into blood → hyperkalemia. Also: hyponatremia (Na+ trapped in damaged tissue), hypoalbuminemia.',pearl:'Burn phases: Emergent (0-48 hrs) = hyperkalemia, hyponatremia, fluid shift OUT of vascular space. Acute (48-72 hrs+) = diuretic phase, fluid remobilizes, hypokalemia risk. Fluid resuscitation: Parkland formula = 4 mL × kg × %BSA burned (use LR solution).'},
{id:'m11_24',mod:'m11',drug:false,type:'mc',q:'A patient has an acute gout attack in the right big toe. Which medication provides the FASTEST relief of acute inflammation?',opts:['Allopurinol (Zyloprim)','Colchicine or NSAIDs','Probenecid','Febuxostat (Uloric)'],ans:[1],rationale:'Acute gout: colchicine or NSAIDs (indomethacin) are first-line for ACUTE attacks — they reduce inflammation. Allopurinol and probenecid are for long-term prevention. NEVER start allopurinol during an acute attack (can prolong/worsen it).',pearl:'Gout treatment timeline: ACUTE = colchicine or NSAIDs (or corticosteroids if contraindicated). CHRONIC prevention = allopurinol (xanthine oxidase inhibitor reduces uric acid). Do NOT start allopurinol during acute flare — wait 2-4 weeks after attack resolves.'},
{id:'m11_25',mod:'m11',drug:false,type:'mc',q:'Compartment syndrome is confirmed. The nurse\'s priority action is:',opts:['Elevate the extremity above heart level','Remove all constricting bandages/casts and immediately notify the provider for surgical fasciotomy','Apply ice packs to reduce swelling','Obtain an extremity X-ray to confirm the diagnosis'],ans:[1],rationale:'Compartment syndrome = surgical emergency. IMMEDIATELY remove all constricting materials (cast, dressings, splints). Notify provider/surgeon. Fasciotomy (surgical release of the fascia) must be performed within 4-6 hours to prevent permanent nerve and muscle damage. Do NOT elevate above heart level (reduces arterial pressure to ischemic tissue).',pearl:'Compartment syndrome: cut the cast, call the surgeon. Fasciotomy = incision through fascia to release pressure. Do NOT elevate (decreases perfusion). Ice is also NOT indicated (causes vasoconstriction). Time is tissue.'},
{id:'m11_26',mod:'m11',drug:false,type:'mc',q:'A patient with osteoarthritis reports knee pain that is worst at the end of the day and improves with rest. This pattern is MOST consistent with:',opts:['Inflammatory arthritis (RA) — morning stiffness lasting hours','Mechanical/degenerative arthritis (OA) — pain with activity, relieved by rest','Septic arthritis — fever and acute joint inflammation','Gout — acute episodic pain with hyperuricemia'],ans:[1],rationale:'OA pain: worsens with activity throughout the day, relieved by rest — reflects mechanical wear on degenerated cartilage. RA: MORNING stiffness > 1 hour, improves with activity (inflammatory — movement warms up joint).',pearl:'OA = "wear and tear" = worse with use, better with rest. RA = inflammatory = worse with rest/AM stiffness, improves with gentle movement. Clinical pearl: if stiffness < 30 min = probably OA. If > 1 hour = likely RA.'},
{id:'m11_27',mod:'m11',drug:false,type:'mc',q:'Which is the CORRECT position after a total hip replacement (posterior approach) to prevent dislocation?',opts:['Hips flexed greater than 90° with knees together','Hip maintained in abduction, external rotation, no flexion greater than 90°','Internal rotation with hip adduction to promote stability','Crossing the legs at the knees to align the hip'],ans:[1],rationale:'Posterior approach hip precautions (at least 6-12 weeks): NO flexion > 90° (e.g., no low chairs), NO adduction (no crossing legs), NO internal rotation. Maintain abduction with pillow between legs.',pearl:'Hip replacement posterior approach: NO 90° flexion, NO adduction, NO internal rotation = "NO" three things. Abduction pillow between legs, elevated toilet seat, avoid reaching forward. Anterior approach has DIFFERENT restrictions — always verify approach with surgeon.'},
{id:'m11_28',mod:'m11',drug:false,type:'mc',q:'A patient with systemic lupus erythematosus (SLE) develops lupus nephritis. Which lab findings confirm renal involvement?',opts:['Elevated AST and ALT indicating hepatic inflammation','Proteinuria, hematuria, elevated BUN and creatinine, and RBC casts in urine','Elevated uric acid and joint aspirate showing monosodium urate crystals','Positive anti-dsDNA antibodies with thrombocytopenia only'],ans:[1],rationale:'Lupus nephritis: SLE immune complex deposition in glomeruli → proteinuria (may reach nephrotic range), hematuria, RBC casts in urine (pathognomonic for glomerulonephritis), elevated BUN and creatinine.',pearl:'RBC casts in urine = ALWAYS abnormal = glomerulonephritis until proven otherwise. This hallmark finding occurs in lupus nephritis, post-strep GN, IgA nephropathy. SLE also check: ANA (positive >95%), anti-dsDNA (specific for SLE), complement C3/C4 (low in active nephritis).'},
{id:'m11_29',mod:'m11',drug:false,type:'mc',q:"Paget's disease of bone is characterized by which pathophysiology?",opts:['Uniform decrease in bone density throughout the skeleton similar to osteoporosis',"Abnormal accelerated remodeling — disorganized osteoclast and osteoblast activity producing enlarged structurally weak bone",'Inflammatory synovitis destroying articular cartilage leading to joint deformity','Avascular necrosis of the femoral head from impaired arterial blood supply'],ans:[1],rationale:"Paget's disease: abnormal osteoclast activation (excessive resorption) followed by disorganized osteoblast response (excessive formation) → mosaic bone architecture → enlarged but structurally weak bones → deformity, fracture risk, nerve compression.",pearl:"Paget's disease labs: markedly elevated alkaline phosphatase (ALP) = hallmark (reflects intense osteoblast activity). Normal calcium and phosphate. Treatment: bisphosphonates (zoledronic acid IV is most effective). Serious complication: osteosarcoma (1% risk)."},
{id:'m11_30',mod:'m11',drug:false,type:'mc',q:'A patient with SLE has persistent fatigue, joint pain, and a new butterfly rash. The nurse knows SLE flares are commonly triggered by:',opts:['Cold temperatures and physical inactivity','Sun exposure (ultraviolet light), infections, stress, and hormonal changes','High-sodium diet and immobility','Low-dose aspirin use'],ans:[1],rationale:'SLE flare triggers: UV light (most common), infection, emotional stress, hormonal changes (menstruation, pregnancy, oral contraceptives), certain medications. Photosensitivity = protective clothing, broad-spectrum SPF 30+ sunscreen.',pearl:'SLE management: hydroxychloroquine (Plaquenil) = first-line for mild SLE (reduces flares). Steroids for acute flares. Avoid sun. Annual eye exam with hydroxychloroquine (retinal toxicity). Monitor renal function (lupus nephritis).'}
];

const SESS_KEY='nrsg2350_sessions';

// STATE
// ============================================================
let S={
  screen:'home',config:null,
  questions:[],current:0,
  answers:{},revealed:{},fillInputs:{},sataSel:{},
  shuffleOrder:{},
  wrongQ:loadWrong(),sessions:loadSessions(),
  mode:'normal'
};

// ============================================================
// SHUFFLE HELPERS
// ============================================================
function getShuffleOrder(idx){
  if(!S.shuffleOrder[idx]){
    const q=S.questions[idx];
    if(!q||q.type==='fill'){S.shuffleOrder[idx]=null;return null;}
    const order=[...Array(q.opts.length).keys()].sort(()=>Math.random()-.5);
    S.shuffleOrder[idx]=order;
  }
  return S.shuffleOrder[idx];
}
// Given a shuffled display index, return the original option index
function origIdx(qIdx,displayIdx){
  const order=getShuffleOrder(qIdx);
  return order?order[displayIdx]:displayIdx;
}

// ============================================================
// QUESTION SELECTION ENGINE
// ============================================================
function pickQuestions(cfg,pool){
  const total=cfg.total||75;
  const selected=[];
  const usedIds=new Set();
  // Track wrong question IDs for de-prioritization
  const wrongIds=new Set(Object.keys(S.wrongQ).filter(id=>S.wrongQ[id]>0));
  
  MODULES.forEach(m=>{
    const pct=cfg.mods[m.id]||0;
    if(pct<=0)return;
    const count=Math.round(total*pct/100);
    const drugPct=cfg.drug[m.id]!==undefined?cfg.drug[m.id]:30;
    const modPool=pool.filter(q=>q.mod===m.id);
    const drugPool=modPool.filter(q=>q.drug);
    const nonDrugPool=modPool.filter(q=>!q.drug);
    const drugCount=Math.round(count*drugPct/100);
    const nonDrugCount=count-drugCount;
    
    const pick=(arr,n)=>{
      // Sort: wrong questions first (for variety), then random
      const sorted=[...arr].sort((a,b)=>{
        const aw=wrongIds.has(a.id)?-1:0;
        const bw=wrongIds.has(b.id)?-1:0;
        return aw-bw+Math.random()-.5;
      });
      return sorted.slice(0,n);
    };
    
    pick(drugPool,drugCount).forEach(q=>{if(!usedIds.has(q.id)){selected.push(q);usedIds.add(q.id);}});
    pick(nonDrugPool,nonDrugCount).forEach(q=>{if(!usedIds.has(q.id)){selected.push(q);usedIds.add(q.id);}});
  });
  return selected.sort(()=>Math.random()-.5);
}

// ============================================================
// SCORING
// ============================================================
function calcSATA(q,sel){
  const max=q.ans.length;
  let pts=0;
  (sel||[]).forEach(i=>{if(q.ans.includes(i))pts++;else pts--;});
  return{pts:Math.max(0,pts),max};
}
function isAnswered(idx){
  const q=S.questions[idx];
  if(!q)return false;
  if(q.type==='mc')return S.answers[idx]!==undefined;
  if(q.type==='sata')return(S.sataSel[idx]||[]).length>0;
  if(q.type==='fill')return(S.fillInputs[idx]||'').trim().length>0;
  return false;
}
function isCorrect(idx){
  const q=S.questions[idx];
  if(!q)return false;
  if(q.type==='mc')return q.ans.includes(S.answers[idx]);
  if(q.type==='sata'){const{pts,max}=calcSATA(q,S.sataSel[idx]);return pts===max;}
  if(q.type==='fill'){const v=(S.fillInputs[idx]||'').toLowerCase().trim();return q.ans.map(a=>a.toLowerCase()).includes(v);}
  return false;
}
function calcScore(){
  let total=0,earned=0;
  S.questions.forEach((q,idx)=>{
    if(!S.revealed[idx])return;
    if(q.type==='mc'){total++;if(isCorrect(idx))earned++;}
    else if(q.type==='sata'){const{pts,max}=calcSATA(q,S.sataSel[idx]||[]);total+=max;earned+=pts;}
    else if(q.type==='fill'){total++;if(isCorrect(idx))earned++;}
  });
  return{earned,total,pct:total>0?Math.round(earned/total*100):0};
}

function render(){
  const app=document.getElementById('app');
  if(S.screen==='home')app.innerHTML=renderHome();
  else if(S.screen==='config')app.innerHTML=renderConfig();
  else if(S.screen==='quiz')app.innerHTML=renderQuiz();
  else if(S.screen==='results')app.innerHTML=renderResults();
  else if(S.screen==='wrongonly')app.innerHTML=renderWrongOnly();
}

  <div style="margin-top:1rem;padding:.75rem 1rem;background:var(--surface2);border-radius:var(--radius);font-size:13px;color:var(--muted)">
    <strong style="color:var(--text)">How this works:</strong> Select an answer before the explanation appears. SATA questions score partial credit (+1 correct, -1 wrong). Wrong answers are tracked across sessions — use the review mode to drill your weak areas.
  </div>`;
}

function renderConfig(){
  const prev=S.config;
  const defaults={m1:10,m2:10,m3:10,m4:10,m5:10,m6:10,m7:10,m8:10,m9:5,m10:5,m11:5};
  const total=prev?.total||75;
  return`
  <div class="row" style="margin-bottom:1.25rem">
    <button onclick="goHome()" style="font-size:13px">← Home</button>
    <h2 style="margin:0">Exam Configuration</h2>
  </div>
  <div class="card">
    <h3 style="margin-bottom:.75rem">Total questions</h3>
    <div style="display:flex;gap:10px;align-items:center">
      <input type="number" id="totalQ" min="10" max="${ALL_Q.length}" value="${total}" style="width:90px" oninput="updateCounters()">
      <span class="muted">questions (bank has ${ALL_Q.length} total)</span>
    </div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:.5rem">Module distribution</h3>
    <p class="muted" style="margin-bottom:1rem;font-size:13px">Set the % of questions from each module. The live counter below shows your current total — it must equal your target question count before you can start.</p>
    <div style="display:grid;grid-template-columns:1fr 65px 65px 70px;gap:6px;margin-bottom:6px;align-items:center">
      <span style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">Module</span>
      <span style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;text-align:center">% of Qs</span>
      <span style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;text-align:center">% Drug</span>
      <span style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;text-align:center">Questions</span>
    </div>
    ${MODULES.map(m=>`
    <div style="display:grid;grid-template-columns:1fr 65px 65px 70px;gap:6px;margin-bottom:6px;align-items:center">
      <label style="font-size:13px">${m.label}</label>
      <input type="number" id="mod_${m.id}" min="0" max="100" value="${prev?.mods?.[m.id]!==undefined?prev.mods[m.id]:defaults[m.id]||5}" oninput="updateCounters()">
      <input type="number" id="drug_${m.id}" min="0" max="100" value="${prev?.drug?.[m.id]!==undefined?prev.drug[m.id]:30}">
      <span id="cnt_${m.id}" style="font-size:13px;font-weight:500;text-align:center;color:var(--muted)">—</span>
    </div>`).join('')}
    <div style="margin-top:1rem;padding:.75rem 1rem;border-radius:var(--radius);border:2px solid var(--border2)" id="counterBox">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div>
          <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">Question count</span>
          <div style="display:flex;align-items:baseline;gap:6px;margin-top:2px">
            <span id="liveTotal" style="font-size:28px;font-weight:700">0</span>
            <span id="liveSep" style="font-size:18px;color:var(--muted)">/</span>
            <span id="liveTarget" style="font-size:18px;color:var(--muted)">75</span>
            <span id="liveLabel" style="font-size:13px;font-weight:500;margin-left:4px"></span>
          </div>
        </div>
        <div style="flex:1;min-width:120px">
          <div style="height:8px;background:var(--surface2);border-radius:4px;overflow:hidden">
            <div id="liveBar" style="height:100%;border-radius:4px;transition:width .2s,background .2s;width:0%"></div>
          </div>
        </div>
        <span id="liveStatus" style="font-size:13px;font-weight:500"></span>
      </div>
    </div>
  </div>
  <div class="row" id="startRow">
    <button class="btn-primary" id="startBtn" onclick="startExam()">Start Exam →</button>
    <button onclick="goHome()">Cancel</button>
  </div>`;
}

function renderQuiz(){
  const q=S.questions[S.current];
  const total=S.questions.length;
  const pct=Math.round(S.current/total*100);
  const revealed=S.revealed[S.current];
  const answered=isAnswered(S.current);
  const typeBadge=q.type==='mc'?'Multiple Choice':q.type==='sata'?'Select All That Apply':'Fill in the Blank';
  const typeCls=q.type==='mc'?'badge-blue':q.type==='sata'?'badge-yellow':'badge-green';
  const modLabel=MODULES.find(m=>m.id===q.mod)?.label.split('–')[0].trim()||'';
  
  return`
  <div class="row" style="margin-bottom:1rem;flex-wrap:wrap;gap:8px">
    <button onclick="goHome()" style="font-size:12px;padding:5px 12px">← Home</button>
    <span class="muted" style="font-size:13px">Q ${S.current+1} of ${total}</span>
    <span class="badge ${typeCls}">${typeBadge}</span>
    <span class="badge badge-gray">${modLabel}</span>
    ${q.drug?'<span class="badge badge-blue">Pharmacology</span>':''}
    <span class="muted" style="margin-left:auto;font-size:12px">${Object.keys(S.revealed).length}/${total} answered</span>
  </div>
  <div class="progress"><div class="fill" style="width:${pct}%"></div></div>
  <div class="card">
    <p style="font-size:16px;font-weight:500;line-height:1.7;margin-bottom:1.25rem">${q.q}</p>
    ${q.type==='mc'?renderMC(q,revealed):''}
    ${q.type==='sata'?renderSATA(q,revealed):''}
    ${q.type==='fill'?renderFill(q,revealed):''}
    ${!revealed&&answered?`<div style="margin-top:1rem"><button class="btn-primary" onclick="revealAnswer()">Show Answer &amp; Rationale</button></div>`:''}
    ${!revealed&&!answered?`<p class="muted" style="font-size:13px;margin-top:.75rem">Select an answer to reveal the explanation.</p>`:''}
    ${revealed?renderRationale(q):''}
  </div>
  <div class="nav">
    <button onclick="prevQ()" ${S.current===0?'disabled':''}>← Previous</button>
    <button onclick="nextQ()" ${!revealed||S.current===total-1?'disabled':''}>Next →</button>
    ${S.current===total-1&&revealed?`<button class="btn-success" onclick="finishExam()">Finish Exam →</button>`:''}
    <span class="spacer"></span>
    <span class="muted" style="font-size:12px">${S.current+1}/${total}</span>
  </div>`;
}

function renderMC(q,revealed){
  const sel=S.answers[S.current];
  const order=getShuffleOrder(S.current);
  const displayOpts=order?order.map(i=>q.opts[i]):q.opts;
  return displayOpts.map((o,di)=>{
    const oi=order?order[di]:di;
    let cls='opt';
    if(revealed){
      if(q.ans.includes(oi))cls+=' correct';
      else if(sel===oi&&!q.ans.includes(oi))cls+=' incorrect';
    }else if(sel===oi)cls+=' selected';
    return`<div class="${cls}" onclick="${!revealed?`selectMC(${oi})`:''}" style="${revealed?'cursor:default':''}">
      <span class="letter">${String.fromCharCode(65+di)}.</span><span>${o}</span>
    </div>`;
  }).join('');
}

function renderSATA(q,revealed){
  const sel=S.sataSel[S.current]||[];
  const order=getShuffleOrder(S.current);
  const displayOpts=order?order.map(i=>q.opts[i]):q.opts;
  return`<div class="info-box" style="margin-bottom:.75rem;font-size:13px">Select ALL that apply. Partial credit: +1 for each correct selection, −1 for each incorrect selection.</div>`+
  displayOpts.map((o,di)=>{
    const oi=order?order[di]:di;
    let cls='opt';
    if(revealed){
      if(q.ans.includes(oi))cls+=' correct';
      else if(sel.includes(oi)&&!q.ans.includes(oi))cls+=' incorrect';
    }else if(sel.includes(oi))cls+=' selected';
    return`<div class="${cls}" onclick="${!revealed?`toggleSATA(${oi})`:''}" style="${revealed?'cursor:default':''}">
      <input type="checkbox" ${sel.includes(oi)?'checked':''} ${revealed?'disabled':''} onclick="event.stopPropagation()" onchange="${!revealed?`toggleSATA(${oi})`:''}">&nbsp;<span>${o}</span>
    </div>`;
  }).join('');
}

function renderFill(q,revealed){
  const val=S.fillInputs[S.current]||'';
  if(revealed){
    const correct=q.ans.map(a=>a.toLowerCase()).includes(val.toLowerCase().trim());
    return`<div class="fill-row"><input type="text" value="${val}" disabled style="max-width:300px"><span class="badge ${correct?'badge-green':'badge-red'}">${correct?'✓ Correct':'✗ Incorrect'}</span></div>
    <div class="correct-ans">Accepted: ${q.ans.join(' / ')}</div>`;
  }
  return`<div class="fill-row">
    <input type="text" id="fillIn" placeholder="Type your answer..." value="${val}" oninput="updateFill(this.value)" onkeydown="if(event.key==='Enter')submitFill()" style="max-width:300px">
    <button onclick="submitFill()">Submit</button>
  </div>`;
}

function renderRationale(q){
  const sel=S.answers[S.current];
  const sataSel=S.sataSel[S.current]||[];
  let score='';
  let labelCls='correct';
  if(q.type==='mc'){
    const c=q.ans.includes(sel);
    labelCls=c?'correct':'incorrect';
    score=`<div class="ans-lbl ${labelCls}">${c?'✓ Correct':'✗ Incorrect'}</div>`;
  }else if(q.type==='sata'){
    const{pts,max}=calcSATA(q,sataSel);
    const ratio=pts/max;
    labelCls=ratio===1?'correct':ratio===0?'incorrect':'partial';
    const answeredNames=q.ans.map(i=>q.opts[i]);
    score=`<div class="ans-lbl ${labelCls}">Score: ${pts}/${max} points</div>
    <div class="correct-ans">Correct answers: ${answeredNames.join('; ')}</div>`;
  }else if(q.type==='fill'){
    const v=(S.fillInputs[S.current]||'').toLowerCase().trim();
    const c=q.ans.map(a=>a.toLowerCase()).includes(v);
    labelCls=c?'correct':'incorrect';
    score=`<div class="ans-lbl ${labelCls}">${c?'✓ Correct':'✗ Incorrect'}</div>`;
  }
  return`<hr>
  <div class="rationale">
    ${score}
    <p style="margin-top:.5rem">${q.rationale}</p>
    <div class="pearl" style="margin-top:.75rem">
      <div class="pearl-title">★ NCLEX Pearl</div>
      <p>${q.pearl}</p>
    </div>
  </div>`;
}

function renderResults(){
  const{earned,total,pct}=calcScore();
  const ringCls=pct>=85?'good':pct>=70?'ok':'low';
  const msg=pct>=85?'Excellent work!':pct>=70?'Good — keep reviewing!':'Needs more study.';
  const wrong=S.questions.filter((q,idx)=>S.revealed[idx]&&!isCorrect(idx));
  const right=S.questions.filter((q,idx)=>S.revealed[idx]&&isCorrect(idx));
  
  return`
  <h2 style="margin-bottom:1rem">Exam Results</h2>
  <div class="card">
    <div class="row" style="flex-wrap:wrap;gap:16px">
      <div class="score-ring ${ringCls}">
        <div class="pct">${pct}%</div>
        <div class="lbl">score</div>
      </div>
      <div style="flex:1;min-width:200px">
        <div class="grid3" style="margin-bottom:.75rem">
          <div class="metric"><div class="val">${earned}</div><div class="lbl">Points earned</div></div>
          <div class="metric"><div class="val">${total}</div><div class="lbl">Total points</div></div>
          <div class="metric"><div class="val">${wrong.length}</div><div class="lbl">To review</div></div>
        </div>
        <span class="badge ${pct>=85?'badge-green':pct>=70?'badge-yellow':'badge-red'}">${msg}</span>
      </div>
    </div>
  </div>
  ${wrong.length>0?`<div class="card"><h3 style="margin-bottom:.75rem">Questions to review (${wrong.length})</h3>
  ${wrong.map(q=>`<div class="review-item wrong"><div class="q-text">${q.q.substring(0,100)}${q.q.length>100?'...':''}</div><div class="q-mod">${MODULES.find(m=>m.id===q.mod)?.label||''}</div></div>`).join('')}
  </div>`:''}
  <div class="row" style="flex-wrap:wrap">
    <button class="btn-primary" onclick="goConfig()">New Exam →</button>
    <button onclick="goHome()">Home</button>
    ${wrong.length>0?`<button class="btn-danger" onclick="goWrongOnly()">Practice Wrong Questions →</button>`:''}
  </div>`;
}

function renderWrongOnly(){
  const wrongIds=Object.keys(S.wrongQ).filter(id=>S.wrongQ[id]>0);
  const wrongQs=ALL_Q.filter(q=>wrongIds.includes(q.id));
  if(wrongQs.length===0){
    return`<div class="card"><h3>No wrong answers recorded</h3><p class="muted" style="margin:.5rem 0 1rem">Complete some exams to populate this list.</p><button onclick="goHome()">← Home</button></div>`;
  }
  if(S.mode!=='wrongonly'||S.questions.length===0){
    return`<div class="card"><h3>Practice Wrong Questions</h3>
    <p style="margin:.5rem 0 1rem">You have <strong>${wrongQs.length}</strong> question${wrongQs.length!==1?'s':''} from previous exams marked for review. This session will cover all of them.</p>
    <div class="row"><button class="btn-danger" onclick="startWrongOnly()">Start Review Session →</button><button onclick="goHome()">← Home</button></div></div>`;
  }
  return renderQuiz();
}

// ============================================================
// ACTIONS
// ============================================================
function goHome(){S.screen='home';render()}
function goConfig(){S.screen='config';render();setTimeout(updateCounters,10)}
function goWrongOnly(){S.mode='wrongonly';S.screen='wrongonly';S.questions=[];render()}
function clearWrong(){S.wrongQ={};saveWrong({});render()}

function updateCounters(){
  const totalQ=document.getElementById('totalQ');
  if(!totalQ)return;
  const target=parseInt(totalQ.value)||75;
  let sum=0;
  MODULES.forEach(m=>{
    const el=document.getElementById('mod_'+m.id);
    const pct=el?parseInt(el.value)||0:0;
    const count=Math.round(target*pct/100);
    sum+=count;
    const cnt=document.getElementById('cnt_'+m.id);
    if(cnt)cnt.textContent=count>0?count+'Q':'—';
    if(cnt)cnt.style.color=count>0?'var(--text)':'var(--hint)';
  });
  const liveTotal=document.getElementById('liveTotal');
  const liveTarget=document.getElementById('liveTarget');
  const liveBar=document.getElementById('liveBar');
  const liveLabel=document.getElementById('liveLabel');
  const liveStatus=document.getElementById('liveStatus');
  const counterBox=document.getElementById('counterBox');
  const startBtn=document.getElementById('startBtn');
  if(!liveTotal)return;
  liveTotal.textContent=sum;
  liveTarget.textContent=target;
  const diff=sum-target;
  const pct=Math.min(100,Math.round(sum/target*100));
  liveBar.style.width=pct+'%';
  if(diff===0){
    liveBar.style.background='var(--green)';
    counterBox.style.borderColor='var(--green-border)';
    counterBox.style.background='var(--green-bg)';
    liveLabel.textContent='✓ Perfect';
    liveLabel.style.color='var(--green)';
    liveStatus.textContent='';
    if(startBtn){startBtn.disabled=false;startBtn.style.opacity='1';}
  }else if(diff>0){
    liveBar.style.background='var(--red)';
    counterBox.style.borderColor='var(--red-border)';
    counterBox.style.background='var(--red-bg)';
    liveLabel.textContent='';
    liveStatus.textContent='▼ Remove '+diff+' question'+(diff!==1?'s':'');
    liveStatus.style.color='var(--red)';
    if(startBtn){startBtn.disabled=true;startBtn.style.opacity='.45';}
  }else{
    liveBar.style.background='var(--yellow)';
    counterBox.style.borderColor='var(--yellow-border)';
    counterBox.style.background='var(--yellow-bg)';
    liveLabel.textContent='';
    liveStatus.textContent='▲ Add '+Math.abs(diff)+' question'+(Math.abs(diff)!==1?'s':'');
    liveStatus.style.color='var(--yellow)';
    if(startBtn){startBtn.disabled=true;startBtn.style.opacity='.45';}
  }
}

function startExam(){
  const total=parseInt(document.getElementById('totalQ').value)||75;
  const mods={},drug={};
  MODULES.forEach(m=>{
    mods[m.id]=parseInt(document.getElementById('mod_'+m.id).value)||0;
    drug[m.id]=parseInt(document.getElementById('drug_'+m.id).value)||0;
  });
  // Validate sum = total
  let sum=0;
  MODULES.forEach(m=>sum+=Math.round(total*(mods[m.id]||0)/100));
  if(sum!==total){alert('Question count ('+sum+') does not equal your target ('+total+'). Adjust percentages until the counter shows ✓ Perfect.');return;}
  S.config={total,mods,drug};
  S.questions=pickQuestions(S.config,ALL_Q);
  if(S.questions.length===0){alert('No questions matched your configuration. Try adjusting the percentages.');return;}
  S.current=0;S.answers={};S.revealed={};S.fillInputs={};S.sataSel={};S.shuffleOrder={};
  S.mode='normal';S.screen='quiz';render();
}

function startWrongOnly(){
  const wrongIds=Object.keys(S.wrongQ).filter(id=>S.wrongQ[id]>0);
  S.questions=ALL_Q.filter(q=>wrongIds.includes(q.id)).sort(()=>Math.random()-.5);
  S.current=0;S.answers={};S.revealed={};S.fillInputs={};S.sataSel={};S.shuffleOrder={};
  S.mode='wrongonly';S.screen='wrongonly';render();
}

function selectMC(i){S.answers[S.current]=i;render()}

function toggleSATA(i){
  if(!S.sataSel[S.current])S.sataSel[S.current]=[];
  const idx=S.sataSel[S.current].indexOf(i);
  if(idx===-1)S.sataSel[S.current].push(i);
  else S.sataSel[S.current].splice(idx,1);
  render();
}

function updateFill(v){S.fillInputs[S.current]=v}
function submitFill(){if((S.fillInputs[S.current]||'').trim())render()}

function revealAnswer(){
  S.revealed[S.current]=true;
  const q=S.questions[S.current];
  const wrong=!isCorrect(S.current);
  if(wrong){S.wrongQ[q.id]=(S.wrongQ[q.id]||0)+1;}
  else if(S.wrongQ[q.id]){S.wrongQ[q.id]=Math.max(0,S.wrongQ[q.id]-1);}
  saveWrong(S.wrongQ);
  render();
}

function nextQ(){if(S.current<S.questions.length-1){S.current++;render()}}
function prevQ(){if(S.current>0){S.current--;render()}}

function finishExam(){
  const{pct}=calcScore();
  const sessions=loadSessions();
  sessions.push({score:pct,total:S.questions.length,date:new Date().toLocaleDateString()});
  if(sessions.length>20)sessions.shift();
  saveSessions(sessions);
  S.sessions=sessions;
  if(S.mode==='wrongonly'){S.screen='wrongonly';S.questions=[];}
  else S.screen='results';
  render();
}

// Boot
render();
</script>
</body>
</html>
